<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#115e59">
<title>清掃管理 | Cleaning Manager</title>
<style>/* ===== shadcn/ui 相当のトークン（Tailwind slate/teal/emerald/amber/rose の実値） ===== */
:root{
  --bg:#f8fafc;          /* slate-50 */
  --card:#ffffff;
  --border:#e2e8f0;      /* slate-200 */
  --border-soft:#f1f5f9; /* slate-100 */
  --fg:#0f172a;          /* slate-900 */
  --muted:#64748b;       /* slate-500 */
  --muted-2:#94a3b8;     /* slate-400 */
  --muted-3:#cbd5e1;     /* slate-300 */
  --teal-50:#f0fdfa; --teal-700:#0f766e; --teal-800:#115e59; --teal-900:#134e4a;
  --em-50:#ecfdf5; --em-100:#d1fae5; --em-500:#10b981; --em-700:#047857;
  --am-50:#fffbeb; --am-200:#fde68a; --am-500:#f59e0b; --am-700:#b45309; --am-800:#92400e;
  --rose-50:#fff1f2; --rose-200:#fecdd3; --rose-500:#f43f5e; --rose-600:#e11d48; --rose-700:#be123c;
  --blue-500:#3b82f6; --blue-700:#1d4ed8;
  --r-sm:.25rem; --r:.5rem; --r-lg:.75rem;
  --sh-sm:0 1px 2px 0 rgb(0 0 0 / .05);
  --sh-md:0 4px 6px -1px rgb(0 0 0 / .1), 0 2px 4px -2px rgb(0 0 0 / .1);
  --sh-lg:0 10px 15px -3px rgb(0 0 0 / .1), 0 4px 6px -4px rgb(0 0 0 / .1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--fg);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  font-size:16px; line-height:1.55; -webkit-text-size-adjust:100%;
}
button{font:inherit;color:inherit;cursor:pointer;}
input,textarea,select{font:inherit;color:inherit;}
.hide{display:none !important;}
.tabnum{font-variant-numeric:tabular-nums;}

/* ===== 部品 ===== */
.card{border:1px solid var(--border);background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh-sm);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  border-radius:var(--r);font-size:14px;font-weight:500;height:2.5rem;padding:0 1rem;
  border:1px solid transparent;background:transparent;
  transition:background-color .15s,color .15s,border-color .15s;white-space:nowrap;}
.btn:focus-visible{outline:2px solid var(--fg);outline-offset:2px;}
.btn:disabled{opacity:.5;pointer-events:none;}
.btn-default{background:var(--teal-800);color:#fff;}
.btn-default:hover{background:var(--teal-900);}
.btn-outline{border-color:var(--border);background:#fff;color:var(--fg);}
.btn-outline:hover{background:var(--bg);}
.btn-ghost{color:var(--muted);}
.btn-ghost:hover{background:var(--border-soft);color:var(--fg);}
.btn-danger{border-color:var(--rose-200);background:#fff;color:var(--rose-600);}
.btn-danger:hover{background:var(--rose-50);}
.btn-sm{height:2.25rem;padding:0 .75rem;font-size:13px;}
.btn-kt{height:3.25rem;padding:0 1.5rem;font-size:20px;font-weight:600;border-radius:.625rem;}
.btn-icon{height:2rem;width:2rem;padding:0;}

.input{display:flex;height:2.5rem;width:100%;border-radius:var(--r);border:1px solid var(--border);
  background:#fff;padding:.5rem .75rem;font-size:14px;}
.input::placeholder{color:var(--muted-2);}
.input:focus-visible{outline:2px solid var(--fg);outline-offset:1px;}
textarea.input{height:auto;min-height:5rem;resize:vertical;line-height:1.6;}

.badge{display:inline-flex;align-items:center;border-radius:var(--r-sm);padding:.125rem .5rem;
  font-size:12px;font-weight:500;box-shadow:inset 0 0 0 1px rgb(0 0 0 / .06);white-space:nowrap;}
.badge-slate{background:var(--border-soft);color:var(--muted);}
.badge-emerald{background:var(--em-50);color:var(--em-700);}
.badge-amber{background:var(--am-50);color:var(--am-700);}
.badge-rose{background:var(--rose-50);color:var(--rose-700);}

.field{display:flex;flex-direction:column;gap:.375rem;}
.field > label{font-size:14px;font-weight:500;}
.req{color:var(--rose-500);}

/* ===== レイアウト ===== */
.wrap{max-width:80rem;margin:0 auto;padding:0 1.5rem;}
.hd{position:sticky;top:0;z-index:40;border-bottom:1px solid var(--border);background:#fff;}
.hd-in{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.75rem 0;}
.hd-brand{display:flex;align-items:center;gap:.75rem;min-width:0;}
.hd-ico{display:flex;height:2.25rem;width:2.25rem;flex:none;align-items:center;justify-content:center;
  border-radius:var(--r);background:var(--teal-800);color:#fff;}
.hd-t1{font-size:15px;font-weight:600;line-height:1.2;}
.hd-t2{font-size:11px;line-height:1.2;color:var(--muted-2);}
.hd-nav{display:flex;align-items:center;gap:.25rem;}
.hd-nav button{display:inline-flex;align-items:center;gap:.5rem;border-radius:var(--r);
  padding:.5rem .75rem;font-size:14px;font-weight:500;color:var(--muted);background:transparent;border:0;
  transition:background-color .15s,color .15s;}
.hd-nav button:hover{background:var(--border-soft);color:var(--fg);}
.hd-nav button.on{background:var(--teal-50);color:var(--teal-800);}
main{padding:1.5rem 0 4rem;}
.page{display:none;}
.page.on{display:block;}

/* サマリー */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem;}
@media(min-width:1024px){ .stats{grid-template-columns:repeat(4,1fr);} }
.stat{padding:1.25rem;}
.stat-h{display:flex;align-items:center;gap:.625rem;margin-bottom:.75rem;}
.stat-i{display:flex;height:2rem;width:2rem;align-items:center;justify-content:center;border-radius:var(--r);}
.stat-i.teal{background:var(--teal-50);color:var(--teal-700);}
.stat-i.em{background:var(--em-50);color:var(--em-700);}
.stat-i.am{background:var(--am-50);color:var(--am-700);}
.stat-i.sl{background:var(--border-soft);color:var(--muted);}
.stat-l{font-size:14px;color:var(--muted);}
.stat-v{font-size:30px;font-weight:600;line-height:1.1;}
.stat-sub{margin-top:.25rem;font-size:11px;color:var(--muted-2);}

/* 勤怠：個人別の正着率バー */
.perrow{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;}
.perrow + .perrow{border-top:1px solid var(--border-soft);}
.pername{width:4.5rem;flex:none;font-weight:600;font-size:14px;}
.perbar{flex:1;height:.5rem;border-radius:9999px;background:var(--border-soft);overflow:hidden;}
.perbar i{display:block;height:100%;border-radius:9999px;background:var(--em-500);transition:width .3s;}
.perval{flex:none;width:5.5rem;text-align:right;font-size:13px;font-weight:600;}
.permeta{flex:none;font-size:11px;color:var(--muted-2);width:9rem;text-align:right;}
.tbl input[type=time].late{border-color:var(--am-500);background:var(--am-50);}
.latetag{margin-left:.25rem;font-size:10px;font-weight:600;color:var(--am-700);}
@media(max-width:768px){
  .perval{width:4.5rem;font-size:12px;} .permeta{display:none;} .pername{width:3.5rem;}
}

.cols{display:grid;gap:1.5rem;}
@media(min-width:1024px){ .cols{grid-template-columns:1fr 380px;} }

/* カレンダー */
.cal-h{display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);padding:1rem 1.25rem;}
.cal-h h2{margin:0;font-size:16px;font-weight:600;}
.cal-nav{display:flex;align-items:center;gap:.25rem;}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.cal-wd div{padding:.625rem 0;text-align:center;font-size:12px;font-weight:500;color:var(--muted);}
.cal-wd div.sun{color:var(--rose-500);} .cal-wd div.sat{color:var(--blue-500);}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);}
.cell{min-height:6rem;border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft);
  padding:.5rem;text-align:left;background:transparent;border-top:0;border-left:0;
  display:flex;flex-direction:column;gap:.125rem;transition:background-color .15s;
  min-width:0;overflow:hidden;}
.cell:nth-child(7n){border-right:0;}
.cell:hover{background:var(--bg);}
.cell.out{background:#f8fafc80;}
.cell.sel{background:#f0fdfa99;box-shadow:inset 0 0 0 1px #14b8a6;}
.cell-d{display:inline-flex;height:1.5rem;min-width:1.5rem;align-items:center;justify-content:center;
  border-radius:9999px;padding:0 .25rem;font-size:12px;align-self:flex-start;}
.cell-d.out{color:var(--muted-3);}
.cell-d.sun{color:var(--rose-500);} .cell-d.sat{color:var(--blue-500);}
.cell-d.today{background:var(--teal-700);color:#fff;font-weight:600;}
.pill{display:flex;align-items:center;gap:.25rem;border-radius:var(--r-sm);padding:.125rem .25rem;
  font-size:11px;background:var(--border-soft);color:var(--muted);min-width:0;}
.pill.done{background:var(--em-50);color:var(--em-700);}
.pill i{height:.375rem;width:.375rem;flex:none;border-radius:9999px;}
.pill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pill-more{padding-left:.25rem;font-size:10px;color:var(--muted-2);}

/* 右パネル */
.side-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.75rem;}
.side-h h3{margin:0;font-size:14px;font-weight:600;}
.side-h span{font-size:12px;color:var(--muted-2);}
.side-list{display:flex;flex-direction:column;gap:.75rem;}
.pcard{padding:1rem;cursor:pointer;transition:box-shadow .15s;}
.pcard:hover{box-shadow:var(--sh-md);}
.pcard-h{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.25rem;}
.pcard-n{font-weight:600;line-height:1.35;}
.pcard-a{margin-bottom:.625rem;font-size:12px;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pcard-m{display:flex;flex-wrap:wrap;align-items:center;gap:.375rem;}
.chip{display:inline-flex;align-items:center;gap:.25rem;border-radius:var(--r-sm);
  padding:.125rem .375rem;font-size:11px;font-weight:500;box-shadow:inset 0 0 0 1px rgb(0 0 0 / .08);}
.chip i{height:.375rem;width:.375rem;border-radius:9999px;}
.mini{display:inline-flex;align-items:center;gap:.25rem;font-size:11px;color:var(--muted-2);}
.empty{padding:2rem;text-align:center;font-size:14px;color:var(--muted-2);line-height:1.7;}

/* 送信カード */
.send{padding:1rem;}
.send.ready{border-color:#99f6e4;background:#f0fdfa66;}
.send-h{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;font-size:14px;}
.send-warn{display:flex;align-items:flex-start;gap:.5rem;border-radius:var(--r);background:var(--am-50);
  padding:.5rem .75rem;font-size:12px;color:var(--am-800);margin-bottom:.75rem;}
.send-to{margin-top:.5rem;text-align:center;font-size:11px;color:var(--muted-2);}

/* 物件管理 */
.ptab-h{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;}
.ptab-h h1{margin:0;font-size:24px;font-weight:600;}
.ptab-h p{margin:.25rem 0 0;font-size:14px;color:var(--muted);}
.filters{display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;margin-bottom:1rem;}
.filters .input{max-width:20rem;}
.fbtn{border-radius:var(--r);padding:.5rem .75rem;font-size:14px;font-weight:500;
  background:#fff;color:var(--muted);border:0;box-shadow:inset 0 0 0 1px var(--border);
  transition:background-color .15s;}
.fbtn:hover{background:var(--bg);}
.fbtn.on{background:var(--fg);color:#fff;box-shadow:none;}
.fcount{margin-left:auto;font-size:14px;color:var(--muted-2);}
.grid3{display:grid;gap:1rem;grid-template-columns:1fr;}
@media(min-width:640px){ .grid3{grid-template-columns:repeat(2,1fr);} }
@media(min-width:1024px){ .grid3{grid-template-columns:repeat(3,1fr);} }
.bcard{display:flex;flex-direction:column;padding:1rem;}
.bcard-h{display:flex;align-items:flex-start;gap:.625rem;margin-bottom:.5rem;}
.bcard-i{display:flex;height:2rem;width:2rem;flex:none;align-items:center;justify-content:center;
  margin-top:.125rem;border-radius:var(--r);background:var(--border-soft);color:var(--muted);}
.bcard-n{font-weight:600;line-height:1.35;}
.bcard-a{display:flex;align-items:flex-start;gap:.25rem;margin-top:.125rem;font-size:12px;color:var(--muted);
  word-break:break-all;}
.bcard-m{display:flex;align-items:center;gap:.375rem;margin-bottom:.75rem;}
.bcard .btn{margin-top:auto;width:100%;}

/* モーダル */
.mask{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;background:rgb(15 23 42 / .5);padding:2.5rem 1rem;}
.modal{position:relative;width:100%;max-width:32rem;border-radius:var(--r-lg);background:#fff;
  padding:1.5rem;box-shadow:var(--sh-lg);}
.modal.wide{max-width:42rem;}
.modal-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;}
.modal-h h2{margin:0;font-size:18px;font-weight:600;}
.x{border-radius:var(--r-sm);padding:.25rem;color:var(--muted-2);background:transparent;border:0;line-height:0;}
.x:hover{background:var(--border-soft);color:var(--muted);}
.mbox{border-radius:var(--r);background:var(--bg);padding:.875rem;}
.mbox-n{font-weight:600;}
.mbox-a{margin-top:.125rem;font-size:12px;color:var(--muted);}
.mbox-s{margin-top:.375rem;display:flex;gap:.75rem;font-size:12px;}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.seg button{height:2.5rem;border-radius:var(--r);font-size:14px;font-weight:500;border:0;
  background:var(--border-soft);color:var(--muted);transition:background-color .15s,color .15s;}
.seg button:hover{background:var(--border);}
.seg button.on-yet{background:var(--fg);color:#fff;}
.seg button.on-doing{background:var(--am-500);color:#fff;}
.seg button.on-done{background:var(--em-500);color:#fff;}
.modal-f{display:flex;align-items:center;justify-content:space-between;gap:.5rem;
  border-top:1px solid var(--border-soft);padding-top:1rem;}

/* 点検項目 */
.items{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.item + .item{border-top:1px solid var(--border-soft);}
.item-h{display:flex;align-items:center;gap:.5rem;background:#fff;padding:.625rem .75rem;}
.ck{display:flex;height:1.25rem;width:1.25rem;flex:none;align-items:center;justify-content:center;
  border-radius:var(--r-sm);border:1px solid var(--muted-3);background:#fff;line-height:0;
  transition:background-color .15s,border-color .15s;}
.ck.on{border-color:var(--em-500);background:var(--em-500);color:#fff;}
.item-b{display:flex;flex:1;align-items:center;justify-content:space-between;gap:.5rem;
  text-align:left;background:transparent;border:0;padding:0;min-width:0;}
.item-l{font-size:14px;}
.item-l.done{color:var(--muted-2);text-decoration:line-through;}
.item-o{margin-left:.25rem;font-size:10px;color:var(--muted-2);}
.item-r{display:flex;flex:none;align-items:center;gap:.375rem;font-size:11px;color:var(--muted-2);}
.cnt{border-radius:var(--r-sm);padding:.125rem .375rem;background:var(--border-soft);}
.cnt.a{background:var(--em-50);color:var(--em-700);}
.chev{transition:transform .15s;}
.chev.open{transform:rotate(90deg);}
.item-d{background:var(--bg);padding:.75rem;display:flex;flex-direction:column;gap:.75rem;}
.guide{font-size:12px;color:var(--muted);line-height:1.7;}
.guide b{color:#334155;}
.phases{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;}
.phase{border:1px solid var(--border);border-radius:var(--r);background:#fff;padding:.5rem;}
.phase-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:.375rem;}
.phase-t{font-size:11px;font-weight:600;color:var(--muted);}
.phase-t.a{color:var(--em-700);}
.phase-c{font-size:10px;color:var(--muted-2);}
.shots{display:flex;flex-wrap:wrap;gap:.375rem;}
.shot{position:relative;height:3.5rem;width:3.5rem;border-radius:var(--r-sm);overflow:hidden;
  border:1px solid var(--border);background:var(--border-soft);}
.shot img{height:100%;width:100%;object-fit:cover;display:block;}
.shot button{position:absolute;top:1px;right:1px;height:1.125rem;width:1.125rem;border-radius:9999px;
  border:0;background:rgb(15 23 42 / .65);color:#fff;display:flex;align-items:center;justify-content:center;
  line-height:0;padding:0;}
.add-shot{display:flex;height:3.5rem;width:3.5rem;align-items:center;justify-content:center;
  border-radius:var(--r-sm);border:1px dashed var(--muted-3);background:#fff;color:var(--muted);
  transition:border-color .15s,background-color .15s;}
.add-shot:hover{border-color:var(--muted);background:var(--bg);}
.add-shot:disabled{opacity:.4;pointer-events:none;}

/* 要対応 */
.todo{border:1px solid var(--am-200);background:#fffbeb80;border-radius:var(--r);padding:.625rem;}
.todo.fixed{border-color:var(--border);background:var(--bg);}
.todo-h{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.375rem;}
.todo-i{font-size:12px;font-weight:600;color:#334155;}
.todo-a{display:flex;align-items:center;gap:.25rem;}
.tg{border-radius:var(--r-sm);padding:.125rem .5rem;font-size:11px;font-weight:500;border:0;
  background:#fff;color:var(--muted);box-shadow:inset 0 0 0 1px var(--border);}
.tg.on{background:var(--em-100);color:var(--em-700);box-shadow:none;}
.ico-btn{border-radius:var(--r-sm);padding:.25rem;color:var(--muted-3);background:transparent;border:0;line-height:0;}
.ico-btn:hover{background:#fff;color:var(--rose-500);}
.todo textarea{height:3.5rem;width:100%;resize:none;border-radius:var(--r-sm);border:1px solid var(--border);
  background:#fff;padding:.375rem .5rem;font-size:12px;line-height:1.6;}
.todo textarea:focus-visible{outline:1px solid var(--fg);}

/* トースト */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:50;width:20rem;
  border:1px solid var(--border);border-radius:var(--r-lg);background:#fff;padding:1rem;box-shadow:var(--sh-lg);}
.toast-t{font-size:14px;font-weight:500;}
.toast-b{margin-top:.125rem;font-size:12px;color:var(--muted);word-break:break-all;}

/* 勤怠 */
.kt-row{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;}
.kt-row + .kt-row{border-top:1px solid var(--border-soft);}
.kt-nm{font-size:18px;font-weight:600;min-width:5rem;}
.kt-st{flex:1;font-size:14px;color:var(--muted-2);}
.kt-st.has{color:var(--fg);}
.kt-b{display:flex;gap:.5rem;}
.kt-h{display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);padding:1rem 1.25rem;}
.kt-h h2{margin:0;font-size:16px;font-weight:600;}
.kt-f{display:flex;align-items:center;justify-content:space-between;gap:1rem;
  border-top:1px solid var(--border-soft);padding:.875rem 1.25rem;}
.kt-f span{font-size:12px;color:var(--muted-2);}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th,.tbl td{border-bottom:1px solid var(--border-soft);padding:.5rem .625rem;text-align:left;}
.tbl th{font-weight:500;color:var(--muted);background:var(--bg);font-size:12px;}
.tbl td.sun,.tbl th.sun{color:var(--rose-500);}
.tbl td.sat,.tbl th.sat{color:var(--blue-500);}
.tbl input[type=time]{border:1px solid var(--border);border-radius:var(--r-sm);padding:.125rem .25rem;
  font-size:12px;background:#fff;}
.tbl tr.off td{background:#fff1f240;}

@media(max-width:768px){
  .wrap{padding:0 1rem;}
  .hd-nav button span{display:none;}
  .hd-nav button{padding:.5rem;}
  .stat{padding:1rem;} .stat-v{font-size:24px;}
  .cell{min-height:4.5rem;padding:.25rem;}
  .pill{font-size:10px;}
  .modal{padding:1.25rem;}
  .phases{grid-template-columns:1fr;}
  .toast{left:1rem;right:1rem;width:auto;}
}
@media(prefers-reduced-motion:reduce){ *{transition:none !important;animation:none !important;} }

/* ══ 全体を少し大きく（px固定のサイズを底上げ・約1.15倍） ══ */
.hd-t1{font-size:17px;} .hd-t2{font-size:12px;}
.hd-nav button{font-size:15px;}
.stat-l{font-size:15px;} .stat-v{font-size:34px;} .stat-sub{font-size:12px;}

<body>

<header class="hd">
  <div class="wrap hd-in">
    <div class="hd-brand">
      <span class="hd-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></svg></span>
      <span>
        <span class="hd-t1" style="display:block">清掃管理</span>
        <span class="hd-t2" style="display:block">Cleaning Manager</span>
      </span>
    </div>
    <nav class="hd-nav">
      <button data-tab="cal" class="on"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 10h18"/><rect width="18" height="18" x="3" y="4" rx="2"/></svg><span>カレンダー</span></button>
      <button data-tab="prop"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></svg><span>物件管理</span></button>
      <button data-tab="kt"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>勤怠</span></button>
      <button data-tab="set"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg><span>LINE設定</span></button>
    </nav>
  </div>
</header>

<main class="wrap">

  <!-- カレンダー -->
  <div class="page on" id="page-cal">
    <div class="stats">
      <div class="card stat">
        <div class="stat-h"><span class="stat-i teal"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 10h18"/><rect width="18" height="18" x="3" y="4" rx="2"/></svg></span><span class="stat-l">予定数</span></div>
        <div class="stat-v tabnum" id="st-total">0</div>
      </div>
      <div class="card stat">
        <div class="stat-h"><span class="stat-i em"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg></span><span class="stat-l">完了</span></div>
        <div class="stat-v tabnum" id="st-done">0</div>
      </div>
      <div class="card stat">
        <div class="stat-h"><span class="stat-i am"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4M12 17h.01"/></svg></span><span class="stat-l">要対応</span></div>
        <div class="stat-v tabnum" id="st-ng">0</div>
      </div>
      <div class="card stat">
        <div class="stat-h"><span class="stat-i sl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><span class="stat-l">未完了</span></div>
        <div class="stat-v tabnum" id="st-yet">0</div>
      </div>
    </div>

    <div class="cols">
      <div class="card">
        <div class="cal-h">
          <h2 id="cal-title">—</h2>
          <div class="cal-nav">
            <button class="btn btn-ghost btn-icon" id="cal-prev" aria-label="前の月"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
            <button class="btn btn-ghost btn-sm" id="cal-today">今日</button>
            <button class="btn btn-ghost btn-icon" id="cal-next" aria-label="次の月"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
          </div>
        </div>
        <div class="cal-wd">
          <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
        </div>
        <div class="cal-g" id="cal-grid"></div>
      </div>

      <div>
        <div class="side-h"><h3 id="side-date">—</h3><span id="side-count">0件</span></div>
        <div class="side-list" id="side-list"></div>
      </div>
    </div>
  </div>

  <!-- 物件管理 -->
  <div class="page" id="page-prop">
    <div class="ptab-h">
      <div>
        <h1>物件管理</h1>
        <p>清掃対象の物件を管理し、スケジュールを登録します</p>
      </div>
      <button class="btn btn-default" id="p-add"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg> 物件追加</button>
    </div>
    <div class="filters">
      <input class="input" id="p-q" placeholder="物件名・住所で絞り込む">
      <button class="fbtn on" data-city="all">すべて</button>
      <button class="fbtn" data-city="fukuyama">福山市</button>
      <button class="fbtn" data-city="kurashiki">倉敷市</button>
      <button class="fbtn" data-city="okayama">岡山市</button>
      <button class="fbtn" data-city="other">その他</button>
      <span class="fcount" id="p-count">0件</span>
    </div>
    <div class="grid3" id="p-grid"></div>
  </div>

  <!-- 勤怠 -->
  <div class="page" id="page-kt">
    <div class="ptab-h">
      <div>
        <h1>勤怠</h1>
        <p id="kt-date">—</p>
      </div>
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <div class="kt-h"><h2>出勤欠勤簿</h2><span style="font-size:12px;color:var(--muted-2)">この端末に保存されます</span></div>
      <div id="kt-rows"></div>
    </div>
    <div class="stats" id="kt-stats"></div>
    <div class="card" style="margin-bottom:1.5rem;padding:1.25rem">
      <div id="kt-per"></div>
    </div>
    <div class="card">
      <div class="kt-h">
        <h2 id="kt-mon">—</h2>
        <div class="cal-nav">
          <button class="btn btn-ghost btn-icon" id="kt-prev" aria-label="前の月"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
          <button class="btn btn-ghost btn-icon" id="kt-next" aria-label="次の月"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
        </div>
      </div>
      <div style="overflow-x:auto"><table class="tbl" id="kt-tbl"></table></div>
      <div class="kt-f">
        <span>時刻をクリックすると直接なおせます</span>
        <button class="btn btn-outline btn-sm" id="kt-pdf"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg> PDFで出す</button>
      </div>
    </div>
  </div>

  <!-- LINE設定 -->
  <div class="page" id="page-set">
    <div class="card" style="max-width:36rem;margin:0 auto;padding:1.5rem">
      <h2 style="margin:0 0 .25rem;font-size:18px;font-weight:600">LINE設定</h2>
      <p style="margin:0 0 1.25rem;font-size:14px;color:var(--muted)">PDF報告書の送信先と、GASの連携先を登録します。</p>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="field"><label>始業時刻（遅刻の判定に使います）</label>
          <input type="time" class="input" id="cfg-start" style="max-width:9rem"></div>
        <div class="field"><label>PDF送信先メールアドレス</label>
          <input class="input" id="cfg-mail" placeholder="例: report@example.com"></div>
        <div class="field"><label>GAS Webhook URL</label>
          <input class="input" id="cfg-gas" placeholder="https://script.google.com/macros/s/.../exec">
          <span style="font-size:12px;color:var(--muted-2);line-height:1.6">
            未設定のときは、送信ボタンで印刷ダイアログが開きます。そこからPDFとして保存できます。
          </span>
        </div>
        <div><button class="btn btn-default" id="cfg-save">保存する</button></div>
      </div>
      <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border-soft)">
        <h2 style="margin:0 0 .25rem;font-size:16px;font-weight:600">データの移行</h2>
        <p style="margin:0 0 1rem;font-size:13px;color:var(--muted);line-height:1.7">
          旧アプリ kintai.html の清掃報告・写真・スケジュール・勤怠を取り込みます。
        </p>
        <button class="btn btn-outline" id="cfg-import">📥 kintai から取り込み</button>
      </div>
    </div>
  </div>

</main>

const ymd = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

const parseYmd = (s) => { const [y, m, d] = s.split("-").map(Number); return new Date(y, m - 1, d); };
const fmtDate = (s) => { const d = parseYmd(s); return `${d.getMonth() + 1}月${d.getDate()}日(${WD[d.getDay()]})`; };

const jparse = (s, fb) => { try { const v = JSON.parse(s); return v == null ? fb : v; } catch (e) { return fb; } };
function load(k, fb) { return jparse(localStorage.getItem(k), fb); }
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); return true; }
  catch (e) {
    toast("保存できませんでした", "端末の空き容量が不足しています。古い写真を消してください。");
    return false;

}

function getRep(n, d) { return reps[repId(n, d)] || blankRep(); }
function setRep(n, d, patch) {
  reps[repId(n, d)] = Object.assign(getRep(n, d), patch, { ts: Date.now() });
  save(K.reps, reps);
}
const itemOf = (r, k) => r.items[k] || { photos: [], ok: false };
const openNg = (r) => (r.todos || []).filter((t) => !t.fixed).length;
/* 要対応は before/after、通常項目は photos（1系統） */

/* ===== トースト ===== */
let toastTimer = null;
function toast(title, body) {
  const el = document.getElementById("toast");
  el.innerHTML = `<div class="toast-t">${esc(title)}</div>${body ? `<div class="toast-b">${esc(body)}</div>` : ""}`;
  el.classList.remove("hide");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add("hide"), 3600);
}

/* ===== 写真（圧縮して dataURL 化：kintai.html と同仕様 1000px / JPEG 0.7） ===== */
function shrink(f) {
  return new Promise((res, rej) => {
    const rd = new FileReader();
    rd.onerror = () => rej(new Error("read"));
    rd.onload = () => {
      const img = new Image();
      img.onerror = () => rej(new Error("img"));
      img.onload = () => {
        const max = 1000; let w = img.width, h = img.height;
        if (w > h && w > max) { h = Math.round((h * max) / w); w = max; }
        else if (h >= w && h > max) { w = Math.round((w * max) / h); h = max; }
        const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, 0, 0, w, h);
        let data; try { data = cv.toDataURL("image/jpeg", 0.7); } catch (e) { data = rd.result; }
        res(data);
      };
      img.src = rd.result;
    };
    rd.readAsDataURL(f);
  });
}
function pickFiles(cb) {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*"; inp.capture = "environment"; inp.multiple = true;
  inp.onchange = () => cb(Array.from(inp.files || []));
  inp.click();
}
const SHOT_MAX = 3;
/* target: {kind:"item", key} または {kind:"todo", id, phase} */
function addShots(target) {
  pickFiles(async (files) => {
    files = files.filter((f) => !f.type || /^image\//.test(f.type));
    if (!files.length) return;
    const r = getRep(openRep.name, openRep.date);
    let arr, limitName;
    if (target.kind === "item") {
      const it = itemOf(r, target.key);
      it.photos = it.photos || [];
      arr = it.photos; limitName = "写真";
      r.items[target.key] = it;
    } else {
      const t = (r.todos || []).find((x) => x.id === target.id);
      if (!t) return;
      arr = todoShots(t, target.phase);
      limitName = target.phase === "before" ? "ビフォー" : "アフター";
    }
    const room = SHOT_MAX - arr.length;
    if (room <= 0) { toast("これ以上追加できません", `${limitName}は最大${SHOT_MAX}枚です`); return; }
    const use = files.slice(0, room);
    for (const f of use) {
      try { arr.push(await shrink(f)); } catch (e) { /* 1枚失敗しても続行 */ }
    }
    setRep(openRep.name, openRep.date, { items: r.items, todos: r.todos });
    renderModal();
    if (files.length > room) toast(`${use.length}枚を追加しました`, `上限${SHOT_MAX}枚のため残りは追加していません`);
  });
}
function delShot(target, i) {
  const r = getRep(openRep.name, openRep.date);
  if (target.kind === "item") {
    const it = itemOf(r, target.key);
    (it.photos || []).splice(i, 1);
    r.items[target.key] = it;
  } else {
    const t = (r.todos || []).find((x) => x.id === target.id);
    if (!t) return;
    todoShots(t, target.phase).splice(i, 1);
  }
  setRep(openRep.name, openRep.date, { items: r.items, todos: r.todos });
  renderModal();
}

/* ===== 集計 ===== */
function dayStats(date) {
  const list = sched[date] || [];
  let done = 0, ng = 0;
  list.forEach((n) => {
    const r = getRep(n, date);
    if (r.status === "done") done++;
    ng += openNg(r);
  });
  return { total: list.length, done, ng, yet: list.length - done };
}

/* ===== 描画：カレンダー ===== */
function renderCal() {
  const s = dayStats(selDate);
  document.getElementById("st-total").textContent = s.total;
  document.getElementById("st-done").textContent = s.done;
  document.getElementById("st-ng").textContent = s.ng;
  document.getElementById("st-yet").textContent = s.yet;
  document.getElementById("cal-title").textContent = `${cursor.y}年 ${cursor.m + 1}月`;

  const first = new Date(cursor.y, cursor.m, 1);
  const start = new Date(first); start.setDate(1 - first.getDay());
  let h = "";
  for (let i = 0; i < 42; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const ds = ymd(d), out = d.getMonth() !== cursor.m;
    const list = sched[ds] || [], dow = d.getDay();
    const dcls = ["cell-d", out ? "out" : (ds === today() ? "today" : dow === 0 ? "sun" : dow === 6 ? "sat" : "")].join(" ");
    let pills = list.slice(0, 3).map((n) => {
      const p = props.find((x) => x.name === n) || {};
      const st = CITY_STYLE[cityOf(p.addr).key];
      const done = getRep(n, ds).status === "done";
      return `<span class="pill ${done ? "done" : ""}"><i style="background:${st.dot}"></i><span>${esc(n)}</span></span>`;
    }).join("");
    if (list.length > 3) pills += `<span class="pill-more">ほか${list.length - 3}件</span>`;
    h += `<button class="cell ${out ? "out" : ""} ${ds === selDate ? "sel" : ""}" data-d="${ds}">
      <span class="${dcls}">${d.getDate()}</span>${pills}</button>`;
  }
  document.getElementById("cal-grid").innerHTML = h;
  document.querySelectorAll("#cal-grid .cell").forEach((b) => {
    b.onclick = () => { selDate = b.dataset.d; renderCal(); };
  });
  renderSide();
}

function renderSide() {
  document.getElementById("side-date").textContent = fmtDate(selDate);
  const list = sched[selDate] || [];
  document.getElementById("side-count").textContent = `${list.length}件`;
  const wrap = document.getElementById("side-list");

  if (!list.length) {
    wrap.innerHTML = `<div class="card empty">予定はありません。<br>物件管理から清掃を予定してください。</div>`;
    return;
  }
  wrap.innerHTML = list.map((n) => {
    const p = props.find((x) => x.name === n) || { addr: "" };
    const r = getRep(n, selDate);
    const c = cityOf(p.addr), st = CITY_STYLE[c.key];
    let ph = 0, b = 0, a = 0;
    Object.values(r.items || {}).forEach((it) => { ph += (it.photos || []).length; });
    (r.todos || []).forEach((t) => { b += (t.before || []).length; a += (t.after || []).length; });
    const ng = openNg(r);
    const badge = r.status === "done" ? `<span class="badge badge-emerald">完了</span>`
      : r.status === "doing" ? `<span class="badge badge-amber">清掃中</span>`
      : `<span class="badge badge-slate">未着手</span>`;
    return `<div class="card pcard" data-n="${esc(n)}">
      <div class="pcard-h"><div class="pcard-n">${esc(n)}</div>${badge}</div>
      <div class="pcard-a">${esc(p.addr)}</div>
      <div class="pcard-m">
        <span class="chip" style="background:${st.bg};color:${st.fg}"><i style="background:${st.dot}"></i>${c.label}</span>
        <span class="mini">${ic("camera", 12)} ${ph}枚</span>
        ${(b || a) ? `<span class="mini">${ic("camera", 12)} 前${b}／後${a}</span>` : ""}
        ${ng ? `<span class="badge badge-amber">要対応 ${ng}</span>` : ""}
      </div></div>`;
  }).join("") + sendCardHTML();

  wrap.querySelectorAll(".pcard").forEach((c) => {
    c.onclick = () => { openRep = { name: c.dataset.n, date: selDate }; openItem = null; renderModal(); };
  });
  const sb = document.getElementById("send-btn");
  if (sb) sb.onclick = sendMail;
}

function sendCardHTML() {
  const s = dayStats(selDate);
  if (!s.total) return "";
  const ready = s.done === s.total;
  return `<div class="card send ${ready ? "ready" : ""}">
    <div class="send-h">
      ${ready ? `<span style="color:var(--teal-700);line-height:0">${ic("check2", 16)}</span>
                 <span style="font-weight:500;color:var(--teal-900)">全物件の清掃が完了しました</span>`
              : `<span style="color:var(--muted-2);line-height:0">${ic("clock", 16)}</span>
                 <span style="color:var(--muted)">残り${s.yet}件で送信できます</span>`}
    </div>
    ${ready && s.ng ? `<div class="send-warn">${ic("alert", 13)}<span>要対応が${s.ng}件あります。このまま送信できます。</span></div>` : ""}
    <button class="btn btn-default" id="send-btn" style="width:100%" ${ready ? "" : "disabled"}>
      ${ic("mail", 15)} PDF報告書をメール送信
    </button>
    <div class="send-to">送信先：${cfg.mail ? esc(cfg.mail) : "未設定（LINE設定タブで登録）"}</div>
  </div>`;
}

async function sendMail() {
  const s = dayStats(selDate);
  if (s.done !== s.total || !s.total) return;
  const html = buildReportHTML(selDate);

  if (!cfg.gas) {
    // GAS未設定：印刷ダイアログからPDF保存
    const w = window.open("", "_blank");
    if (!w) { toast("ポップアップがブロックされました", "このサイトのポップアップを許可してください"); return; }
    w.document.write(html); w.document.close();
    setTimeout(() => w.print(), 400);
    toast("PDFを開きました", "送信先を自動化するにはLINE設定でGAS URLを登録してください");
    return;
  }
  const btn = document.getElementById("send-btn");
  if (btn) { btn.disabled = true; btn.textContent = "送信中…"; }
  try {
    await fetch(cfg.gas, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ type: "cleanReport", date: selDate, to: cfg.mail, html, ng: s.ng }),
    });
    toast("メールを送信しました", `${cfg.mail}${s.ng ? `（要対応 ${s.ng}件を含む）` : ""}`);
  } catch (e) {
    toast("送信できませんでした", "通信状況とGAS URLを確認してください");
  }
  renderSide();
}

/* ===== kintai.html からの取り込み（構造変換） ===== */
const KINTAI_SEP = "\u241F"; // kintai の reportId 区切り文字
// kintai の写真 {src,flag,phase} を seisou の dataURL 文字列へ
function kSrc(ph) {
  if (typeof ph === "string") return ph;
  if (ph && typeof ph.src === "string") return ph.src;
  return null;
}
function convertKintai(bundle) {
  const warn = [];
  const out = { props: null, sched: null, reps: {}, kintai: {}, staff: null };

  // 物件：そのまま使える（name/addr/mno）
  if (Array.isArray(bundle.props)) out.props = bundle.props;

  // スケジュール：構造同一
  if (bundle.schedule && typeof bundle.schedule === "object" && !Array.isArray(bundle.schedule)) {
    out.sched = bundle.schedule;
  }

  // 報告：kintai {prop,date,items{photos:[{src,phase}]},todos:[{text,done,photos}],noIssue}
  //   → seisou {status,staff,note,items{photos:[url]},todos:[{item,text,fixed,before,after}]}
  if (bundle.reports && typeof bundle.reports === "object") {
    Object.keys(bundle.reports).forEach((kid) => {
      const kr = bundle.reports[kid];
      if (!kr) return;
      const name = kr.prop, date = kr.date;
      if (!name || !date) { warn.push("物件名か日付の無い報告を1件スキップしました"); return; }

      // 通常項目：kintai は phase 混在 → seisou の items.photos は「箇所の写真」なので
      // before/after 問わず全部 photos に集約（要対応でない項目は単一系統でよい）
      const items = {};
      Object.keys(kr.items || {}).forEach((key) => {
        const it = kr.items[key];
        const photos = (Array.isArray(it.photos) ? it.photos : [])
          .map(kSrc).filter(Boolean);
        items[key] = { photos, ok: photos.length > 0 || !!it.ok };
      });

      // 要対応：kintai todos.photos(phase混在) → before/after に振り分け
      const todos = (Array.isArray(kr.todos) ? kr.todos : []).map((t) => {
        const before = [], after = [];
        (Array.isArray(t.photos) ? t.photos : []).forEach((ph) => {
          const src = kSrc(ph); if (!src) return;
          if (ph && ph.phase === "after") after.push(src); else before.push(src);
        });
        return {
          id: t.id || String(Date.now() + Math.random()),
          item: t.item || "要対応",   // kintai は項目名を持たない → 既定
          text: t.text || "",
          fixed: !!t.done,             // done → fixed
          before, after,
        };
      });

      // ステータス：kintai は明示ステータスを持たない
      //   noIssue か、写真/チェックが1つでもあれば「完了」、それ以外「未着手」
      const hasContent = Object.keys(items).length || todos.length || kr.noIssue;
      const status = hasContent ? "done" : "yet";

      out.reps[`${name}|${date}`] = {
        status, staff: "", note: kr.noIssue ? "（要対応なしで登録）" : "",
        items, todos, ts: kr.ts || Date.now(),
      };
    });
  }

  // 勤怠：kintai {日付:{harada:{in,out,off}, oishi:{...}}} → seisou {日付:{原田:{...}, 大石:{...}}}
  const NAME_MAP = { harada: "原田", oishi: "大石" };
  if (bundle.kintaiBook && typeof bundle.kintaiBook === "object") {
    Object.keys(bundle.kintaiBook).forEach((day) => {
      const rec = bundle.kintaiBook[day]; if (!rec) return;
      out.kintai[day] = {};
      Object.keys(rec).forEach((pk) => {
        const jp = NAME_MAP[pk] || pk;
        const r = rec[pk] || {};
        out.kintai[day][jp] = { in: r.in || "", out: r.out || "", off: !!r.off };
      });
    });
  }

  return { out, warn };
}

function applyKintaiImport(bundle, mode) {
  const { out, warn } = convertKintai(bundle);
  // mode: "merge"（既存に足す） / "replace"（置き換え）
  if (out.props && (mode === "replace" || !props.length)) { props = out.props; save(K.props, props); }
  else if (out.props && mode === "merge") {
    const names = new Set(props.map((p) => p.name));
    out.props.forEach((p) => { if (!names.has(p.name)) props.push(p); });
    save(K.props, props);
  }
  if (out.sched) {
    if (mode === "replace") sched = out.sched;
    else Object.keys(out.sched).forEach((d) => {
      sched[d] = Array.from(new Set([...(sched[d] || []), ...out.sched[d]]));
    });
    save(K.sched, sched);
  }
  if (mode === "replace") reps = out.reps;
  else Object.assign(reps, out.reps);   // 同じ物件|日付は kintai 側で上書き
  save(K.reps, reps);
  if (mode === "replace") kintai = out.kintai;
  else Object.keys(out.kintai).forEach((d) => {
    kintai[d] = Object.assign(kintai[d] || {}, out.kintai[d]);
  });
  save(K.kintai, kintai);

  const nReps = Object.keys(out.reps).length;
  let nPh = 0;
  Object.values(out.reps).forEach((r) => {
    Object.values(r.items).forEach((it) => (nPh += it.photos.length));
    r.todos.forEach((t) => (nPh += t.before.length + t.after.length));
  });
  return {
    props: out.props ? out.props.length : 0,
    days: out.sched ? Object.keys(out.sched).length : 0,
    reps: nReps, photos: nPh,
    kt: Object.keys(out.kintai).length,
    warn,
  };
}

      rd.readAsText(f);

  };

/* ===== 勤怠 ===== */
function ktOf(d) { return kintai[d] || {}; }
function setKt(d, name, patch) {
  kintai[d] = kintai[d] || {};
  kintai[d][name] = Object.assign({ in: "", out: "", off: false }, kintai[d][name], patch);
  save(K.kintai, kintai);
}
function clearKt(d, name) {
  if (kintai[d]) {
    delete kintai[d][name];
    if (!Object.keys(kintai[d]).length) delete kintai[d];
    save(K.kintai, kintai);
  }
}
function nowHM() { const d = new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
const hm2min = (s) => { if (!s) return null; const [h, m] = s.split(":").map(Number); return h * 60 + m; };

/* 月の勤怠集計：記録のある日だけを母数にする（未来日・未記録日は数えない） */
function ktStats(y, m) {
  const last = new Date(y, m + 1, 0).getDate();
  const startMin = hm2min(cfg.start) ?? 540;
  const per = {};
  cfg.staff.forEach((n) => (per[n] = { days: 0, ontime: 0, late: 0, off: 0, lateMin: 0 }));
  for (let i = 1; i <= last; i++) {
    const ds = `${y}-${pad(m + 1)}-${pad(i)}`;
    const rec = kintai[ds] || {};
    cfg.staff.forEach((n) => {
      const r = rec[n];
      if (!r) return;
      if (r.off) { per[n].days++; per[n].off++; return; }
      if (!r.in) return;                     // 打刻なしは母数に入れない
      per[n].days++;
      const d = hm2min(r.in) - startMin;
      if (d > 0) { per[n].late++; per[n].lateMin += d; }
      else per[n].ontime++;
    });
  }
  const tot = { days: 0, ontime: 0, late: 0, off: 0, lateMin: 0 };
  Object.values(per).forEach((v) => {
    tot.days += v.days; tot.ontime += v.ontime; tot.late += v.late;
    tot.off += v.off; tot.lateMin += v.lateMin;
  });
  return { per, tot };
}
const pct = (a, b) => (b ? Math.round((a / b) * 1000) / 10 : 0);

function renderKintai() {
  const d = today();
  const rec = ktOf(d);
  document.getElementById("kt-date").textContent =
    `${new Date().getFullYear()}年${new Date().getMonth() + 1}月${new Date().getDate()}日（${WD[new Date().getDay()]}）`;

  document.getElementById("kt-rows").innerHTML = cfg.staff.map((n) => {
    const r = rec[n] || {};
    const st = r.off ? "欠勤" : r.in ? `出勤 ${r.in}` : "まだ記録がありません";
    const punchedIn = !!r.in;
    return `<div class="kt-row">
      <span class="kt-nm">${esc(n)}</span>
      <span class="kt-st ${r.off || r.in ? "has" : ""}">${st}</span>
      <span class="kt-b">
        <button class="btn ${punchedIn ? "btn-default" : "btn-outline"} btn-kt"
          data-punch="${esc(n)}" ${r.off ? "disabled" : ""}>
          ${punchedIn ? "出勤取消" : "出勤"}
        </button>
        <button class="btn ${r.off ? "btn-default" : "btn-outline"} btn-kt" data-off="${esc(n)}">
          ${r.off ? "欠勤取消" : "欠勤"}
        </button>
      </span></div>`;
  }).join("");

  // 出勤：クリックで打刻、もう一度で取消
  document.querySelectorAll("[data-punch]").forEach((b) => {
    b.onclick = () => {
      const n = b.dataset.punch, r = ktOf(d)[n] || {};
      if (r.off) { toast("欠勤になっています", `${n}の欠勤を取り消してから打刻してください`); return; }
      if (r.in) {
        clearKt(d, n);
        toast("出勤の打刻を取消しました", n);
      } else {
        setKt(d, n, { in: nowHM() });
        toast("出勤を記録しました", `${n} ${nowHM()}`);
      }
      renderKintai();
    };
  });
  document.querySelectorAll("[data-off]").forEach((b) => {
    b.onclick = () => {
      const n = b.dataset.off, r = ktOf(d)[n] || {};
      if (r.off) { clearKt(d, n); }            // 欠勤取消 → 完全削除
      else { setKt(d, n, { off: true, in: "", out: "" }); }
      renderKintai();
    };
  });
  renderKtTable();
}

function renderKtTable() {
  document.getElementById("kt-mon").textContent = `${ktMonth.y}年${ktMonth.m + 1}月`;

  /* 集計（正着率・遅刻・欠勤） */
  const { per, tot } = ktStats(ktMonth.y, ktMonth.m);
  document.getElementById("kt-stats").innerHTML = `
    <div class="card stat">
      <div class="stat-h"><span class="stat-i em">${ic("check2", 16)}</span><span class="stat-l">正着率</span></div>
      <div class="stat-v tabnum">${pct(tot.ontime, tot.days)}<span style="font-size:16px;font-weight:500">%</span></div>
      <div class="stat-sub">${tot.ontime} / ${tot.days}日（定時 ${esc(cfg.start)}）</div>
    </div>
    <div class="card stat">
      <div class="stat-h"><span class="stat-i am">${ic("clock", 16)}</span><span class="stat-l">遅刻</span></div>
      <div class="stat-v tabnum">${pct(tot.late, tot.days)}<span style="font-size:16px;font-weight:500">%</span></div>
      <div class="stat-sub">${tot.late}回${tot.lateMin ? `／計${tot.lateMin}分` : ""}</div>
    </div>
    <div class="card stat">
      <div class="stat-h"><span class="stat-i sl">${ic("alert", 16)}</span><span class="stat-l">欠勤</span></div>
      <div class="stat-v tabnum">${pct(tot.off, tot.days)}<span style="font-size:16px;font-weight:500">%</span></div>
      <div class="stat-sub">${tot.off}日</div>
    </div>
    <div class="card stat">
      <div class="stat-h"><span class="stat-i teal">${ic("user", 16)}</span><span class="stat-l">記録日数</span></div>
      <div class="stat-v tabnum">${tot.days}</div>
      <div class="stat-sub">打刻・欠勤のある日のみ集計</div>
    </div>`;

  /* 個人別 */
  document.getElementById("kt-per").innerHTML = cfg.staff.map((n) => {
    const v = per[n];
    return `<div class="perrow">
      <span class="pername">${esc(n)}</span>
      <span class="perbar"><i style="width:${pct(v.ontime, v.days)}%"></i></span>
      <span class="perval tabnum">正着 ${pct(v.ontime, v.days)}%</span>
      <span class="permeta">遅刻${v.late}／欠勤${v.off}／${v.days}日</span>
    </div>`;
  }).join("");

  const last = new Date(ktMonth.y, ktMonth.m + 1, 0).getDate();
  let h = `<tr><th style="width:5.5rem">日付</th>${cfg.staff.map((n) => `<th>${esc(n)}</th>`).join("")}</tr>`;
  const startMin = hm2min(cfg.start) ?? 540;
  for (let i = 1; i <= last; i++) {
    const ds = `${ktMonth.y}-${pad(ktMonth.m + 1)}-${pad(i)}`;
    const dow = new Date(ktMonth.y, ktMonth.m, i).getDay();
    const cls = dow === 0 ? "sun" : dow === 6 ? "sat" : "";
    const rec = ktOf(ds);
    const cells = cfg.staff.map((n) => {
      const r = rec[n] || {};
      if (r.off) return `<td style="color:var(--rose-500)">欠勤</td>`;
      const isLate = r.in && hm2min(r.in) > startMin;
      const [hh, mm] = (r.in || "").split(":");
      const hOpts = ['<option value="">--</option>']
        .concat(Array.from({ length: 24 }, (_, k) => {
          const v = pad(k); return `<option value="${v}" ${v === hh ? "selected" : ""}>${v}</option>`;
        })).join("");
      const mOpts = ['<option value="">--</option>']
        .concat(Array.from({ length: 60 }, (_, k) => {
          const v = pad(k); return `<option value="${v}" ${v === mm ? "selected" : ""}>${v}</option>`;
        })).join("");
      return `<td>
        <span class="timepick ${isLate ? "late" : ""}">
          <select class="ktsel" data-kt="${ds}|${n}|h">${hOpts}</select>
          <span class="tpsep">:</span>
          <select class="ktsel" data-kt="${ds}|${n}|m">${mOpts}</select>
        </span>
        ${isLate ? `<span class="latetag">遅刻</span>` : ""}</td>`;
    }).join("");
    h += `<tr class="${Object.values(rec).some((r) => r.off) ? "off" : ""}">
      <td class="${cls}">${i}日(${WD[dow]})</td>${cells}</tr>`;
  }
  document.getElementById("kt-tbl").innerHTML = h;
  document.querySelectorAll(".ktsel").forEach((sel) => {
    sel.onchange = () => {
      const [ds, n, part] = sel.dataset.kt.split("|");
      const cell = sel.closest("td");
      const hSel = cell.querySelector('[data-kt$="|h"]');
      const mSel = cell.querySelector('[data-kt$="|m"]');
      const hh = hSel ? hSel.value : "";
      const mm = mSel ? mSel.value : "";
      const hadRecord = !!(ktOf(ds)[n] && ktOf(ds)[n].in);
      if (hh && mm) {
        // 両方そろった → 保存
        setKt(ds, n, { in: `${hh}:${mm}`, off: false });
        renderKintai();
      } else if (hadRecord) {
        // 既存の記録があって、片方を -- にした → 削除
        clearKt(ds, n);
        renderKintai();
      }
      // 新規入力の途中（片方だけ選択、記録なし）は何もせず、もう片方の選択を待つ
    };
  });
}

function ktPdf() {
  const last = new Date(ktMonth.y, ktMonth.m + 1, 0).getDate();
  const { per, tot } = ktStats(ktMonth.y, ktMonth.m);
  const startMin = hm2min(cfg.start) ?? 540;
  let rows = "";
  for (let i = 1; i <= last; i++) {
    const ds = `${ktMonth.y}-${pad(ktMonth.m + 1)}-${pad(i)}`;
    const dow = new Date(ktMonth.y, ktMonth.m, i).getDay();
    const rec = ktOf(ds);
    const tds = cfg.staff.map((n) => {
      const r = rec[n] || {};
      if (r.off) return `<td class="off">欠勤</td>`;
      if (!r.in) return `<td></td>`;
      const late = hm2min(r.in) > startMin;
      return `<td>${r.in}${late ? ` <b class="lt">遅</b>` : ""}</td>`;
    }).join("");
    rows += `<tr class="${dow === 0 ? "sun" : dow === 6 ? "sat" : ""}"><td>${i}日(${WD[dow]})</td>${tds}</tr>`;
  }
  const sum = cfg.staff.map((n) => {
    const v = per[n];
    return `<tr><td>${esc(n)}</td><td>${pct(v.ontime, v.days)}%</td><td>${v.late}回${v.lateMin ? `／${v.lateMin}分` : ""}</td><td>${v.off}日</td><td>${v.days}日</td></tr>`;
  }).join("");
  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>出勤簿 ${ktMonth.y}-${pad(ktMonth.m + 1)}</title>
<style>body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;margin:24px;color:#0f172a;}
h1{font-size:18px;margin:0 0 2px;} .sub{font-size:11px;color:#64748b;margin:0 0 14px;}
h2{font-size:13px;margin:16px 0 6px;}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px;}
th,td{border:1px solid #cbd5e1;padding:5px 8px;text-align:left;}
th{background:#f1f5f9;} tr.sun td:first-child{color:#e11d48;} tr.sat td:first-child{color:#2563eb;}
td.off{color:#e11d48;} .lt{color:#b45309;}
.sm th{background:#ecfdf5;}
@media print{body{margin:12mm;}}</style></head><body>
<h1>出勤簿　${ktMonth.y}年${ktMonth.m + 1}月</h1>
<p class="sub">定時 ${esc(cfg.start)}／集計対象 ${tot.days}日（打刻・欠勤のある日のみ）</p>
<h2>集計</h2>
<table class="sm"><tr><th>氏名</th><th>正着率</th><th>遅刻</th><th>欠勤</th><th>記録日数</th></tr>
${sum}
<tr><td><b>全体</b></td><td><b>${pct(tot.ontime, tot.days)}%</b></td><td><b>${tot.late}回${tot.lateMin ? `／${tot.lateMin}分` : ""}</b></td><td><b>${tot.off}日</b></td><td><b>${tot.days}日</b></td></tr>
</table>
<h2>日別</h2>
<table><tr><th style="width:80px">日付</th>${cfg.staff.map((n) => `<th>${esc(n)}</th>`).join("")}</tr>
${rows}</table></body></html>`;
  const w = window.open("", "_blank");
  if (!w) { toast("ポップアップがブロックされました", "このサイトのポップアップを許可してください"); return; }
  w.document.write(html); w.document.close();
  setTimeout(() => w.print(), 400);
}

/* ===== タブ ===== */
function go(t) {
  tab = t;
  document.querySelectorAll(".page").forEach((p) => p.classList.toggle("on", p.id === "page-" + t));
  document.querySelectorAll(".hd-nav button").forEach((b) => b.classList.toggle("on", b.dataset.tab === t));
  if (t === "cal") renderCal();
  if (t === "prop") renderProps();
  if (t === "kt") renderKintai();
}

/* ===== 起動 ===== */
function boot() {
  document.querySelectorAll(".hd-nav button").forEach((b) => { b.onclick = () => go(b.dataset.tab); });
  document.getElementById("cal-prev").onclick = () => {
    cursor = cursor.m === 0 ? { y: cursor.y - 1, m: 11 } : { y: cursor.y, m: cursor.m - 1 };
    renderCal();
  };
  document.getElementById("cal-next").onclick = () => {
    cursor = cursor.m === 11 ? { y: cursor.y + 1, m: 0 } : { y: cursor.y, m: cursor.m + 1 };
    renderCal();
  };
  document.getElementById("cal-today").onclick = () => {
    const t = new Date();
    cursor = { y: t.getFullYear(), m: t.getMonth() };
    selDate = today(); renderCal();
  };
  document.getElementById("p-add").onclick = openAdd;
  document.getElementById("p-q").oninput = (e) => { filterQ = e.target.value.trim(); renderProps(); };
  document.querySelectorAll("[data-city]").forEach((b) => {
    b.onclick = () => {
      filterCity = b.dataset.city;
      document.querySelectorAll("[data-city]").forEach((x) => x.classList.toggle("on", x === b));
      renderProps();
    };
  });
  document.getElementById("kt-prev").onclick = () => {
    ktMonth = ktMonth.m === 0 ? { y: ktMonth.y - 1, m: 11 } : { y: ktMonth.y, m: ktMonth.m - 1 };
    renderKtTable();
  };
  document.getElementById("kt-next").onclick = () => {
    ktMonth = ktMonth.m === 11 ? { y: ktMonth.y + 1, m: 0 } : { y: ktMonth.y, m: ktMonth.m + 1 };
    renderKtTable();
  };
  document.getElementById("kt-pdf").onclick = ktPdf;

  document.getElementById("cfg-mail").value = cfg.mail;
  document.getElementById("cfg-gas").value = cfg.gas;
  document.getElementById("cfg-start").value = cfg.start || "09:00";
  document.getElementById("cfg-save").onclick = () => {
    cfg.mail = document.getElementById("cfg-mail").value.trim();
    cfg.gas = document.getElementById("cfg-gas").value.trim();
    cfg.start = document.getElementById("cfg-start").value || "09:00";
    save(K.cfg, cfg);
    toast("設定を保存しました", `定時 ${cfg.start}${cfg.mail ? `／${cfg.mail}` : ""}`);
    renderSide();
  };
  document.getElementById("cfg-import").onclick = openImport;
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && document.getElementById("mask")) { openRep = null; renderModal(); renderCal(); }
  });
  go("cal");
}
document.addEventListener("DOMContentLoaded", boot);
</script>
