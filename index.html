function wireMapBtn(){
  const btn=document.getElementById("mapbtn");
  if(!btn) return;
  btn.classList.add("on");
  if(btn._wired) return;
  btn._wired=true;
  // メインは常にマップ＋ドロップボックス。ボタンは先頭へスクロールして資料アップへ誘導するだけ。
  btn.onclick=()=>{ mapMode=true; renderAll();
    const dz=document.getElementById("a_drop"); if(dz){ try{ dz.scrollIntoView({behavior:"smooth",block:"center"}); }catch(e){} }
  };
}
function renderMapView(){
  const m=document.getElementById("main");
  const withRent=props.filter(p=>geoOf(p)&&baseRentOf(p)!=null).length;
  const i=lastAssessInput;
  if(!assessTypeRows.length) assessTypeRows=[{label:"",area:""}];
  const MADORI_OPTS=["1R","1K","1SK","1DK","1SDK","1LDK","1SLDK","2K","2DK","2LDK","2SLDK","3DK","3LDK","4LDK"];
  const typeRowsHtml=assessTypeRows.map((r,idx)=>{
    const known=MADORI_OPTS.includes(r.label);
    const isOther=!!(r.label&&!known);
    return `
    <div class="typerow" data-idx="${idx}">
      <select class="t_label" data-idx="${idx}">
        <option value="" ${!r.label?"selected":""}>間取りを選択</option>
        ${MADORI_OPTS.map(o=>`<option value="${o}" ${r.label===o?"selected":""}>${o}</option>`).join("")}
        <option value="__other__" ${isOther?"selected":""}>その他（自由入力）</option>
      </select>
      <input class="t_labelfree" data-idx="${idx}" type="text" placeholder="間取りを入力" value="${isOther?r.label:""}" style="${isOther?"":"display:none"}">
      <input class="t_area" data-idx="${idx}" type="number" step="0.01" placeholder="面積㎡ 例:40.0" value="${(r.area||r.area===0)?r.area:""}">
      <input class="t_units" data-idx="${idx}" type="number" step="1" min="1" placeholder="戸数 例:12" value="${(r.units||r.units===0)?r.units:""}" title="このタイプの戸数（サブリース率・10年推移の計算に使用）">
      <button class="typedel" data-idx="${idx}" title="削除">×</button>
    </div>`;}).join("");
  const docsHtml=assessDocs.length? `<div class="docgrid">${assessDocs.map((d,idx)=>`
      <div class="doccard">
        <button class="docdel" data-idx="${idx}" title="削除">×</button>
        ${d.kind==="image"
          ? `<img src="${d.url}" alt="${d.name}">`
          : `<div class="docpdf"><div class="docpdf-ic">PDF</div><embed src="${d.url}#toolbar=0" type="application/pdf"></div>`}
        <div class="docname">${d.name}</div>
      </div>`).join("")}</div>` : "";

  // ── 1年経過アラート（データ基準日から12ヶ月以上の物件） ──
  const stale=staleProps(props);
  const alertHtml=stale.length? `
    <div class="stale-alert">
      <div class="stale-alert-h">⏰ 更新時期の物件が ${stale.length}件 あります（データ基準日から1年以上）</div>
      <div class="stale-list">
        ${stale.slice(0,12).map(s=>`<span class="stale-chip" data-openprop="${s.p.id}">${s.p.name}<small>（${s.asof}／${s.months}ヶ月前）</small></span>`).join("")}
        ${stale.length>12?`<span class="stale-more">ほか${stale.length-12}件</span>`:""}
      </div>
      <div class="stale-note">取引成立台帳・年間収支報告書を更新したら、下の「既存物件の更新」からアップし、更新済みにすると消えます。</div>
    </div>` : "";

  // ── 既存物件の更新ドラッグボックス ──
  const updateBoxHtml=`
    <details class="update-box">
      <summary>📂 既存物件の更新（取引成立台帳・年間収支報告書をアップ）</summary>
      <div class="update-inner">
        <div class="uploadbox" id="u_drop">
          <div class="uploadbox-in">
            <div class="uploadbox-ic">＋</div>
            <div class="uploadbox-t">既存物件の資料をここにドラッグ＆ドロップ、またはクリックして選択</div>
            <div class="uploadbox-s">取引成立台帳（家賃・入退去の更新）／年間収支報告書（稼働率の更新）。資料は画面表示するだけで外部送信はしません。</div>
          </div>
          <input id="u_files" type="file" accept="image/*,application/pdf,.xlsx,.xls,.csv" multiple hidden>
        </div>
        <div id="u_docs" class="docgrid"></div>
        <div class="update-mark">
          <label>更新した物件：</label>
          <select id="u_prop"><option value="">物件を選択…</option>${
            props.slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"","ja")).map(p=>`<option value="${p.id}">${p.name}（現基準 ${dataAsOfOf(p)}）</option>`).join("")
          }</select>
          <input id="u_asof" type="month" value="${new Date().toISOString().slice(0,7)}" title="更新後のデータ基準日">
          <button class="mapgo" id="u_mark" style="padding:10px 16px">この物件を更新済みにする</button>
        </div>
        <div class="update-hint">※ この画面ではアップした資料の内容を私（Claude）が読み取って反映します。まず資料をアップし、チャットで「反映して」とお知らせください。「更新済みにする」を押すと、その物件の基準日が更新されアラートが消えます。</div>
      </div>
    </details>`;

  let statsHtml="";
  try{
    let ready=0,na=0,short=0,analyzable=0,recSum=0,recN=0;
    props.forEach(p=>{
      const r=proposalReadiness(p);
      if(r.ineligible) na++; else if(r.ready) ready++; else short++;
      if(p.history){ analyzable++; const rec=forecast10(p).recRate; if(Number.isFinite(rec)){ recSum+=rec; recN++; } }
    });
    const avg = recN ? Math.round((recSum/recN)*10)/10 : null;
    const card=(l,v,s,t)=>`<div class="sccard"><div class="scl"><span class="scdot ${t}"></span>${l}</div><div class="scv">${v}</div><div class="scs">${s}</div></div>`;
    statsHtml=`<div class="scgrid">
      ${card("登録物件", props.length, "広島・岡山の管理物件", "teal")}
      ${card("提案作成可", ready, `不足あり ${short}件 ・ 対象外 ${na}件`, "em")}
      ${card("分析可（履歴あり）", analyzable, `全体の ${props.length?Math.round(analyzable/props.length*100):0}%`, "sl")}
      ${card("推奨料率 平均", avg==null?"—":`${avg}<span class="scu">%</span>`, recN?`${recN}件の平均`:"算出対象なし", "am")}
    </div>`;
  }catch(e){ statsHtml=""; }

  m.innerHTML=`<div class="mapwrap">
    <h3>🗺 新築査定</h3>
    ${statsHtml}
    ${alertHtml}
    ${updateBoxHtml}

    <div class="uploadbox big" id="a_drop">
      <div class="uploadbox-in">
        <div class="uploadbox-ic">＋</div>
        <div class="uploadbox-t">新築の資料をここにドラッグ＆ドロップ、またはクリックして選択</div>
        <div class="uploadbox-s">間取り図・物件概要・マイソク等（PDF / 画像）。資料は査定の参照用に画面表示するだけで、外部送信はしません。</div>
      </div>
      <input id="a_files" type="file" accept="image/*,application/pdf" multiple hidden>
    </div>
    ${docsHtml}

    <div class="propmap-wrap">
      <h4>🗺 登録物件マップ（エリア別ピン・ホバーで物件情報）</h4>
      <div id="propmap"></div>
    </div>

    <div class="mapform">
      <div class="mapfield full">
        <label>査定地点（住所検索 または 緯度・経度）</label>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="a_addr" type="text" placeholder="住所を入力 例：広島県福山市曙町五丁目288-3" value="${i.addr?i.addr:""}" style="flex:1">
          <button class="addrgo" id="a_addrgo" type="button">住所から座標</button>
        </div>
        <div id="a_addrmsg" class="maphint" style="margin:0 0 8px"></div>
        <div style="display:flex;gap:10px">
          <input id="a_lat" type="number" step="0.0001" placeholder="緯度 例:34.4693" value="${Number.isFinite(i.lat)?i.lat:""}">
          <input id="a_lng" type="number" step="0.0001" placeholder="経度 例:133.3808" value="${Number.isFinite(i.lng)?i.lng:""}">
        </div>
        <div class="maphint">住所検索（無料のOpenStreetMap）で自動入力できます。地番はヒットしないことがあるので、その場合はGoogleマップで対象地を右クリック→先頭の数字（緯度,経度）を貼り付けてください。</div>
      </div>
      <div class="mapfield full">
        <label>間取りタイプ（新築の各タイプの面積を入力）</label>
        <div id="a_types">${typeRowsHtml}</div>
        <button class="typeadd" id="a_addtype">＋ タイプを追加</button>
        <div class="maphint">タイプごとに㎡単価×面積で査定します。面積を空欄にすると、そのタイプは近隣の平均家賃で査定します。</div>
      </div>
      <div class="mapfield">
        <label>抽出半径（km）</label>
        <select id="a_radius">
          ${[1,1.5,2,3,5].map(r=>`<option value="${r}" ${(+i.radiusKm===r)?"selected":""}>${r} km</option>`).join("")}
        </select>
        <div class="maphint">近隣にする距離。福山市街なら2km前後が目安。</div>
      </div>
      <div class="mapfield" style="display:flex;align-items:flex-end">
        <button class="mapgo" id="a_go" style="width:100%">この新築を査定する</button>
      </div>
    </div>
    <div class="mapresult" id="a_result"></div>
    <div class="mapnote">
      <b>座標を持つ自社物件：${withRent}件</b>（登録${props.length}件中）。査定材料はこの${withRent}件です。<br>
      物件に緯度経度を入れるほど査定精度が上がります。座標未登録の物件は、その物件を開いて登録してください。<br>
      <span style="color:#8a5a00">※ 一部物件（アプリシティ・アルカディア等）の座標は町丁目レベルの暫定値です。正確な実座標に差し替えると距離計算が正確になります。</span>
    </div>
  </div>`;

  // ── タイプ行の入力を state に同期 ──
  const syncTypes=()=>{
    document.querySelectorAll("#a_types .typerow").forEach(row=>{
      const idx=+row.getAttribute("data-idx");
      const sel=row.querySelector(".t_label").value;
      const free=row.querySelector(".t_labelfree").value;
      const lab=(sel==="__other__")?free:sel;
      const ar=parseFloat(row.querySelector(".t_area").value);
      const unEl=row.querySelector(".t_units");
      const un=unEl?parseInt(unEl.value,10):NaN;
      assessTypeRows[idx]={label:lab, area:Number.isFinite(ar)?ar:"", units:Number.isFinite(un)?un:""};
    });
  };
  document.querySelectorAll("#a_types .t_label").forEach(sel=>{
    sel.addEventListener("change",()=>{
      const row=sel.closest(".typerow");
      const free=row.querySelector(".t_labelfree");
      if(sel.value==="__other__"){ free.style.display=""; free.focus(); }
      else { free.style.display="none"; free.value=""; }
      syncTypes();
    });
  });
  document.querySelectorAll("#a_types .t_labelfree,#a_types .t_area,#a_types .t_units").forEach(inp=>{
    inp.addEventListener("input",syncTypes);
  });
  document.querySelectorAll("#a_types .typedel").forEach(btn=>{
    btn.onclick=()=>{ syncTypes(); const idx=+btn.getAttribute("data-idx");
      assessTypeRows.splice(idx,1); if(!assessTypeRows.length)assessTypeRows=[{label:"",area:"",units:""}]; renderMapView(); };
  });
  document.getElementById("a_addtype").onclick=()=>{ syncTypes(); assessTypeRows.push({label:"",area:"",units:""}); renderMapView(); };

  // ── 資料アップロード ──
  const drop=document.getElementById("a_drop"), fileInp=document.getElementById("a_files");
  const addFiles=(files)=>{
    [...files].forEach(f=>{
      const url=URL.createObjectURL(f);
      assessDocs.push({name:f.name, kind:(f.type.indexOf("pdf")>=0?"pdf":"image"), url});
    });
    syncTypes(); renderMapView();
  };
  drop.onclick=()=>fileInp.click();
  fileInp.onchange=e=>{ if(e.target.files&&e.target.files.length) addFiles(e.target.files); };
  drop.ondragover=e=>{ e.preventDefault(); drop.classList.add("drag"); };
  drop.ondragleave=()=>drop.classList.remove("drag");
  drop.ondrop=e=>{ e.preventDefault(); drop.classList.remove("drag");
    if(e.dataTransfer.files&&e.dataTransfer.files.length) addFiles(e.dataTransfer.files); };
  document.querySelectorAll(".docdel").forEach(btn=>{
    btn.onclick=()=>{ const idx=+btn.getAttribute("data-idx");
      try{URL.revokeObjectURL(assessDocs[idx].url);}catch(e){}
      assessDocs.splice(idx,1); syncTypes(); renderMapView(); };
  });

  // ── 査定実行 ──
  const go=(opts)=>{
    try{
      syncTypes();
      const lat=parseFloat(document.getElementById("a_lat").value);
      const lng=parseFloat(document.getElementById("a_lng").value);
      const radiusKm=parseFloat(document.getElementById("a_radius").value);
      const addrEl=document.getElementById("a_addr");
      const resEl=document.getElementById("a_result");
      // 座標未入力なら分かりやすく案内（無反応にしない）
      if(!Number.isFinite(lat)||!Number.isFinite(lng)){
        resEl.innerHTML=`<div class="mapwarn">査定するには緯度・経度が必要です。上の住所欄に住所を入れて「住所から座標」を押すか、緯度・経度を直接入力してください。</div>`;
        return;
      }
      lastAssessInput={lat,lng,radiusKm, addr:(addrEl?addrEl.value:(lastAssessInput&&lastAssessInput.addr))||""};
      const types=assessTypeRows
        .filter(r=>r.label&&r.label.trim())
        .map(r=>({label:r.label.trim(), area:Number.isFinite(+r.area)?+r.area:undefined,
                  units:Number.isFinite(+r.units)&&+r.units>0?+r.units:undefined}));
      const r=assessByTypes({lat,lng,radiusKm,types},props);
      // 各査定行に戸数を紐付け（PDFの10年推移・サブリース率計算で使用）
      if(r&&r.ok&&r.rows){ r.rows.forEach((row,idx)=>{ if(types[idx])row._units=types[idx].units; }); }
      assessResultCache=r;
      resEl.innerHTML=renderAssessTypeResult(r,types);
      // 近隣物件テーブルの行クリックで物語をトグル（イベント委譲・一度だけ配線）
      if(!resEl._storyWired){
        resEl._storyWired=true;
        resEl.addEventListener("click",(ev)=>{
          const row=ev.target.closest && ev.target.closest(".nb-row");
          if(!row || !resEl.contains(row)) return;
          const pid=row.getAttribute("data-story");
          const sr=resEl.querySelector(`.nb-storyrow[data-storyfor="${pid}"]`);
          if(!sr) return;
          const open=sr.style.display!=="none";
          sr.style.display=open?"none":"table-row";
          row.classList.toggle("nb-open",!open);
        });
      }
      // 査定成功時のみ「新築査定レポートPDF」ボタンを結果末尾に出す
      if(r&&r.ok&&r.rows&&r.rows.length){
        const btnWrap=document.createElement("div");
        btnWrap.style.margin="18px 0 4px";
        btnWrap.innerHTML=`<button class="mapgo" id="a_pdf" style="width:100%;background:#111">◈ 新築査定レポートPDFを出力（10年推移・サブリース率・物語形式）</button>`;
        resEl.appendChild(btnWrap);
        const pdfBtn=document.getElementById("a_pdf");
        if(pdfBtn) pdfBtn.onclick=printNewbuildProposal;
      }
      // マップの査定対象ピン（赤★）を最新座標で描き直す（初回ロード時は末尾のinitPropMapに任せる）
      if(opts&&opts.refreshMap){ try{ if(typeof _propMap!=="undefined" && _propMap){ initPropMap(); } }catch(e){} }
      // ボタン操作時は結果までスクロール（「押しても何も起きない」を防ぐ）
      if(opts&&opts.scroll){ try{ resEl.scrollIntoView({behavior:"smooth",block:"start"}); }catch(e){} }
    }catch(err){
      const resEl=document.getElementById("a_result");
      if(resEl) resEl.innerHTML=`<div class="mapwarn">査定中にエラーが発生しました：${(err&&err.message)||err}<br>住所・緯度経度・間取り面積を確認して、もう一度お試しください。</div>`;
    }
  };
  document.getElementById("a_go").onclick=()=>go({scroll:true, refreshMap:true});

  // ── 住所検索（Nominatim / OpenStreetMap）で緯度経度を自動入力 ──
  const addrGo=async()=>{
    const q=(document.getElementById("a_addr").value||"").trim();
    const msg=document.getElementById("a_addrmsg");
    if(!q){ msg.textContent="住所を入力してください。"; msg.style.color="#a33"; return; }
    if(typeof fetch!=="function"){ msg.textContent="この環境では住所検索が使えません。緯度経度を直接入力してください。"; msg.style.color="#a33"; return; }
    msg.textContent="住所を検索中…"; msg.style.color="";
    try{
      const url="https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=jp&q="+encodeURIComponent(q);
      const res=await fetch(url,{headers:{"Accept":"application/json"}});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const arr=await res.json();
      if(!arr||!arr.length){
        msg.innerHTML="住所が見つかりませんでした。地番（○番○）はヒットしにくいので、町名までで試すか、Googleマップの緯度経度を直接貼り付けてください。";
        msg.style.color="#a33"; return;
      }
      const hit=arr[0];
      const lat=parseFloat(hit.lat), lng=parseFloat(hit.lon);
      document.getElementById("a_lat").value=lat.toFixed(6);
      document.getElementById("a_lng").value=lng.toFixed(6);
      msg.innerHTML=`座標を入力しました：${lat.toFixed(5)}, ${lng.toFixed(5)}<br><span style="color:var(--foam-dim)">${(hit.display_name||"").slice(0,60)}</span>`;
      msg.style.color="var(--foam)";
      lastAssessInput={lat,lng,radiusKm:parseFloat(document.getElementById("a_radius").value), addr:q};
      go({scroll:true, refreshMap:true}); // 座標が入ったら即査定＋赤ピン更新＋結果へスクロール
    }catch(e){
      msg.textContent="住所検索に失敗しました（通信不可の可能性）。緯度経度を直接入力してください。";
      msg.style.color="#a33";
    }
  };
  const addrBtn=document.getElementById("a_addrgo");
  if(addrBtn) addrBtn.onclick=addrGo;
  const addrInp=document.getElementById("a_addr");
  if(addrInp) addrInp.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ ev.preventDefault(); addrGo(); }});

  // ── 既存物件の更新ボックスの配線 ──
  const uDrop=document.getElementById("u_drop"), uFiles=document.getElementById("u_files"), uDocs=document.getElementById("u_docs");
  let updateDocs=[];
  const renderUDocs=()=>{
    if(!uDocs) return;
    uDocs.innerHTML=updateDocs.map((d,idx)=>`
      <div class="doccard">
        <button class="udocdel" data-idx="${idx}" title="削除">×</button>
        ${d.kind==="image"?`<img src="${d.url}" alt="${d.name}">`:`<div class="docpdf"><div class="docpdf-ic">${d.ext||"FILE"}</div></div>`}
        <div class="docname">${d.name}</div>
      </div>`).join("");
    uDocs.querySelectorAll(".udocdel").forEach(b=>b.onclick=()=>{ updateDocs.splice(+b.getAttribute("data-idx"),1); renderUDocs(); });
  };
  const addUFiles=(files)=>{
    [...files].forEach(f=>{
      const isImg=/^image\//.test(f.type);
      const ext=(f.name.split(".").pop()||"FILE").toUpperCase();
      updateDocs.push({name:f.name, kind:isImg?"image":"file", ext, url:isImg?URL.createObjectURL(f):null});
    });
    renderUDocs();
  };
  if(uDrop&&uFiles){
    uDrop.onclick=()=>uFiles.click();
    uFiles.onchange=e=>addUFiles(e.target.files);
    uDrop.addEventListener("dragover",e=>{e.preventDefault();uDrop.classList.add("drag");});
    uDrop.addEventListener("dragleave",()=>uDrop.classList.remove("drag"));
    uDrop.addEventListener("drop",e=>{e.preventDefault();uDrop.classList.remove("drag");if(e.dataTransfer&&e.dataTransfer.files)addUFiles(e.dataTransfer.files);});
  }
  // 「更新済みにする」→ そのSEEDの基準日を上書きしてアラート更新
  const uMark=document.getElementById("u_mark");
  if(uMark) uMark.onclick=()=>{
    const pid=document.getElementById("u_prop").value;
    const ym=document.getElementById("u_asof").value;
    if(!pid){ alert("更新した物件を選んでください。"); return; }
    if(!ym){ alert("更新後のデータ基準日（年月）を入れてください。"); return; }
    saveAsofOverride(pid, ym);
    renderMapView(); // アラートを再計算して再描画
  };
  // アラートのチップをクリックしたらその物件を開く
  document.querySelectorAll(".stale-chip").forEach(ch=>{
    ch.style.cursor="pointer";
    ch.onclick=()=>{ const id=ch.getAttribute("data-openprop"); if(id) openPropModal(id); };
  });

  // 前回入力があれば再査定して結果を復元
  if(Number.isFinite(i.lat)&&Number.isFinite(i.lng)) go();
  // 登録物件マップ（Leaflet）を初期化
  initPropMap();
}
// ===== 登録物件マップ（Leaflet・エリア別ピン・ホバーで物件カード） =====
let _propMap=null, _propLayer=null;
function propTypeBreakdown(p){
  // 間取り別世帯数: roomTypesがあれば内部キー先頭の間取り名で集計、無ければ type×units
  if(p.roomTypes && typeof p.roomTypes==="object"){
    const cnt={};
    Object.values(p.roomTypes).forEach(k=>{
      const m=(String(k).match(/^[0-9]+[A-Za-z]+/)||[String(k)])[0];
      cnt[m]=(cnt[m]||0)+1;
    });
    const rows=Object.keys(cnt);
    if(rows.length) return rows.map(t=>({type:t,count:cnt[t]}));
  }
  if(p.type && p.units) return [{type:p.type,count:p.units}];
  return [];
}
function propTypeRentB(p){
  // 間取り別・即埋まり基準(繁忙/閑散)。rentPlan(内部キー別)があれば採用、無ければ物件共通のquickFill。
  const bd=propTypeBreakdown(p); // [{type,count}]（表示用の間取り名）
  // roomTypesの内部キー→表示間取り名 の対応を作り、rentPlanを表示間取り名へ寄せる
  const keyByMadori={};
  if(p.roomTypes){
    Object.values(p.roomTypes).forEach(k=>{
      const m=(String(k).match(/^[0-9]+[A-Za-z]+/)||[String(k)])[0];
      if(!keyByMadori[m]) keyByMadori[m]=k; // 代表キー
    });
  }
  return bd.map(b=>{
    const rtKey=keyByMadori[b.type];
    const plan=(rtKey && p.rentPlan && p.rentPlan[rtKey])||null;
    const busy=plan?plan.busy:p.quickFillBusy;
    const low =plan?plan.low :p.quickFillLow;
    return {type:b.type, count:b.count, busy, low};
  });
}
function pinCardHtml(p){
  const built=p.built?`${p.built}年築`:"築年未登録";
  const units=(p.units!=null)?`${p.units}戸`:"戸数未登録";
  const occ=Number.isFinite(p.occStable)?`稼働率 ${p.occStable}%`:"稼働率 —";
  const rb=propTypeRentB(p);
  const yen=v=>Number.isFinite(v)?v.toLocaleString()+"円":"—";
  const rentHtml=rb.length
    ? `<div class="pc-types">
        <div class="pct-hd"><span>間取り</span><span>繁忙期</span><span>閑散期</span></div>
        ${rb.map(b=>`<div class="pct-row3"><span>${b.type}</span><span>${yen(b.busy)}</span><span>${yen(b.low)}</span></div>`).join("")}
       </div>`
    : "";
  return `<div class="pin-card">
    <div class="pc-nm">${p.name}</div>
    <div class="pc-meta">${units} ・ ${p.type||"—"} ・ ${built}</div>
    ${rentHtml}
    <div class="pc-occ">${occ}（即埋まり基準＝繁忙/閑散）</div>
  </div>`;
}
function initPropMap(){
  const el=document.getElementById("propmap");
  if(!el) return;
  if(typeof L==="undefined"){ el.innerHTML='<div style="padding:20px;color:#888;font-size:12px">地図ライブラリを読み込めませんでした（オフライン時は表示されません）。</div>'; return; }
  // renderMapViewは再描画されるので、古いインスタンスを破棄して作り直す
  if(_propMap){ try{_propMap.remove();}catch(e){} _propMap=null; }
  _propMap=L.map(el,{scrollWheelZoom:true}).setView([34.52,133.45],10);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19, attribution:"© OpenStreetMap"
  }).addTo(_propMap);
  _propLayer=L.layerGroup().addTo(_propMap);
  // 現在のフィルタ(エリア/検索)を尊重して対象物件を絞る
  const q=(typeof listQuery==="string"?listQuery:"").trim().toLowerCase();
  const targets=props.filter(p=>{
    if(typeof listPref==="string" && listPref!=="all" && prefOf(p)!==listPref) return false;
    if(q && !(p.name||"").toLowerCase().includes(q)) return false;
    const g=p.geo; return g && Number.isFinite(g.lat) && Number.isFinite(g.lng);
  });
  const bounds=[];
  targets.forEach(p=>{
    const pref=prefOf(p);
    const color = pref==="岡山県" ? "#c0392b" : (pref==="広島県" ? "#1f6feb" : "#666");
    const pinSvg=`<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 0C5.8 0 0 5.8 0 13c0 9.2 13 21 13 21s13-11.8 13-21C26 5.8 20.2 0 13 0z" fill="${color}" stroke="#fff" stroke-width="2"/>
      <circle cx="13" cy="13" r="5" fill="#fff"/>
    </svg>`;
    const icon=L.divIcon({className:"pin-marker", html:pinSvg, iconSize:[26,34], iconAnchor:[13,34], popupAnchor:[0,-30], tooltipAnchor:[0,-32]});
    const mk=L.marker([p.geo.lat,p.geo.lng],{icon}).addTo(_propLayer);
    // 物件名だけ常時ラベル表示
    mk.bindTooltip(p.name,{permanent:true,direction:"top",offset:[0,-4],opacity:.95,className:"pin-namelabel"});
    // マウスを乗せたら詳細カードをポップアップ、外したら閉じる
    mk.bindPopup(pinCardHtml(p),{closeButton:false,offset:[0,0],autoPan:false});
    const openCard=()=>{ mk.openPopup(); };
    const closeCard=()=>{ mk.closePopup(); };
    mk.on("mouseover",openCard);
    mk.on("mouseout",closeCard);
    mk.on("click",()=>{ openPropModal(p.id); });
    // 常時ラベル(別DOM)にもホバー＆クリックを効かせる
    const tipEl=mk.getTooltip()&&mk.getTooltip().getElement();
    if(tipEl){
      tipEl.style.pointerEvents="auto";
      tipEl.style.cursor="pointer";
      tipEl.addEventListener("mouseenter",openCard);
      tipEl.addEventListener("mouseleave",closeCard);
      tipEl.addEventListener("click",()=>openPropModal(p.id));
    }
    bounds.push([p.geo.lat,p.geo.lng]);
  });
  // ── 査定対象の新築を「★入り大型赤ピン」で表示（既存物件ピンと区別） ──
  const ti=(typeof lastAssessInput==="object")?lastAssessInput:null;
  if(ti && Number.isFinite(ti.lat) && Number.isFinite(ti.lng)){
    const tgtSvg=`<svg width="42" height="54" viewBox="0 0 42 54" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 0C9.4 0 0 9.4 0 21c0 14.7 21 33 21 33s21-18.3 21-33C42 9.4 32.6 0 21 0z" fill="#e11d1d" stroke="#fff" stroke-width="3"/>
      <path d="M21 9l3.3 6.7 7.4 1.1-5.4 5.2 1.3 7.4L21 27l-6.6 3.5 1.3-7.4-5.4-5.2 7.4-1.1z" fill="#fff"/>
    </svg>`;
    const tgtIcon=L.divIcon({className:"pin-target", html:tgtSvg, iconSize:[42,54], iconAnchor:[21,54], popupAnchor:[0,-48], tooltipAnchor:[0,-50]});
    const tgtMk=L.marker([ti.lat,ti.lng],{icon:tgtIcon, zIndexOffset:1000}).addTo(_propLayer);
    const tgtLabel=(ti.addr||"査定予定の新築");
    tgtMk.bindTooltip("★ "+tgtLabel,{permanent:true,direction:"top",offset:[0,-6],opacity:1,className:"pin-targetlabel"});
    bounds.push([ti.lat,ti.lng]);
  }
  if(bounds.length){ try{ _propMap.fitBounds(bounds,{padding:[40,40],maxZoom:13}); }catch(e){} }
  // コンテナ表示直後のサイズ確定対策（幅変更を反映してから再フィット）
  setTimeout(()=>{ try{
    _propMap.invalidateSize();
    if(bounds.length) _propMap.fitBounds(bounds,{padding:[40,40],maxZoom:13});
  }catch(e){} },80);
}
// 近隣物件の「物語」HTML（アコーディオンで開く内容）。SEEDのturnoverNote・稼働率推移・改定方向から生成。
function neighborStoryHtml(p){
  const NOWy=2026;
  const age=p.built?(NOWy-p.built):null;
  const meta=[p.type||"—", p.built?`${p.built}年築${age!=null?`(築${age}年)`:""}`:"築年未登録",
              Number.isFinite(p.area)?`${p.area}㎡`:null, `${p.units}戸`,
              Number.isFinite(p.occStable)?`安定稼働${p.occStable}%`:null].filter(Boolean).join(" ・ ");

  // ── effRent（満室平均家賃）の算出根拠 ──
  const eff=Number.isFinite(p.effRent)?p.effRent:(Number.isFinite(p.avgRent)?p.avgRent:null);
  let effHtml="";
  const acts=(p.history&&p.history.actuals)||p.actuals||null;
  if(eff!=null){
    // 系統A：年間収支報告書の実額（actuals.fy）から逆算
    if(acts && Array.isArray(acts.fy) && acts.fy.length){
      const fyRows=acts.fy.map(f=>{
        const shownEff=Number.isFinite(f.effRent)?f.effRent:null;
        // リースアップ期など稼働0%や部分年は満室換算の信頼度が低い旨を注記
        const rampNote=(Number.isFinite(f.occ)&&f.occ<=0)?'<span class="fy-note">計上開始期</span>':"";
        return `<tr>
          <td>${f.name}${rampNote}</td>
          <td class="num">${Number.isFinite(f.rentTotal)?f.rentTotal.toLocaleString():"—"}</td>
          <td class="num">${Number.isFinite(f.occ)?f.occ+"%":"—"}</td>
          <td class="num">${Number.isFinite(f.months)?f.months+"ヶ月":"—"}</td>
          <td class="num eff-cell">${shownEff!=null?shownEff.toLocaleString()+"円":"—"}</td>
        </tr>`;
      }).join("");
      effHtml=`
        <div class="nbstory-lbl" style="margin:12px 0 6px">満室平均家賃 ${eff.toLocaleString()}円 の根拠：年間収支報告書の実額</div>
        <table class="efftable">
          <thead><tr><th>年度</th><th class="num">年間家賃実収</th><th class="num">稼働率</th><th class="num">月数</th><th class="num">満室換算/室</th></tr></thead>
          <tbody>${fyRows}</tbody>
        </table>
        <div class="eff-formula">満室換算/室 ＝ 年間家賃実収 ÷ 稼働率 ÷ 月数 ÷ ${p.units}室（共益費・駐車料は除外）。各年の満室換算を平均・保守化した値が <b>${eff.toLocaleString()}円</b>。${acts.basis?`<br><span style="color:#999">算定基準：${acts.basis}</span>`:""}</div>`;
    }
    // 系統B：号室別の最新契約純家賃の合計÷戸数
    else if(Array.isArray(p.roomRents) && p.roomRents.length){
      const vals=p.roomRents.map(r=>r[1]).filter(Number.isFinite);
      const sum=vals.reduce((s,v)=>s+v,0);
      const n=vals.length;
      const rr=p.roomRents.map(r=>`<span class="rr-chip">${r[0]}：${Number.isFinite(r[1])?r[1].toLocaleString():"—"}円</span>`).join("");
      effHtml=`
        <div class="nbstory-lbl" style="margin:12px 0 6px">満室平均家賃 ${eff.toLocaleString()}円 の根拠：号室別の現行契約（純家賃）</div>
        <div class="rr-list">${rr}</div>
        <div class="eff-formula">号室別の純家賃合計 <b>${sum.toLocaleString()}円</b> ÷ ${n}室 ＝ <b>${Math.round(sum/n).toLocaleString()}円</b>（共益費・駐車料は除外）。この号室別の実成約賃料から満室平均を算出。</div>`;
    }
  }
  // 号室別の現行賃料一覧（actuals型でも併記。両方の見せ方）
  let roomListHtml="";
  if(Array.isArray(p.roomRents) && p.roomRents.length && effHtml.indexOf("rr-list")<0){
    const rr=p.roomRents.map(r=>`<span class="rr-chip">${r[0]}：${Number.isFinite(r[1])?r[1].toLocaleString():"—"}円</span>`).join("");
    roomListHtml=`
      <div class="nbstory-lbl" style="margin:12px 0 6px">号室別の現行賃料（純家賃）</div>
      <div class="rr-list">${rr}</div>`;
  }
  // 年次稼働率推移
  let occHtml="";
  if(p.occSeries && typeof p.occSeries==="object"){
    const ys=Object.keys(p.occSeries).sort();
    if(ys.length){
      occHtml=`<div class="nbstory-occ"><span class="nbstory-lbl">稼働率の推移：</span>`+
        ys.map(y=>`<span class="occ-chip">FY${y} ${p.occSeries[y]}%</span>`).join("")+`</div>`;
    }
  }
  // 賃料改定の方向
  const tr=(p.pp&&p.pp.trend)||null;
  const trWord=tr==="down"?"減額基調（新築プレミアムの剥落・実勢収れん）":tr==="up"?"増額基調（入替のたびに賃料水準が切り上がる）":tr==="flat"?"据置基調（賃料水準が安定）":null;
  const trHtml=trWord?`<div class="nbstory-trend"><span class="nbstory-lbl">賃料改定の方向：</span>${trWord}</div>`:"";
  // 入退去の明細（turnoverPool）: [部屋,間取り,退去日,成約日,空室日数,前賃料,後賃料,成約月,繁忙?,状態]
  const pool=(p.history&&Array.isArray(p.history.turnoverPool))?p.history.turnoverPool
            :(Array.isArray(p.turnoverPool)?p.turnoverPool:null);
  let poolHtml="";
  if(pool && pool.length){
    // 集計（増額/減額/据置の件数）
    let up=0,down=0,flat=0;
    pool.forEach(t=>{ const a=t[5],b=t[6];
      if(Number.isFinite(a)&&Number.isFinite(b)){ if(b>a)up++; else if(b<a)down++; else flat++; }});
    const rowsHtml=pool.slice().reverse().map(t=>{
      const room=t[0], out=t[2], sign=t[3], days=t[4], pre=t[5], post=t[6], busy=t[8], state=t[9]||"";
      const diff=(Number.isFinite(pre)&&Number.isFinite(post))?post-pre:null;
      const diffCls=diff==null?"":(diff>0?"chg-up":(diff<0?"chg-down":"chg-flat"));
      const diffTxt=diff==null?"—":(diff>0?`+${diff.toLocaleString()}`:(diff<0?`${diff.toLocaleString()}`:"±0"));
      return `<tr>
        <td>${room}</td>
        <td>${sign||"—"}</td>
        <td class="num">${days!=null?days+"日":"—"}</td>
        <td class="num">${Number.isFinite(pre)?pre.toLocaleString():"—"}</td>
        <td class="num">${Number.isFinite(post)?post.toLocaleString():"—"}</td>
        <td class="num ${diffCls}">${diffTxt}</td>
        <td class="tostate">${busy?'<span class="busy-chip">繁忙</span> ':''}${state}</td>
      </tr>`;
    }).join("");
    poolHtml=`
      <div class="nbstory-lbl" style="margin:12px 0 6px">入退去の実績（成約賃料の増減・空室期間）　<span class="pool-sum">増額${up}・減額${down}・据置${flat}</span></div>
      <table class="pooltable">
        <thead><tr><th>号室</th><th>退去日</th><th class="num">空室</th><th class="num">前賃料</th><th class="num">後賃料</th><th class="num">増減</th><th>備考</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;
  }
  // 物語本文（turnoverNote優先、無ければunits_note）
  const note=p.turnoverNote||p.units_note||"この物件の入退去・稼働に関する詳細メモは未登録です。";
  return `
    <div class="nbstory">
      <div class="nbstory-meta">${meta}</div>
      ${occHtml}
      ${trHtml}
      ${effHtml}
      ${roomListHtml}
      ${poolHtml}
      <div class="nbstory-note">${note}</div>
    </div>`;
}
// 間取りタイプ別の査定結果

  const typeCards=r.rows.map(row=>{

      return `
      <div class="tcard tcard-nodata">
        <div class="tcard-h">${row.label}${row.hasArea?`　<span class="tcard-area">${row.area}㎡</span>`:`　<span class="tcard-area">面積未入力</span>`}</div>
        <div class="nodata-badge">実績なし ― 査定しません</div>
        <div class="nodata-text">${row.noDataReason||"同面積帯の近隣実績が不足しているため査定できません。"}</div>
      </div>`;
    }
    const pickedHtml=(row.basis&&row.basis.picked&&row.basis.picked.length)
      ? `<div class="tcard-picked">参考にした近隣（同間取り・同エリア）：${row.basis.picked.map(p=>`${p.name}(${p.type||""}${Number.isFinite(p.rent)?"・"+p.rent.toLocaleString()+"円":""})`).join("、 ")}</div>`
      : "";
    // 繁忙/通常/閑散の3水準（seasonalがあれば優先。無ければ従来の±5%バンド）
    const bandBlock = row.seasonal
      ? `<div class="assess-band season">
           <div><div class="lbl">閑散期 4〜12月</div><div class="val">${row.seasonal.low.toLocaleString()}</div></div>
           <div class="mid"><div class="lbl">通常期</div><div class="val">${row.seasonal.normal.toLocaleString()}円</div></div>
           <div class="busy"><div class="lbl">繁忙期 1〜3月</div><div class="val">${row.seasonal.busy.toLocaleString()}</div></div>
         </div>`
      : `<div class="assess-band">
           <div><div class="lbl">下限 −5%</div><div class="val">${row.band.low.toLocaleString()}</div></div>
           <div class="mid"><div class="lbl">査定賃料</div><div class="val">${row.band.mid.toLocaleString()}円</div></div>
           <div><div class="lbl">上限 +5%</div><div class="val">${row.band.high.toLocaleString()}</div></div>
         </div>`;
    const seasonHint = row.seasonal
      ? `<div class="maphint">繁忙/通常/閑散は、採用した近隣${row.seasonal.basedOn}件の実績（繁忙期・閑散期の即埋まり賃料）の金額をそのまま距離加重平均して算出（面積換算なし）。</div>`
      : "";
    return `
    <div class="tcard">
      <div class="tcard-h">${row.label}${row.hasArea?`　<span class="tcard-area">${row.area}㎡</span>`:`　<span class="tcard-area">面積未入力</span>`}</div>
      ${bandBlock}
      <div class="maphint">査定方式：${row.basis?row.basis.mode:"㎡単価×面積"}${row.basis&&row.basis.used?`（採用${row.basis.used}件）`:""}</div>
      ${seasonHint}
      ${pickedHtml}
    </div>`;}).join("");
  const nb=r.neighbors;
  // 査定対象の間取りグループ（単身系/1LDK系/2LDK系）で近隣を絞る
  const GROUP_LABEL={"1K系":"1K系(1K/1DK/1SK/1R)","1LDK系":"1LDK系(1LDK/1SLDK/2K)","2LDK系":"2LDK系(2LDK/2SLDK)","3LDK系":"3LDK系(3LDK/3SLDK)"};
  const wantGroups=[...new Set(r.rows.map(row=>_normType(row.label)).filter(Boolean))];
  const sameType=nb.filter(n=>wantGroups.some(w=>_normType(n.p.type)===w));
  // 同グループが2件以上あればそれだけを根拠表示、少なければ全件（注記）
  const useSame=sameType.length>=2;
  const shown=useSame?sameType:nb;
  const wsum=shown.reduce((s,x)=>s+x.weight,0);
  const NOWy=2026;
  const nbrows=shown.map((n,idx)=>{
    const age=n.p.built?(NOWy-n.p.built):null;
    const pid=n.p.id||("nb"+idx);
    return `<tr class="nb-row" data-story="${pid}" title="クリックで物語を開閉">
    <td class="nb-nm"><span class="nb-caret">▸</span>${n.p.name}${n.approx?'<span class="geopill">座標暫定</span>':''}</td>
    <td class="nb-madori">${n.p.type||"—"}</td>
    <td class="num">${n.p.built?n.p.built+"年":"—"}${age!=null?`<span class="nb-age">築${age}</span>`:""}</td>
    <td class="num">${n.dist.toFixed(2)}km</td>
    <td class="num">${Number.isFinite(n.p.area)?n.p.area+"㎡":"—"}</td>
    <td class="num">${n.base.toLocaleString()}円</td>
    <td class="num">${n.unit!=null?Math.round(n.unit).toLocaleString()+"円/㎡":"—"}</td>
    <td class="num">${n.p.units}戸</td>
    <td class="num">${(n.weight/wsum*100).toFixed(0)}%</td>
  </tr>
  <tr class="nb-storyrow" data-storyfor="${pid}" style="display:none">
    <td colspan="9">${neighborStoryHtml(n.p)}</td>
  </tr>`;}).join("");
  const typeLbl=wantGroups.map(g=>GROUP_LABEL[g]||g).join("・")||"—";
  const scopeNote=useSame
    ? `同じ間取りグループ（${typeLbl}）の近隣${sameType.length}件だけを根拠にしています。`
    : `同じ間取りグループ（${typeLbl}）の近隣が少ないため、半径内の全物件を参考表示しています。`;
  return `
    <div class="tcardgrid">${typeCards}</div>
    ${r.anyApprox?'<div class="mapwarn">近隣物件に座標が暫定（町丁目レベル）のものが含まれます。実座標に補正すると精度が上がります。</div>':''}
    <div class="nbtable-hd">① 査定の根拠にした近隣物件（半径${r.radius}km内・同間取りグループ）</div>
    <div class="nbtable-note">${scopeNote}</div>
    <table class="nbtable nbtable-lg">
      <thead><tr><th>近隣の自社物件</th><th>間取り</th><th class="num">築年</th><th class="num">距離</th><th class="num">面積</th><th class="num">満室平均家賃</th><th class="num">㎡単価</th><th class="num">規模</th><th class="num">寄与度</th></tr></thead>
      <tbody>${nbrows}</tbody>
    </table>`;
}
function renderAssessResult(r){
  if(!r.ok){
    return `<div class="mapwarn">${r.reason}${r.totalGeo!=null?`<br>（座標を持つ自社物件は${r.totalGeo}件。半径を広げるか、物件に座標を登録してください）`:""}</div>`;
  }
  const b=r.band;
  const mode=r.hasArea?`近隣の㎡単価（距離加重平均 ${Math.round(r.wAvgUnit).toLocaleString()}円/㎡）× 面積`:`近隣の平均家賃（距離加重）`;
  const rows=r.neighbors.map(n=>`<tr>
    <td>${n.p.name}${n.approx?'<span class="geopill">座標暫定</span>':''}</td>
    <td class="num">${n.dist.toFixed(2)}km</td>
    <td class="num">${n.base.toLocaleString()}円</td>
    <td class="num">${n.unit!=null?Math.round(n.unit).toLocaleString()+"円/㎡":"—"}</td>
    <td class="num">${n.p.units}戸</td>
    <td class="num">${(n.weight/r.neighbors.reduce((s,x)=>s+x.weight,0)*100).toFixed(0)}%</td>
  </tr>`).join("");
  return `
    <div class="assess-band">
      <div><div class="lbl">下限 −5%</div><div class="val">${b.low.toLocaleString()}</div></div>
      <div class="mid"><div class="lbl">査定賃料</div><div class="val">${b.mid.toLocaleString()}円</div></div>
      <div><div class="lbl">上限 +5%</div><div class="val">${b.high.toLocaleString()}</div></div>
    </div>
    <div class="maphint" style="margin-bottom:6px">査定方式：${mode}。近いほど重く効きます。</div>
    ${r.anyApprox?'<div class="mapwarn">近隣物件に座標が暫定（町丁目レベル）のものが含まれます。実座標に補正すると精度が上がります。</div>':''}
    <table class="nbtable">
      <thead><tr><th>近隣の自社物件</th><th class="num">距離</th><th class="num">満室平均家賃</th><th class="num">㎡単価</th><th class="num">規模</th><th class="num">寄与度</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openPrintWindow(title, innerHtml){
  const w=window.open("","_blank");
  if(!w){
    alert("ポップアップがブロックされました。ブラウザのアドレスバーのポップアップ許可を有効にするか、右上メニューから印刷してください。");
    return false;
  }
  w.document.open();
  w.document.write(`<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>${title}</title><style>${proposalStyles()}</style></head><body>${innerHtml}<script>window.onload=function(){setTimeout(function(){window.print();},250);};<\/script></body></html>`);

function printProposalSimple(){
  const p=props.find(x=>x.id===activeId);
  const r=proposalReadiness(p);
  if(r.ineligible){ alert("この物件はCOMPASSの分析対象外です。\n\n理由："+r.reason); return; }
  if(!r.ready){
    const list=r.missing.map(m=>`・${m.key}（${m.need}）`).join("\n");
    alert("提案書の作成にはあと"+r.missing.length+"項目、資料が足りません。\n\n【不足】\n"+list); return;
  }
  openPrintWindow(`COMPASS 提案資料 ${p.name}`, buildProposalSimple(p));
}

function donutSVG(segs){
  const cx=110,cy=110,r=95,rin=55; let a0=-Math.PI/2; const parts=[];
  const total=segs.reduce((s,x)=>s+x.pct,0)||100;
  segs.forEach(sg=>{
    if(sg.pct<=0) return;
    const a1=a0+(sg.pct/total)*Math.PI*2;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const xi1=cx+rin*Math.cos(a1), yi1=cy+rin*Math.sin(a1);
    const xi0=cx+rin*Math.cos(a0), yi0=cy+rin*Math.sin(a0);
    const large=(a1-a0)>Math.PI?1:0;
    // 100%(単一セグメント)のときは円環をまるごと描く
    if(sg.pct>=total){
      parts.push(`<circle cx="${cx}" cy="${cy}" r="${(r+rin)/2}" fill="none" stroke="${sg.color}" stroke-width="${r-rin}"/>`);
    } else {
      parts.push(`<path d="M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} L ${xi1} ${yi1} A ${rin} ${rin} 0 ${large} 0 ${xi0} ${yi0} Z" fill="${sg.color}"/>`);
    }
    a0=a1;
  });
  const top=segs.slice().sort((a,b)=>b.pct-a.pct)[0];
  return `<svg width="220" height="220" viewBox="0 0 220 220" style="flex:none">${parts.join("")}
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="34" font-weight="800" fill="#111">${top.pct}%</text>
    <text x="${cx}" y="${cy+18}" text-anchor="middle" font-size="13" fill="#555">${top.label.length>8?'管理受託有利':top.label}</text></svg>`;
}

/* ── シンプル版提案書：最適賃料→物語(入退去)→稼働率→借上料率→保証代金(差額)→結論 ── */
function buildProposalSimple(p){
  const f=forecast10(p);
  const U=f.units;
  const rateMax=f.ww.safe.rate;                 // 借上料率上限＝(戸数-2)/戸数
  const bepOcc=f.ownerBreakevenOcc;             // 分岐点稼働率
  const occ=f.occ;                              // 実績稼働率
  const cruiseAvg=f.occProjAvg;                 // 巡航予測
  const premium=Math.max(0,-f.compare.ownerDiff); // 保証代金(7年の手取り差額)
  const ra=f.rentAnalysis;
  const pp=p.pp||{};
  const isUp=(pp.trend==="up");

  // ══ 社長の判断軸: ライフの手残り サブリース vs 管理受託 ══
  // 管理受託: ライフ手残り = 実稼働家賃 × 管理料率
  // サブリース: ライフ手残り = 実稼働で回収した家賃 − オーナーへの送金(満室×借上率)
  const y1=f.years[0];
  const ireMgmtY1=Math.round(y1.fee);                          // 管理受託 通年ライフ手残り
  const ireSubY1=Math.round(y1.actual - y1.full*rateMax/100);  // サブリース 通年ライフ手残り
  const ireMgmt10=f.cumIreMgmt;                                // 管理受託 残存年数累計
  const ireSub10=Math.round(f.years.reduce((s,y)=>s+(y.actual-y.full*rateMax/100),0)); // サブリース 残存年数累計
  const horizonLbl=`${f.horizonY}年累計`;
  const trueRemain=f.endAge-f.age0;   // 築10年までの実際の残り(マイナスや5未満もありうる)
  const horizonNote=(trueRemain>=5)
    ? `築${f.age0}年時点・築${f.endAge}年までの${f.horizonY}年分`
    : `築${f.age0}年・残り僅少のため${f.horizonY}年で試算`;
  const diffY1=ireSubY1-ireMgmtY1;                             // 通年差(サブリース−管理受託)
  const diff10=ireSub10-ireMgmt10;                             // 10年差
  const subBetter=diff10>=0;                                   // サブリースの方がライフ手残り多い?
  const feas=f.feasib;                                         // 分岐稼働率の達成難易度
  const easyLabel=feas.level;                                  // 容易/やや容易/普通/やや難しい
  const marginPt=+(occ-bepOcc).toFixed(1);                     // 実績−分岐点
  // 最適賃料(満室/月・間取り別があれば代表値)
  const optPerRoom=ra?ra.optPerRoom:null;

  // ══ 家賃×稼働トレードオフ: ①現在の平均賃料で稼働 vs ②最適賃料で募集 ══
  // オーナー実費率(家賃対比: 原状回復genjo + 広告ad. 定率=管理料/施設=facilは別建て)
  const ownerExpRate=(function(){
    if(!(p.history&&p.history.actuals))return 0.06;
    const fy=p.history.actuals.fy; let e=0,r=0;
    fy.forEach(x=>{e+=(x.genjo+x.ad);r+=x.rentTotal;});
    return r>0? e/r : 0.06;
  })();
  const mgR=p.mgmtRate/100;
  // ① 現在の平均賃料（現行の号室別賃料の満室額）で実績稼働
  const t1_rentRoom=ra?Math.round(ra.curFull/U):Math.round((p.effRent||p.avgRent));
  const t1_occ=occ;                                     // 実績稼働率(%)
  const t1_actM=(ra?ra.curFull:t1_rentRoom*U)*t1_occ/100;
  const t1_ownerM=Math.round(t1_actM*(1-mgR-ownerExpRate)); // オーナー月手残り
  const t1_ireM=Math.round(t1_actM*mgR);                    // ライフ月手残り
  // ② 最適賃料で募集→想定稼働(実績を下回らない前提)
  const t2_rentRoom=optPerRoom||t1_rentRoom;
  const t2_occ=+Math.max(occ, f.improve.calcOcc).toFixed(1);
  const t2_actM=(ra?ra.optFull:t2_rentRoom*U)*t2_occ/100;
  const t2_ownerM=Math.round(t2_actM*(1-mgR-ownerExpRate));
  const t2_ireM=Math.round(t2_actM*mgR);
  // 差分(②−①)
  const dRent=t2_rentRoom-t1_rentRoom;      // 家賃/戸 増減
  const dOcc=+(t2_occ-t1_occ).toFixed(1);   // 稼働 増減(pt)
  const dOwnerM=t2_ownerM-t1_ownerM, dOwnerY=dOwnerM*12;  // オーナー手残り増減
  const dIreM=t2_ireM-t1_ireM, dIreY=dIreM*12;            // ライフ手残り増減
  const yy=(n)=>(n>=0?'+':'')+Math.round(n).toLocaleString()+"円";

  const tradeoffBlk=`
    <div class="blk tradeoff">
      <div class="blk-n">◆</div>
      <div class="blk-h">家賃 × 稼働率 ─ 最適賃料で募集すると手残りはどう変わるか</div>
      <table class="t trade">
        <thead><tr><th>テーマ</th><th>1戸あたり家賃</th><th>想定稼働率</th><th>オーナー<br><span class="th-sub">月手残り</span></th><th>ライフ<br><span class="th-sub">月手残り</span></th></tr></thead>
        <tbody>
          <tr><td class="tname">① 現在の平均賃料で稼働</td><td>${t1_rentRoom.toLocaleString()}円</td><td>${t1_occ.toFixed(1)}%</td><td>${t1_ownerM.toLocaleString()}円</td><td>${t1_ireM.toLocaleString()}円</td></tr>
          <tr><td class="tname opt">② 最適賃料で募集</td><td>${t2_rentRoom.toLocaleString()}円<br><span class="delta ${dRent>=0?'g':'r'}">${dRent>=0?'+':''}${dRent.toLocaleString()}円</span></td><td>${t2_occ.toFixed(1)}%<br><span class="delta ${dOcc>=0?'g':'r'}">${dOcc>=0?'+':''}${dOcc}pt</span></td><td>${t2_ownerM.toLocaleString()}円</td><td>${t2_ireM.toLocaleString()}円</td></tr>
        </tbody>
      </table>
      <div class="trade-sum">
        <div class="ts-cell"><div class="ts-k">オーナー手残りの変化</div><div class="ts-v ${dOwnerM>=0?'g':'r'}">${yy(dOwnerM)}<span>/月</span></div><div class="ts-n">通年 <b class="${dOwnerY>=0?'g':'r'}">${yy(dOwnerY)}</b></div></div>
        <div class="ts-cell"><div class="ts-k">ライフ手残りの変化<br><span class="ts-sub">管理料${p.mgmtRate}%</span></div><div class="ts-v ${dIreM>=0?'g':'r'}">${yy(dIreM)}<span>/月</span></div><div class="ts-n">通年 <b class="${dIreY>=0?'g':'r'}">${yy(dIreY)}</b></div></div>
      </div>
      <p class="note dec-concl">${(()=>{
        const rentDir=dRent<0?`家賃は1戸あたり${Math.abs(dRent).toLocaleString()}円下がる`:(dRent>0?`家賃は1戸あたり${dRent.toLocaleString()}円上がり`:`家賃は据え置きで`);
        const occDir=dOcc>0?`稼働が${dOcc}pt上がる`:(dOcc<0?`稼働は${Math.abs(dOcc)}pt下がる`:`稼働は横ばい`);
        if(dOwnerM>=0){
          return `<b>最適賃料で募集すると、${rentDir}が、${occDir}ため、オーナーの手残りは通年で約${MAN(Math.abs(dOwnerY))}円増える。</b>${dRent<0?'家賃を下げても空室が埋まる方が、年間の手取りは大きくなる。':'家賃と稼働がともに改善し、手取りが伸びる。'}ライフの管理料収入も通年${yy(dIreY)}。`;
        }else{
          return `<b>最適賃料で募集すると、${rentDir}、${occDir}が、稼働改善が家賃減を補いきれず、オーナーの手残りは通年で約${MAN(Math.abs(dOwnerY))}円減る。</b>この物件は現行家賃を維持した方が手取りは大きい。ライフの管理料収入も通年${yy(dIreY)}。`;
        }
      })()}</p>
      <p class="note scen-note">①は<b>現在の平均賃料</b>（現行の号室別賃料の満室額）で実績稼働、②は最適賃料の満室額で想定稼働（実績を下回らない前提）。オーナー手残りは管理料${p.mgmtRate}%と実費（原状回復・広告 実績${(ownerExpRate*100).toFixed(1)}%）を控除。</p>
    </div>`;

  // ══ 最適賃料で募集した場合のシナリオ ══
  // 最適賃料は空室期間を短縮する前提なので、想定稼働率 = max(実績, 空室日数モデルの理論値)。
  // 最適賃料での募集は稼働を下げない前提のため、実績を下回らないよう max を取る。
  const optOcc=+Math.max(occ, f.improve.calcOcc).toFixed(1);   // 最適賃料運用時の想定稼働率(%)
  const optFullM=ra?ra.optFull:(f.base*U);                     // 最適賃料の満室月額
  const optFullY=optFullM*12;                                  // 最適賃料の満室年額
  const optActualY=optFullY*optOcc/100;                        // 想定稼働での実回収年額
  const optIreMgmtY1=Math.round(optActualY*(p.mgmtRate/100));  // 管理受託 通年(最適賃料)
  const optIreSubY1=Math.round(optActualY - optFullY*rateMax/100); // サブリース 通年(最適賃料)
  const optDiffY1=optIreSubY1-optIreMgmtY1;
  // 10年累計(最適賃料・年0.99逓減、稼働は据置)
  let optMgmt10=0, optSub10=0;
  for(let i=0;i<10;i++){
    const fullY=optFullM*Math.pow(0.99,i)*12;
    const actY=fullY*optOcc/100;
    optMgmt10+=actY*(p.mgmtRate/100);
    optSub10+=actY - fullY*rateMax/100;
  }
  optMgmt10=Math.round(optMgmt10); optSub10=Math.round(optSub10);
  const optDiff10=optSub10-optMgmt10;
  const optBepOcc=bepOcc; // 分岐稼働率は借上率/(1-管理料)で賃料に依らず不変
  const optMargin=+(optOcc-optBepOcc).toFixed(1); // 最適賃料稼働−分岐点
  const optSubBetter=optDiff10>=0;

  // ══ 判断軸ブロックのHTML ══
  const y=(n)=>Math.round(n).toLocaleString()+"円";
  const decisionBlk=`
    <div class="blk decision">
      <div class="blk-n">◆</div>
      <div class="blk-h">ライフの手残り ─ サブリース と 管理受託、どちらが得か <span class="persp-tag">ライフ目線</span></div>
      <div class="dec-grid">
        <div class="dec-cell"><div class="dec-k">サブリース借上料率</div><div class="dec-v">${rateMax}<span>%</span></div><div class="dec-n">2戸空室でも赤字にならない上限</div></div>
        <div class="dec-cell"><div class="dec-k">赤字にならない稼働率</div><div class="dec-v">${bepOcc}<span>%</span></div><div class="dec-n">2部屋より空室が増えない稼働率。これ以上ならライフは損しない</div></div>
        <div class="dec-cell"><div class="dec-k">実績稼働 ${occ.toFixed(1)}% との差</div><div class="dec-v ${marginPt>=0?'g':'r'}">${marginPt>=0?'+':''}${marginPt}<span>pt</span></div><div class="dec-n">${easyLabel}に維持できる水準</div></div>
        <div class="dec-cell"><div class="dec-k">維持に必要な最適賃料</div>${
          (ra&&ra.byType&&ra.byType.length)
          ? `<div class="dec-bytype">${ra.byType.map(b=>`<div class="dbt-row"><span class="dbt-t">${b.type}</span><span class="dbt-v">${b.optRent.toLocaleString()}円</span></div>`).join('')}</div><div class="dec-n">間取り別・1戸あたり月額（全体平均 ${optPerRoom?optPerRoom.toLocaleString():'—'}円）</div>`
          : `<div class="dec-v small">${optPerRoom?optPerRoom.toLocaleString()+'円':'—'}</div><div class="dec-n">${optPerRoom?'1戸あたり月額':'下表参照'}</div>`
        }</div>
      </div>
      <table class="t cmp">
        <thead><tr><th>ライフの手残り<br><span class="th-sub">実績稼働 ${occ.toFixed(1)}%</span></th><th>サブリース<br><span class="th-sub">借上${rateMax}%</span></th><th>管理受託<br><span class="th-sub">管理料${p.mgmtRate}%</span></th><th>差額<br><span class="th-sub">サブ−受託</span></th></tr></thead>
        <tbody>
          <tr><td>通年（1年目）</td><td>${y(ireSubY1)}</td><td>${y(ireMgmtY1)}</td><td class="${diffY1>=0?'g':'r'}">${diffY1>=0?'+':''}${y(diffY1)}</td></tr>
          <tr><td>${horizonLbl}<br><span class="th-sub" style="font-weight:400;color:#999">${horizonNote}</span></td><td>${y(ireSub10)}</td><td>${y(ireMgmt10)}</td><td class="${diff10>=0?'g':'r'}">${diff10>=0?'+':''}${y(diff10)}</td></tr>
        </tbody>
      </table>
      <p class="note dec-concl">${subBetter
        ? `<b>ライフはサブリースの方が残り${f.horizonY}年で約${MAN(Math.abs(diff10))}円多く残る。</b>実績稼働${occ.toFixed(1)}%が借上${rateMax}%を回収でき、空室リスクを負ってもなお利ざやが出る。分岐稼働${bepOcc}%の維持は<b>${easyLabel}</b>。`
        : `<b>ライフは管理受託の方が残り${f.horizonY}年で約${MAN(Math.abs(diff10))}円多く残る。</b>実績稼働${occ.toFixed(1)}%なら管理料${p.mgmtRate}%を取る方が手残りが厚い。分岐稼働${bepOcc}%の維持は<b>${easyLabel}</b>なので、管理受託でも安定回収が見込める。`}
        </p>
    </div>`;

  // 最適賃料テーブル（間取り別 or 全室一律）。最適賃料を閑散期／繁忙期に分けて表示。
  const yenOrDash=(v)=>v!=null?v.toLocaleString()+'円':'<span class="muted">—</span>';
  let rentRows;
  if(ra.byType){
    rentRows=ra.byType.map(b=>`<tr><td>${b.type}</td><td>${b.count}戸</td><td>${b.curAvg.toLocaleString()}円</td><td>${yenOrDash(b.optLow)}</td><td class="opt">${yenOrDash(b.optBusy)}</td></tr>`).join("");
  }else{
    rentRows=`<tr><td>全室</td><td>${U}戸</td><td>${Math.round(ra.curFull/U).toLocaleString()}円</td><td>${yenOrDash(ra.flatLow)}</td><td class="opt">${yenOrDash(ra.flatBusy)}</td></tr>`;
  }

  // 物語＝入退去記録（turnoverPool優先、無ければgapsFull）
  const pool=(p.history&&p.history.turnoverPool)||null;
  const gaps=(p.history&&p.history.gapsFull)||[];
  let storyRows="";
  if(pool && pool.length){
    // [部屋,間取り,退去日,成約日,空室日数,前賃料,後賃料,成約月,繁忙?,状態]
    storyRows=pool.map(g=>{
      const rm = `${g[0]}<span class="mad">（${g[1]}）</span>`;
      const contracted = g[3]!=null && g[6]!=null;
      if(!contracted){
        // 再成約前（現在空室中）
        return `<tr><td>${rm}</td><td>${g[2]}</td><td colspan="3" class="down"><b>空室中（再成約前）</b>${g[5]!=null?`　前賃料 ${g[5].toLocaleString()}円`:''}</td><td>${g[8]?'繁忙':'閑散'}</td></tr>`;
      }
      const chg = g[6]>g[5] ? '<span class="up">増額</span>' : (g[6]<g[5]?'<span class="down">減額</span>':'据置');
      const rentStr = g[5]!=null ? `${g[5].toLocaleString()}→${g[6].toLocaleString()}円 ${chg}` : `${g[6].toLocaleString()}円`;
      const moveoutStr = g[2]!=null ? g[2] : '<span class="muted">—</span>';
      const vacStr = g[4]!=null ? `<b>${g[4]}日</b>` : '<span class="muted">—</span>';
      const vacCls = (g[4]!=null && g[4]>=90) ? 'down' : '';
      return `<tr><td>${rm}</td><td>${moveoutStr}</td><td>${g[3]}</td><td class="${vacCls}">${vacStr}</td><td>${rentStr}</td><td>${g[8]?'繁忙':'閑散'}</td></tr>`;
    }).join("");
  }else if(gaps.length){
    // [部屋,退去,再成約,空室日,前賃料,後賃料,成約月,繁忙?]
    const rt=(p.roomTypes)||{};
    storyRows=gaps.map(g=>{
      const rm = rt[g[0]] ? `${g[0]}<span class="mad">（${rt[g[0]]}）</span>` : g[0];
      const chg = g[5]>g[4] ? '<span class="up">増額</span>' : (g[5]<g[4]?'<span class="down">減額</span>':'据置');
      return `<tr><td>${rm}</td><td>${g[1]}</td><td>${g[2]}</td><td class="${g[3]>=90?'down':''}"><b>${g[3]}日</b></td><td>${g[4].toLocaleString()}→${g[5].toLocaleString()}円 ${chg}</td><td>${g[7]?'繁忙':'閑散'}</td></tr>`;
    }).join("");
  }
  const avgDays = (()=>{
    const arr = (pool && pool.length ? pool.map(g=>g[4]) : gaps.map(g=>g[3])).filter(x=>x!=null);
    return arr.length? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null;
  })();

  const optFullStr = ra.optFull.toLocaleString();
  const curFullStr = ra.curFull.toLocaleString();

  return `
  <div class="sp2">
    <div class="ps-head">
      <div><div class="ps-title">${p.name}</div><div class="ps-sub">管理受託 vs サブリース ─ 実績にもとづく査定</div></div>
    </div>
    <div class="ps-meta">${p.addr}｜${p.struct}｜${p.built}年築｜${U}戸｜管理料${p.mgmtRate}%<br>数値はIREライフの管理実績（家賃のみ・共益費/駐車料除外）。</div>

    <!-- ① 稼働率 -->
    <div class="blk">
      <div class="blk-n">1</div>
      <div class="blk-h">稼働率 ─ この物件の実力</div>
      <div class="big-row">
        <div class="big"><div class="big-k">実績稼働率</div><div class="big-v">${occ.toFixed(1)}<span>%</span></div></div>
        <div class="big"><div class="big-k">分岐点</div><div class="big-v">${bepOcc}<span>%</span></div></div>
        <div class="big"><div class="big-k ${occ>=bepOcc?'g':'r'}">実績−分岐点</div><div class="big-v ${occ>=bepOcc?'g':'r'}">${(occ-bepOcc>=0?'+':'')}${(occ-bepOcc).toFixed(1)}<span>pt</span></div></div>
      </div>
      <p class="note">実績稼働が分岐点を${occ>=bepOcc?'上回る＝管理受託が有利':'下回る＝サブリースが有利'}。分岐点＝借上料率÷(1−管理料)。</p>
    </div>

    <!-- ② 借上料率 -->
    <div class="blk">
      <div class="blk-n">2</div>
      <div class="blk-h">借上料率 ─ ${U}戸中2戸が空室でもライフが赤字にならない上限</div>
      <div class="rate-row">
        <div class="rate-big">${rateMax}<span>%</span></div>
        <div class="rate-txt">＝ (${U}−2) ÷ ${U}<br><span>2戸同時空室まで耐えられる水準。これがサブリース借上料率の上限。</span></div>
      </div>
    </div>

    <!-- ③ 最適賃料と実績 -->
    <div class="blk">
      <div class="blk-n">3</div>
      <div class="blk-h">最適賃料 ─ 実績が示す「決まる家賃」</div>
      <table class="t">
        <thead><tr><th>間取り</th><th>戸数</th><th>現行平均</th><th>閑散期の最適賃料</th><th>繁忙期の最適賃料</th></tr></thead>
        <tbody>${rentRows}</tbody>
        <tfoot><tr class="hl"><td colspan="2">満室合計（実績構成）</td><td>${curFullStr}円</td><td colspan="2" class="opt">${optFullStr}円/月</td></tr></tfoot>
      </table>
      <p class="note">実績の号室別成約賃料から算定。<b>閑散期（4〜12月）</b>は据置〜やや弱め、<b>繁忙期（1〜3月）</b>は上振れが通る水準。満室合計は繁忙／閑散の実績構成（繁忙${ra.busyShare}%・閑散${ra.lowShare}%）で加重した実勢値。${isUp?'増額改定が通っており上昇余地あり。':'この賃料なら過去実績上、下げずに決まっている。'}</p>
    </div>

    <!-- ④ 物語＝入退去の記録 -->
    ${storyRows?`<div class="blk">
      <div class="blk-n">4</div>
      <div class="blk-h">実際の入退去 ─ いつ退去し、いつ・いくらで決まったか</div>
      <table class="t">
        <thead><tr><th>部屋</th><th>退去</th><th>成約</th><th>空室</th><th>前→成約賃料</th><th>時期</th></tr></thead>
        <tbody>${storyRows}</tbody>
      </table>
      <p class="note">更新（同一入居者の再契約）は除く、実際に空室が生じた入替のみ。${avgDays!=null?`平均空室 <b>${avgDays}日</b>。`:''}</p>
    </div>`:''}

    ${decisionBlk}

    </div>
  </div>`;
}



load();renderAll();
</script>
</body>
</html>
