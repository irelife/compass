<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS ─ 1K物件 契約形態ナビゲーター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  /* shadcn/ui 相当（変数名は既存のまま・値だけ差し替え） */
  --ink:#0f172a; --brass:#115e59; --brass-dim:#64748b;
  --sea:#ffffff; --sea-2:#f8fafc; --foam:#0f172a; --foam-dim:#64748b;
  --coral:#e11d48; --jade:#047857; --line:#e2e8f0;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  --sl-100:#f1f5f9; --sl-200:#e2e8f0; --sl-300:#cbd5e1; --sl-400:#94a3b8;
  --teal-50:#f0fdfa; --teal-700:#0f766e; --teal-900:#134e4a;
  --r:.5rem; --r-lg:.75rem;
  --sh-sm:0 1px 2px 0 rgb(0 0 0 / .05);
  --sh-md:0 4px 6px -1px rgb(0 0 0 / .1), 0 2px 4px -2px rgb(0 0 0 / .1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#ffffff;
  color:var(--foam);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh;font-size:15px;
}
.wrap{max-width:1600px;margin:0 auto;padding:0 40px 80px}

/* ── header ── */
header{padding:34px 0 26px;border-bottom:1px solid var(--line);position:relative}
.brandrow{display:flex;align-items:center;gap:16px}
.rose{width:46px;height:46px;flex:0 0 auto}
.brand h1{font-size:30px;letter-spacing:.42em;font-weight:600;padding-left:.42em}
.brand .sub{font-size:11px;letter-spacing:.34em;color:var(--brass);margin-top:3px;padding-left:.02em}
.tagline{margin-top:14px;font-size:13.5px;color:var(--foam-dim);max-width:640px}
.tagline b{color:#111;font-weight:600}
.tagline i{color:#111;font-style:normal;font-weight:600;text-decoration:underline;text-underline-offset:3px}

/* ── layout ── */
.layout{display:grid;grid-template-columns:280px 1fr;gap:36px;margin-top:28px}
@media(max-width:760px){.layout{grid-template-columns:1fr}}

/* ── sidebar ── */
.side{align-self:start;position:sticky;top:16px}
.side h2{font-size:11px;letter-spacing:.24em;color:var(--brass);margin:0 0 12px 2px;font-weight:600}
.pcount{color:var(--foam-dim);font-weight:600;letter-spacing:.04em}
.plistctrl{margin-bottom:10px}
.preftabs{display:flex;gap:10px;margin-bottom:10px}
.preftabs .ptab{flex:1;background:var(--sea);border:1px solid var(--line);color:var(--foam-dim);
  border-radius:11px;padding:16px 8px;cursor:pointer;font-size:18px;font-weight:700;transition:.14s}
.preftabs .ptab:hover{border-color:var(--brass-dim)}
.preftabs .ptab.on{background:var(--brass);border-color:var(--brass);color:#ffffff}
.psearch{width:100%;box-sizing:border-box;background:var(--sea);border:1px solid var(--line);
  color:var(--foam);border-radius:10px;padding:14px 15px;font-size:16px;outline:none;transition:.14s}
.psearch:focus{border-color:var(--brass)}
.psearch::placeholder{color:var(--foam-dim)}
.plist{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 240px);overflow-y:auto;
  padding-right:6px;margin-right:-6px}
.plist::-webkit-scrollbar{width:7px}
.plist::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.plist::-webkit-scrollbar-thumb:hover{background:var(--brass-dim)}
.plist .pempty{color:var(--foam-dim);font-size:13px;padding:16px 4px;text-align:center}
.listclose{width:100%;background:var(--sea);border:1px solid var(--line);color:var(--foam-dim);
  border-radius:8px;padding:7px;font-size:12px;cursor:pointer;margin-bottom:2px}
.listclose:hover{border-color:var(--brass);color:var(--foam)}
.pcard{
  background:var(--sea);
  border:1px solid var(--line);border-radius:10px;padding:13px 14px;cursor:pointer;
  text-align:left;color:var(--foam);transition:.16s;position:relative;overflow:hidden;
  flex-shrink:0;
}
.pcard:hover{border-color:var(--brass-dim)}
.pcard.on{border-color:var(--brass)}
.pcard.on::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brass)}
.pcard .pn{font-size:15px;font-weight:600;line-height:1.4}
.pcard .pm{font-size:11px;color:var(--foam-dim);margin-top:4px}
.pcard .pbadge{font-size:10px;letter-spacing:.08em;margin-top:8px;display:inline-block;
  padding:2px 7px;border-radius:20px;border:1px solid var(--line);color:var(--brass)}
.pcard .prow{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.pcard .sbadge{font-size:10px;font-weight:700;letter-spacing:.04em;display:inline-block;
  padding:2px 8px;border-radius:20px;border:1px solid transparent}
.pcard .sbadge.ok{background:rgba(10,122,74,.16);border-color:#0a7a4a;color:#4fd39a}
.pcard .sbadge.warn{background:rgba(192,57,43,.14);border-color:#c0392b;color:#f19a90}
.pcard .sbadge.na{background:rgba(150,150,150,.12);border-color:#888;color:#aaa}
.pcard .pdel{position:absolute;top:8px;right:8px;width:22px;height:22px;line-height:1;
  border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--foam-dim);
  cursor:pointer;font-size:14px;padding:0;display:none;transition:.14s;z-index:2}
.pcard:hover .pdel{display:block}
.pcard .pdel:hover{border-color:#c0392b;color:#f19a90;background:rgba(192,57,43,.14)}
.pcard .phit{cursor:pointer}
.listreset{margin-top:10px;width:100%;background:transparent;border:1px solid var(--line);
  color:var(--foam-dim);border-radius:8px;padding:8px;cursor:pointer;font-size:12px;transition:.14s}
.listreset:hover{border-color:#c0392b;color:#f19a90}
.addbtn{margin-top:14px;width:100%;background:transparent;border:1px dashed var(--brass-dim);
  color:var(--brass);border-radius:10px;padding:11px;cursor:pointer;font-size:13px;letter-spacing:.04em;transition:.16s}
.addbtn:hover{background:rgba(0,0,0,.05)}
.drop{margin-top:10px;border:1px dashed var(--line);border-radius:10px;padding:16px 12px;
  text-align:center;color:var(--foam-dim);font-size:11.5px;cursor:pointer;transition:.16s}
.drop:hover,.drop.hot{border-color:#111;color:var(--foam)}
.drop b{color:var(--foam);display:block;margin-bottom:4px;font-size:12.5px}
.dropnote{margin-top:8px;font-size:10.5px;color:var(--foam-dim);line-height:1.6}

/* note badge */
.scope{display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,.05);
  border:1px solid var(--line);border-radius:8px;padding:10px 16px;font-size:13.5px;
  color:var(--brass);letter-spacing:.03em;margin-bottom:16px}
.scope svg{width:14px;height:14px;flex:0 0 auto}
.scope b{color:var(--foam);font-weight:600}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:22px;border-bottom:1px solid var(--line)}
.tab{background:transparent;border:none;color:var(--foam-dim);font-family:inherit;
  font-size:13.5px;letter-spacing:.04em;padding:11px 18px;cursor:pointer;position:relative;transition:.15s}
.tab:hover{color:var(--foam)}
.tab.on{color:var(--brass)}
.tab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:var(--brass)}

/* insight callout */
.insight{background:rgba(0,0,0,.035);
  border-left:3px solid var(--brass);border-radius:0 10px 10px 0;padding:16px 18px;margin-bottom:22px}
.insight .it{font-size:13px;letter-spacing:.14em;color:var(--brass);margin-bottom:8px;font-weight:600}
.insight p{font-size:15px;color:var(--foam);line-height:1.8}
.insight p b{color:#111;font-weight:700}
.insight p em{color:#111;font-style:normal;font-weight:700;text-decoration:underline;text-underline-offset:3px}

/* mini stat for season */
.season{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
@media(max-width:640px){.season{grid-template-columns:1fr}}
.sbox{border:1px solid var(--line);border-radius:11px;padding:16px 18px}
.sbox.warn{background:rgba(192,57,43,.06);border-color:rgba(192,57,43,.35)}
.sbox.good{background:rgba(26,122,74,.06);border-color:rgba(26,122,74,.35)}
.sbox .st{font-size:11px;letter-spacing:.12em;margin-bottom:8px}
.sbox.warn .st{color:var(--coral)}.sbox.good .st{color:var(--jade)}
.sbox .sv{font-size:16px;line-height:1.6}
.sbox .sv b{font-size:24px;font-weight:700}

/* ── main ── */
.pmeta{display:flex;flex-wrap:wrap;gap:8px 22px;align-items:baseline;margin-bottom:6px}
.pmeta h3{font-size:28px;font-weight:600;letter-spacing:.02em}
.pmeta .tag{font-size:13px;color:var(--foam-dim);letter-spacing:.06em}
.addr{font-size:14px;color:var(--foam-dim);margin-bottom:20px;line-height:1.6}

/* verdict banner */
.verdict{
  background:rgba(0,0,0,.045);
  border:1px solid var(--brass);border-radius:14px;padding:20px 22px;margin-bottom:22px;
  position:relative;overflow:hidden;
}
.verdict .lbl{font-size:11px;letter-spacing:.24em;color:var(--brass);margin-bottom:8px}
.verdict .big{font-size:34px;font-weight:700;line-height:1.1}
.verdict .big .rng{color:#111;text-decoration:underline;text-underline-offset:5px}
.verdict .reason{font-size:15px;color:var(--foam-dim);margin-top:12px;max-width:820px;line-height:1.7}

/* stat strip */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--sea);border:1px solid var(--line);border-radius:11px;padding:18px 20px}
.stat .k{font-size:12px;letter-spacing:.1em;color:var(--brass);margin-bottom:8px}
.stat .v{font-size:24px;font-weight:600;white-space:nowrap}
.stat .v small{font-size:12px;font-weight:400;color:var(--foam-dim);margin-left:2px}
.stat .note{font-size:12px;color:var(--foam-dim);margin-top:6px;line-height:1.5}

/* card + chart */
.card{background:var(--sea);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:22px}
.card h4{font-size:17px;font-weight:600;letter-spacing:.04em;margin-bottom:6px}
.card .desc{font-size:13.5px;color:var(--foam-dim);margin-bottom:16px;line-height:1.6}
.chartbox{position:relative;height:300px}
.chartbox.tall{height:340px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}

/* comparison legend chips */
.chips{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.chip{font-size:11.5px;display:flex;align-items:center;gap:7px;color:var(--foam-dim)}
.dot{width:11px;height:11px;border-radius:3px}
.dot.j{background:#999}.dot.c{background:#111}.dot.b{background:#111;border-radius:0;height:2px;width:14px}

/* table */
table{width:100%;border-collapse:collapse;font-size:14.5px}
th,td{padding:12px 14px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
thead th{color:var(--brass);font-weight:600;font-size:13px;letter-spacing:.08em}
td.pos{color:var(--jade)}td.neg{color:var(--coral)}
tbody tr:hover{background:rgba(0,0,0,.035)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(5,12,20,.72);display:none;align-items:flex-start;
  justify-content:center;padding:40px 16px;z-index:40;overflow:auto}
.modal.on{display:flex}
.sheet{background:var(--ink);border:1px solid var(--brass);border-radius:16px;
  padding:26px 26px 30px;max-width:560px;width:100%}
.sheet h3{font-size:18px;margin-bottom:4px}
.sheet .sd{font-size:12px;color:var(--foam-dim);margin-bottom:20px}
.frow{margin-bottom:14px}
.frow.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;font-size:11px;letter-spacing:.1em;color:var(--brass);margin-bottom:6px}
input,select{width:100%;background:var(--sea);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;color:var(--foam);font-size:14px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--brass)}
.mactions{display:flex;gap:12px;margin-top:22px}
.btn{border:none;border-radius:9px;padding:12px 20px;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:.03em}
.btn.primary{background:var(--brass);color:#fff;font-weight:600;flex:1}
.btn.primary:hover{background:#d8b25c}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--foam-dim)}
.btn.ghost:hover{color:var(--foam)}
.hint{font-size:11px;color:var(--foam-dim);margin-top:4px}
.pdfbtn{background:transparent;border:1px solid var(--brass);color:var(--brass);
  border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:.16s;margin-left:8px}
.pdfbtn:first-of-type{margin-left:auto}
.pdfbtn:hover{background:var(--brass);color:#fff}
.foot{margin-top:40px;font-size:11px;color:var(--foam-dim);letter-spacing:.06em;text-align:center}
.foot span{color:var(--brass)}

/* proposal sheet: hidden on screen, shown only when printing the proposal */
.proposal-sheet{display:none;background:#fff;color:#111;padding:8px 4px;font-family:var(--sans);box-sizing:border-box}

@media print{
  body{background:#fff;color:#111}
  .wrap{max-width:100%;padding:0}
  .side,.addbtn,.drop,.dropnote,.no-print,.pdfbtn,.tabs,header .tagline,.foot{display:none!important}
  .layout{grid-template-columns:1fr;margin-top:0}
  .card,.stat,.verdict,.insight,.sbox,.scope{background:#fff!important;border:1px solid #ccc!important;
    box-shadow:none;color:#111!important;page-break-inside:avoid;break-inside:avoid}
  .card h4,.pmeta h3,.stat .v,.verdict .big{color:#111!important}
  .card .desc,.stat .k,.addr,.tag,.stat .note{color:#555!important}
  .insight p,.verdict .reason,.sbox .sv{color:#222!important}
  .insight p b,.verdict .big .rng,.pos{color:#0a7a4a!important}
  .insight p em{color:#0a7a4a!important}
  .neg{color:#c0392b!important}
  th{color:#8a6d1a!important}
  td,th{border-bottom:1px solid #ddd!important}
  .chartbox{height:260px}
  .brand h1{color:#111}
  .rose circle{stroke:#8a6d1a}

  /* 提案資料モード: #proposal だけ表示 */
  body.print-proposal header,body.print-proposal .layout,body.print-proposal .foot{display:none!important}
  body.print-proposal .proposal-sheet{display:block!important}
  /* この画面をPDFモード: 提案シートは隠す */
  body.print-tab .proposal-sheet{display:none!important}
}

/* proposal sheet layout (applies in print) */
.proposal-sheet .ps-head{display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:2px solid #111;padding-bottom:10px;margin-bottom:14px}
.proposal-sheet .ps-title{font-size:22px;font-weight:700;letter-spacing:.02em}
.proposal-sheet .ps-sub{font-size:11px;color:#555;letter-spacing:.2em}
.proposal-sheet .ps-meta{font-size:12px;color:#333;margin-bottom:14px;line-height:1.6}
.proposal-sheet .ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.proposal-sheet .ps-box{border:1px solid #bbb;border-radius:8px;padding:12px 14px;page-break-inside:avoid}
.proposal-sheet .ps-box.full{grid-column:1 / -1}
.proposal-sheet .ps-k{font-size:10px;letter-spacing:.14em;color:#8a6d1a;font-weight:700;margin-bottom:8px}
.proposal-sheet .ps-box p{font-size:12px;line-height:1.7;color:#222;margin:0}
.proposal-sheet .ps-box b{color:#111}
.proposal-sheet .ps-num{font-size:20px;font-weight:700;color:#111}
.proposal-sheet table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:4px}
.proposal-sheet th,.proposal-sheet td{padding:5px 7px;text-align:right;border-bottom:1px solid #ddd}
.proposal-sheet th:first-child,.proposal-sheet td:first-child{text-align:left}
.proposal-sheet th{color:#8a6d1a;font-weight:700}
.proposal-sheet .g{color:#0a7a4a}.proposal-sheet .r{color:#c0392b}
.proposal-sheet .ps-foot{margin-top:14px;font-size:9.5px;color:#888;border-top:1px solid #ddd;padding-top:8px}
/* ── マップ査定 ── */
.mapbtn{margin:10px 0 4px;width:100%;background:var(--foam);color:#fff;border:none;
  border-radius:9px;padding:11px 10px;cursor:pointer;font-size:12.5px;font-weight:600;
  line-height:1.35;transition:.14s;text-align:left}
.mapbtn:hover{background:#000}
.mapbtn.on{background:#fff;color:var(--foam);border:1.5px solid var(--foam)}
.mapwrap{max-width:860px}
.mapwrap h3{font-size:20px;margin-bottom:4px}
/* 1年経過アラート */
.stale-alert{background:#fff7ed;border:1.5px solid #f0b062;border-radius:12px;padding:14px 16px;margin:10px 0 14px}
.stale-alert-h{font-size:15px;font-weight:800;color:#b8620a;margin-bottom:8px}
.stale-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.stale-chip{background:#fff;border:1px solid #f0c088;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:600;color:#8a5a00}
.stale-chip small{font-weight:500;color:#b98a4a;margin-left:4px}
.stale-chip:hover{background:#fff3e0}
.stale-more{font-size:12px;color:#b98a4a;align-self:center}
.stale-note{font-size:12px;color:#a06a20;line-height:1.6}
/* 既存物件の更新ボックス */
.update-box{border:1px solid var(--line);border-radius:12px;margin:0 0 16px;background:#fafafa;overflow:hidden}
.update-box>summary{cursor:pointer;padding:13px 16px;font-size:14px;font-weight:700;color:var(--foam);list-style:none;user-select:none}
.update-box>summary::-webkit-details-marker{display:none}
.update-box>summary:before{content:"▸";margin-right:8px;color:var(--brass)}
.update-box[open]>summary:before{content:"▾"}
.update-inner{padding:0 16px 16px}
.update-mark{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.update-mark label{font-size:13px;font-weight:700;color:var(--foam)}
.update-mark select,.update-mark input{padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff}
.update-mark select{min-width:220px}
.update-hint{font-size:12px;color:var(--foam-dim);line-height:1.65;margin-top:10px}
#u_drop.drag{border-color:var(--brass);background:#fff7ed}
.mapform{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;
  background:var(--sea);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
.mapform .full{grid-column:1/-1}
.mapfield label{display:block;font-size:11.5px;color:var(--foam-dim);margin-bottom:4px;font-weight:600}
.mapfield input,.mapfield select{width:100%;padding:9px 10px;border:1px solid var(--line);
  border-radius:8px;font-size:14px;background:#fff;font-family:inherit}
.maphint{font-size:11px;color:var(--foam-dim);margin-top:3px;line-height:1.5}
.maphint a{color:var(--brass)}
.mapgo{background:var(--foam);color:#fff;border:none;border-radius:9px;padding:12px;
  cursor:pointer;font-size:14px;font-weight:600;transition:.14s}
.mapgo:hover{background:#000}
.addrgo{background:var(--brass);color:#fff;border:none;border-radius:9px;padding:0 16px;
  cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:.14s}
.addrgo:hover{filter:brightness(.9)}
.assess-band{display:flex;gap:0;border:1.5px solid var(--foam);border-radius:12px;overflow:hidden;margin:14px 0 6px}
.assess-band>div{flex:1;padding:16px 10px;text-align:center;border-right:1px solid var(--line)}
.assess-band>div:last-child{border-right:none}
.assess-band .lbl{font-size:11px;color:var(--foam-dim);margin-bottom:5px}
.assess-band .val{font-size:22px;font-weight:700;letter-spacing:.01em}
.assess-band .mid{background:var(--foam);color:#fff}
.assess-band .mid .lbl{color:rgba(255,255,255,.7)}
.assess-band.season .busy{background:#fbe7d6}
.assess-band.season .busy .lbl{color:#a8703a}
.assess-band.season .busy .val{color:#9a5a1a}
.nbtable{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}
.nbtable th,.nbtable td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left}

   各SEEDは実績データが「いつ時点まで反映しているか」を持つ。
   ほぼ全物件がFY2026上半期(2026-06)まで反映済みなので、未設定は既定 "2026-06"。
   例外だけ SEED_ASOF_OVERRIDE で個別指定。更新した物件は overrideを新しくすればアラートが消える。 */

// ローカル保存の「更新済み」記録（物件を更新したら基準日を上書き。ブラウザ内）
function loadAsofOverrides(){
  try{ return JSON.parse(localStorage.getItem("compass_asof")||"{}"); }catch(e){ return {}; }
}
function saveAsofOverride(id, ym){
  try{ const o=loadAsofOverrides(); o[id]=ym; localStorage.setItem("compass_asof",JSON.stringify(o)); }catch(e){}
}
// 物件のデータ基準日 "YYYY-MM" を返す（ローカル上書き > コード上書き > 既定）
function dataAsOfOf(p){
  if(!p||!p.id) return null;
  const local=loadAsofOverrides();
  if(local[p.id]) return local[p.id];
  if(p.dataAsOf) return p.dataAsOf;
  if(SEED_ASOF_OVERRIDE[p.id]) return SEED_ASOF_OVERRIDE[p.id];
  return SEED_ASOF_DEFAULT;
}
// 基準日から何ヶ月経過したか
function monthsSince(ym){
  if(!ym) return null;
  const m=String(ym).match(/^(\d{4})-(\d{1,2})/); if(!m) return null;
  const y=+m[1], mo=+m[2];
  const now=new Date();
  return (now.getFullYear()-y)*12 + (now.getMonth()+1 - mo);
}
// 1年(12ヶ月)以上経過した物件の一覧
function staleProps(list){
  return (list||[]).filter(p=>{ const mo=monthsSince(dataAsOfOf(p)); return mo!=null && mo>=12; })
    .map(p=>({p, months:monthsSince(dataAsOfOf(p)), asof:dataAsOfOf(p)}))
    .sort((a,b)=>b.months-a.months);
}

/* ══════════════════════════════════════════════════════════════
   マップ査定エンジン（第一段階：距離ベース・完全オフライン）
   近隣の自社管理物件の実績から、査定対象の適正賃料を推定する。
   地図APIは使わず、緯度経度からHaversineで距離を出して近隣を抽出。
   ══════════════════════════════════════════════════════════════ */

// 2点間の距離(km)。Haversine公式。オフラインで完結。
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

// 物件の座標を取り出す（無ければnull）
function geoOf(p){
  if(p && p.geo && Number.isFinite(p.geo.lat) && Number.isFinite(p.geo.lng)) return p.geo;
  return null;
}

// 物件の満室換算1室平均家賃（査定の基準値）。effRent優先、無ければroomRents平均。
function baseRentOf(p){
  if(Number.isFinite(p.effRent)) return p.effRent;
  if(Array.isArray(p.roomRents) && p.roomRents.length){
    const vals=p.roomRents.map(r=>r[1]).filter(Number.isFinite);
    if(vals.length) return Math.round(vals.reduce((s,v)=>s+v,0)/vals.length);
  }
  return null;
}

// 物件の㎡単価（円/㎡）。基準家賃÷専有面積。areaが無ければnull。
function unitPriceOf(p){
  const base=baseRentOf(p);
  if(base==null || !Number.isFinite(p.area) || p.area<=0) return null;
  return base/p.area;
}

/* 査定本体。
   target = {lat,lng,area,radiusKm}
   allProps = 全物件配列（座標を持つ自社物件だけが査定材料になる）
   戻り値: {ok, reason?, neighbors[], estimate{...}} */
function assessRent(target, allProps){
  const t=target||{};
  if(!Number.isFinite(t.lat)||!Number.isFinite(t.lng))
    return {ok:false, reason:"査定地点の緯度経度が未入力です。"};
  const radius=Number.isFinite(t.radiusKm)&&t.radiusKm>0 ? t.radiusKm : 2.0;

  // 座標を持つ自社物件を距離付きで抽出
  const withGeo=allProps.map(p=>{
    const g=geoOf(p); if(!g) return null;
    const dist=haversineKm(t.lat,t.lng,g.lat,g.lng);
    return {p, dist, geo:g, base:baseRentOf(p), unit:unitPriceOf(p), approx:!!g.approx};
  }).filter(Boolean);

  const totalGeo=withGeo.length;
  const neighbors=withGeo.filter(x=>x.dist<=radius && x.base!=null)
                        .sort((a,b)=>a.dist-b.dist);

  if(neighbors.length===0){
    return {ok:false, reason:`半径${radius}km以内に、実績のある自社物件が見つかりませんでした。`,
            totalGeo, radius, neighbors:[]};
  }

  // 距離の逆数を重みに（近いほど強く効く）。0距離は0.05kmとして扱う。
  let wSum=0, wRentSum=0, wUnitSum=0;
  neighbors.forEach(n=>{
    const w=1/Math.max(n.dist,0.05);
    n.weight=w;
    wSum+=w; wRentSum+=w*n.base;
    if(n.unit!=null) wUnitSum+=w*n.unit;
  });
  const wAvgRent=wRentSum/wSum;                     // 距離加重の平均家賃
  const wAvgUnit=wUnitSum/wSum;                     // 距離加重の平均㎡単価
  const hasArea=Number.isFinite(t.area)&&t.area>0;
  // 面積が入力されていれば㎡単価×面積を優先、無ければ平均家賃をそのまま
  const estByUnit=hasArea? Math.round(wAvgUnit*t.area) : null;
  const estByRent=Math.round(wAvgRent);
  const estimate=hasArea? estByUnit : estByRent;
  // 幅は±5%（COMPASSの3パターン思想に合わせる）
  const band={low:Math.round(estimate*0.95), mid:estimate, high:Math.round(estimate*1.05)};
  const anyApprox=neighbors.some(n=>n.approx);

  return {ok:true, radius, totalGeo,
          neighbors, wAvgRent, wAvgUnit, estByUnit, estByRent, hasArea,
          estimate, band, anyApprox};
}

/* 間取りタイプ別査定。★v178：金額直接方式（面積換算をやめる）。
   target = {lat,lng,radiusKm, types:[{label,area}, ...]}
   ・㎡には風呂・トイレ・キッチン等の非居室部分が含まれ、これらは面積が変わっても
     ほぼ一定なので、㎡単価×面積は狭い部屋を過小評価する。
   ・そこで面積換算をやめ、「同じ間取りグループ・同じエリア(半径内)」の物件の
     実績賃料(金額)を距離加重平均して最適賃料とする。面積は細かく勘案しない。
   ・繁忙/通常/閑散は、それら物件の busy/low 実額の距離加重平均。
   ・同グループの物件が半径内に無い場合のみ「実績なし」。 */
function assessByTypes(target, allProps){
  const t=target||{};
  if(!Number.isFinite(t.lat)||!Number.isFinite(t.lng))
    return {ok:false, reason:"査定地点の緯度経度が未入力です。"};
  const baseRes=assessRent({lat:t.lat,lng:t.lng,radiusKm:t.radiusKm}, allProps);
  if(!baseRes.ok) return baseRes;
  const wAvgUnit=baseRes.wAvgUnit, wAvgRent=baseRes.wAvgRent;
  const neighbors=baseRes.neighbors; // 距離昇順・base!=null

  const types=(t.types||[]).filter(x=>x&&x.label);
  const rows=types.map(x=>{
    const grp=_normType(x.label); // 間取りグループ（SINGLE/1LDK/2LDK/…）
    // 同じ間取りグループ・半径内の物件（面積は問わない）
    const sameGrp=neighbors.filter(n=>_normType(n.p.type)===grp);
    if(sameGrp.length<1){
      return {label:x.label, area:Number.isFinite(x.area)?x.area:null, hasArea:Number.isFinite(x.area), noData:true,
              noDataReason:`半径内に、同じ間取りグループ（${grp}）の自社物件がありません。半径を広げるか、近隣に同間取りの実績が出たら査定できます。`,
              basis:{picked:[]}};
    }
    // 実額を距離加重平均（面積換算なし）
    let wb=0,wl=0,we=0,ws=0, n2=0, nb=0, nl=0;
    const pickedInfo=[];
    sameGrp.forEach(n=>{
      const p=n.p, wt=1/Math.max(n.dist,0.05);
      const busy=Number.isFinite(p.quickFillBusy)?p.quickFillBusy:null;
      const low=Number.isFinite(p.quickFillLow)?p.quickFillLow:null;
      const eff=Number.isFinite(p.effRent)?p.effRent:(Number.isFinite(p.avgRent)?p.avgRent:null);
      if(eff!=null){ we+=wt*eff; ws+=wt; n2++; }
      if(busy!=null){ wb+=wt*busy; nb++; }
      if(low!=null){ wl+=wt*low; nl++; }
      pickedInfo.push({name:p.name, area:p.area, type:p.type, rent:eff, busy, low, dist:+n.dist.toFixed(2)});
    });
    if(ws<=0){
      return {label:x.label, area:Number.isFinite(x.area)?x.area:null, hasArea:Number.isFinite(x.area), noData:true,
              noDataReason:`半径内の同間取りグループ（${grp}）の物件に、賃料実績が登録されていません。`,
              basis:{picked:[]}};
    }
    const est=Math.round(we/ws); // 満室平均家賃の距離加重＝通常期の基準
    // 繁忙/通常/閑散：busy/lowが取れる物件から距離加重。取れなければ通常期±の実勢幅で代替
    let seasonal=null;
    // busy/lowの距離加重は、それらが取れた物件のみの重み合計で割る必要があるため再計算
    let wbs=0,wls=0;
    sameGrp.forEach(n=>{ const p=n.p, wt=1/Math.max(n.dist,0.05);
      if(Number.isFinite(p.quickFillBusy)) wbs+=wt;
      if(Number.isFinite(p.quickFillLow))  wls+=wt; });
    const busyRent = wbs>0? Math.round(wb/wbs) : est;
    const lowRent  = wls>0? Math.round(wl/wls) : est;
    const normRent = Math.round((busyRent+lowRent)/2);
    seasonal={busy:busyRent, normal:normRent, low:lowRent, basedOn:Math.max(nb,nl)};
    return {label:x.label, area:Number.isFinite(x.area)?x.area:null, hasArea:Number.isFinite(x.area), noData:false,
            estimate:normRent,
            band:{low:lowRent, mid:normRent, high:busyRent},
            seasonal,
            basis:{mode:`同間取り・同エリアの実績賃料（金額直接・面積換算なし）`, used:sameGrp.length, group:grp, picked:pickedInfo},
            dataGap:null};
  });
  const anyGap=rows.some(r=>r.dataGap);
  const anyNoData=rows.some(r=>r.noData);
  const anyAssessed=rows.some(r=>!r.noData);
  return {ok:true, base:baseRes, wAvgUnit, wAvgRent, rows, anyGap, anyNoData, anyAssessed,
          neighbors:baseRes.neighbors, radius:baseRes.radius, anyApprox:baseRes.anyApprox};
}

/* ══════════ 新築査定：近隣実績からの10年推移・サブリース率推定 ══════════
   ハンドオーバー「新築10年推移は近隣実績からの推定ロジックで新規に作ってよい」に基づく。
   既存物件のhistory.actualsに依存せず、近隣SEEDの築年別稼働・改定方向・空室日数から推定。 */
// 間取りを「近似グループ」に正規化する（ユーザー指定のグループ定義）。
function _normType(s){
  const raw=String(s||"").toUpperCase().replace(/\s/g,"");
  // 先頭の「数字＋アルファベット列」を取り出す（例:"1SK 30.87㎡"→"1SK"）
  const m=raw.match(/^[0-9]*[A-Z]+/);
  const t=m?m[0]:raw;
  // 間取りグループ（ユーザー指定）
  const ONE_K=["1K","1DK","1SK","1R"];        // 1K系
  const ONE_LDK=["1LDK","1SLDK","2K"];        // 1LDK系
  const TWO_LDK=["2LDK","2SLDK"];             // 2LDK系
  const THREE_LDK=["3LDK","3SLDK"];           // 3LDK系
  if(ONE_K.includes(t)) return "1K系";
  if(ONE_LDK.includes(t)) return "1LDK系";
  if(TWO_LDK.includes(t)) return "2LDK系";
  if(THREE_LDK.includes(t)) return "3LDK系";
  return t; // それ以外は元の記号
}

// 近隣プロファイル：同間取りの近隣から稼働・改定方向・空室日数を集計
function neighborProfileForType(lat,lng,radiusKm,wantType,allProps){
  const base=assessRent({lat,lng,radiusKm},allProps);
  if(!base.ok) return {ok:false, reason:base.reason};
  const want=_normType(wantType);
  const sameType=base.neighbors.filter(n=>_normType(n.p.type)===want);
  const pool=sameType.length>=2?sameType:base.neighbors;
  let up=0,down=0,flat=0, occSum=0,occN=0, daySum=0,dayN=0; const occByAge=[];
  pool.forEach(n=>{
    const p=n.p, age=p.built?(NOW-p.built):null;
    const occ=Number.isFinite(p.occStable)?p.occStable:(Number.isFinite(p.occ)?p.occ:null);
    if(age!=null&&occ!=null){ occByAge.push({age,occ,name:p.name,type:p.type}); occSum+=occ;occN++; }
    const tr=(p.pp&&p.pp.trend)||null;
    if(tr==="up")up++;else if(tr==="down")down++;else if(tr==="flat")flat++;
    if(p.pp&&Number.isFinite(p.pp.optDays)){ daySum+=p.pp.optDays; dayN++; }
  });
  const avgOcc=occN?+(occSum/occN).toFixed(1):null;
  const avgDays=dayN?Math.round(daySum/dayN):null;
  let trend="flat"; if(down>up&&down>=flat)trend="down"; else if(up>down&&up>=flat)trend="up";
  return {ok:true, pool, sameType, sameTypeN:sameType.length, avgOcc, avgDays, up,down,flat, trend,
          occByAge:occByAge.sort((a,b)=>a.age-b.age), neighbors:base.neighbors, radius:base.radius};
}

// 新築10年推移：築0→10の稼働率・家賃・実収を近隣実績から推定
// units=このタイプの戸数（10年推移の家賃計算用）、buildingUnits=建物総戸数（サブリース率計算用）
function newbuildTenYear(lat,lng,radiusKm,wantType,estRent,units,mgmtRate,allProps,buildingUnits){
  const prof=neighborProfileForType(lat,lng,radiusKm,wantType,allProps);
  if(!prof.ok) return prof;
  const U=units||10, mg=(mgmtRate||3)/100;
  const occStable=prof.avgOcc||92;
  const curve=[];
  for(let age=0; age<=10; age++){
    let occ;
    if(age===0) occ=Math.min(occStable+2, 96);
    else if(age<=2) occ=Math.min(occStable+1.5, 97);
    else if(age<=6) occ=occStable;
    else occ=Math.max(occStable-(age-6)*0.8, occStable-6);
    const drift = prof.trend==="down"?-0.01: prof.trend==="up"?+0.005: 0;
    const rent=Math.round(estRent*Math.pow(1+drift, age));
    const full=rent*U*12, actual=Math.round(full*occ/100), fee=Math.round(actual*mg);
    curve.push({age, occ:+occ.toFixed(1), rent, full, actual, owner:actual-fee, fee});
  }
  // サブリース上限＝建物全体で2室空室でも成立する水準＝(建物総戸数-2)/建物総戸数
  // ※タイプ別戸数ではなく建物総戸数で計算（3室タイプで(3-2)/3=33%のような無意味値を防ぐ）
  const BU=(buildingUnits&&buildingUnits>=3)?buildingUnits:U;
  const subCeil=+((BU-2)/BU*100).toFixed(1);
  const subFeasible = occStable>=subCeil;
  return {ok:true, prof, curve, occStable, trend:prof.trend, subCeil, subFeasible, U, buildingUnits:BU, estRent};
}

const MAN10=n=>Math.round(n/10000).toLocaleString(); // 万円表示

/* 新築査定PDF（物語形式）。査定結果 r と 入力 input から生成。 */
function buildNewbuildProposal(r, input){
  if(!r||!r.ok) return `<div style="padding:40px">査定結果がありません。先に査定してください。</div>`;
  const addr=input.addr||"（住所未入力）";
  const radiusKm=input.radiusKm||2;
  const dateStr=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});
  // 建物総戸数＝全タイプの戸数合計（サブリース率は建物全体で計算する）
  const buildingUnits=r.rows.reduce((s,row)=>s+(Number.isFinite(row._units)?row._units:0),0)||null;
  // 各タイプの10年推移
  const typeBlocks=r.rows.map(row=>{
    // 同面積帯の実績が2件未満 → 査定せず「実績なし」ブロック
    if(row.noData){
      return `
      <div class="blk blk-nodata">
        <div class="blk-h">${row.label}${row.hasArea?`（${row.area}㎡）`:""}　<span class="nodata-inline">実績なし ― 査定しません</span></div>
        <p class="lead-p">${row.noDataReason||"同面積帯の近隣実績が不足しているため、このタイプは査定していません。"}</p>
        <p class="note">COMPASSは「近隣の同面積帯の自社実績」だけを根拠に査定します。無理な推定はせず、実績が揃うまで査定を保留します。</p>
      </div>`;
    }
    const wantType=_normType(row.label);
    const units=row._units||10;
    const ty=newbuildTenYear(input.lat,input.lng,radiusKm,wantType,row.band.mid,units,3,props,buildingUnits);
    if(!ty.ok) return `<div class="blk"><div class="blk-h">${row.label}</div><p>近隣データ不足で推移を推定できませんでした。</p></div>`;
    const curveRows=ty.curve.map(y=>`<tr>
        <td>築${y.age}年${y.age===0?'<span class="yr-note">(初年度)</span>':''}</td>
        <td class="num">${y.occ}%</td>
        <td class="num">${y.rent.toLocaleString()}円</td>
        <td class="num">${MAN10(y.full)}万</td>
        <td class="num">${MAN10(y.actual)}万</td>
        <td class="num">${MAN10(y.owner)}万</td>
      </tr>`).join("");
    const cum10Actual=ty.curve.reduce((s,y)=>s+y.actual,0);
    const cum10Owner=ty.curve.reduce((s,y)=>s+y.owner,0);
    const trendWord=ty.trend==="down"?"緩やかな下降基調":ty.trend==="up"?"増額基調":"横ばい基調";
    const gapNote=row.dataGap?`<p class="callout-r"><b>データ穴の注意：</b>${row.dataGap.text}</p>`:"";
    // 近隣実測（同間取り）
    const nbList=ty.prof.occByAge.map(o=>`${o.name}（${o.type}・築${o.age}年・稼働${o.occ}%）`).join("、 ")||"—";
    // サブリース判定文（建物総戸数ベース）
    const BU=ty.buildingUnits;
    const subVerdict=ty.subFeasible
      ? `近隣の同間取り安定稼働は<b>${ty.occStable}%</b>で、借上上限<b>${ty.subCeil}%</b>（建物${BU}室中2室が空室でも成立する水準）を上回る。したがってこの物件は<b>借上率${ty.subCeil}%以下でサブリース化しても、IREライフ側が黒字を確保できる</b>見込み。`
      : `近隣の同間取り安定稼働は<b>${ty.occStable}%</b>で、借上上限<b>${ty.subCeil}%</b>をやや下回る。サブリース化する場合は借上率を<b>${ty.subCeil}%より保守的に</b>設定するのが安全。`;
    return `
    <div class="blk">
      <div class="blk-h">${row.label}（${units}室）　最適賃料 <span class="opt-rent">${row.band.mid.toLocaleString()}円</span></div>
      ${row.seasonal?`<div class="season-row">
        <div class="season-cell"><div class="sc-lbl">閑散期 4〜12月</div><div class="sc-val">${row.seasonal.low.toLocaleString()}円</div></div>
        <div class="season-cell sc-normal"><div class="sc-lbl">通常期</div><div class="sc-val">${row.seasonal.normal.toLocaleString()}円</div></div>
        <div class="season-cell sc-busy"><div class="sc-lbl">繁忙期 1〜3月</div><div class="sc-val">${row.seasonal.busy.toLocaleString()}円</div></div>
      </div>
      <p class="note">繁忙/通常/閑散は、採用した近隣${row.seasonal.basedOn}件の実績（繁忙期・閑散期の即埋まり賃料）の金額をそのまま距離加重平均して算出（面積換算なし）。</p>`:""}
      ${gapNote}
      <div class="sub-h">② 10年間の稼働率・家賃の見込み（近隣実績からの推定）</div>
      <p class="lead-p">近隣の同間取り物件は${trendWord}。新築2年間は募集直後の高稼働、以降は近隣の安定稼働 約${ty.occStable}% に収れんし、築8年目以降は緩やかに低下すると見込む。賃料も${trendWord}に沿って推移する。</p>
      <table class="t">
        <thead><tr><th>築年</th><th class="num">想定稼働率</th><th class="num">1戸家賃</th><th class="num">満室年額</th><th class="num">実収年額</th><th class="num">オーナー手取</th></tr></thead>
        <tbody>${curveRows}</tbody>
        <tfoot><tr><td>10年累計</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num">${MAN10(cum10Actual)}万</td><td class="num">${MAN10(cum10Owner)}万</td></tr></tfoot>
      </table>
      <div class="sub-h">③ サブリース（一括借上）なら何％が妥当か</div>
      <p class="lead-p">${subVerdict}</p>
      <p class="note">根拠：借上率の上限は「建物全体で2室が空室でも成立する水準」＝(建物総戸数−2)/建物総戸数＝(${BU}−2)/${BU}＝${ty.subCeil}%。近隣の同間取り実測稼働と突き合わせて判定。</p>
      <div class="sub-h">近隣の同間取り実績（この推定の根拠）</div>
      <p class="note">${nbList}</p>
    </div>`;
  }).join("");

  return `
  <div class="ps-head">
    <div><div class="ps-title">新築 家賃査定レポート</div><div class="ps-sub">COMPASS ／ 近隣実績ベース</div></div>
    <div style="text-align:right;font-size:13px;color:#555">${dateStr}<br>IREライフ株式会社</div>
  </div>
  <div class="ps-meta"><b>査定対象：</b>${addr}<br><b>査定方式：</b>半径${radiusKm}km内・IREライフ自社管理物件の実績のみを根拠（周辺相場は不使用）。近隣の同間取り物件から最適賃料・10年推移・サブリース率を推定。</div>
  ${typeBlocks}
  <div class="concl-foot-note">本レポートは近隣の自社管理実績からの推定であり、市場の実勢・立地条件により変動します。同面積帯の近隣実績が乏しいタイプは「データ穴の注意」を参照してください。査定賃料は初回募集の目安であり、募集反響を見て調整することを前提とします。</div>`;
}

/* ── compute for user-added properties ── */
function computeProperty(p){
  const full=p.avgRent*p.units*12;
  const actual=full*(p.occ/100);
  const mgmtFee=actual*(p.mgmtRate/100);
  const ownerRemit=actual-mgmtFee;
  const ownerBreakeven=+(ownerRemit/full*100).toFixed(1);
  const ireGrossPct=+(mgmtFee/full*100).toFixed(2);
  const ireBreakevenRate=+(100-ireGrossPct).toFixed(1);
  const rates=[85,88,90,92,95];
  const ireGross={},slBreakeven={};
  rates.forEach(r=>{
    const guarantee=full*(1-r/100); // IREライフ keeps this if fully occupied
    const perVac=p.avgRent*12;
    ireGross[r]=[0,1,2,3,4].map(v=>Math.round((guarantee-v*perVac)/10000));
    slBreakeven[r]=+(guarantee/perVac).toFixed(1);
  });
  // recommend: lowest rate where owner take (rate) > mgmt owner take%, and IREライフ breakeven vacancy >= expected vacancy
  const expVac=p.units*(1-p.occ/100);
  let recoLow=null,recoHigh=null;
  rates.forEach(r=>{
    if(r>ownerBreakeven && slBreakeven[r]>=expVac*0.9){ if(recoLow===null)recoLow=r; recoHigh=r; }
  });
  if(recoLow===null){recoLow=Math.ceil(ownerBreakeven);recoHigh=recoLow+2;}
  const built=p.built||NOW;
  const age=NOW-built;
  const future={};[0,4,10].forEach(a=>{const yr=built+a;const decay=Math.pow(0.99,a);future[a]=Math.round(full*decay);});
  return {fullYear:full,actualYear:actual,mgmtFee,ownerRemit,ownerBreakeven,ireGrossPct,ireBreakevenRate,ireGross,slBreakeven,future,recoLow,recoHigh,
    reason:`オーナー手取りが管理受託(満室の${ownerBreakeven}%相当)を上回り、IREライフは年間平均空室${slBreakeven[recoLow]}戸までは黒字となるゾーン。`};
}

/* ── 残存年数予測エンジン（実績ベース・相場不使用） ──
   考え方：築10年を寿命の区切りとみなし、現在の築年数を引いた「残り年数」で累計する。
   築5年なら残り5年。築10年以上（残りが5年未満）になる物件は、最低5年分は出す。
   家賃の毎年1%逓減は現在の築年数から継続（築5年なら 0.99^5 を起点にさらに逓減）。 */
function forecast10(p){
  const units=p.units;
  const occ=(p.occStable||p.occ)/100;           // 実績安定稼働率
  const base=p.effRent||p.avgRent;              // 実効平均賃料(実成立値)
  const decay=0.99, mgmt=(p.mgmtRate||3)/100;
  const age0=p.built?Math.max(0,NOW-p.built):0; // 現在の築年数
  const END_AGE=10;                             // 寿命の区切り＝築10年
  const MIN_YEARS=5;                            // 終点を超えた物件でも最低この年数は出す
  const horizonY=Math.max(MIN_YEARS, END_AGE-age0); // 残り年数（築5年→5、築10年以上→5）
  const years=[];
  let cumOwnerMgmt=0, cumIreMgmt=0;
  for(let i=0;i<horizonY;i++){
    const rent=base*Math.pow(decay,age0+i);     // 逓減は現在の築年数から継続
    const full=rent*units*12;
    const actual=full*occ;
    const fee=actual*mgmt;
    const owner=actual-fee;
    cumOwnerMgmt+=owner; cumIreMgmt+=fee;
    years.push({age:age0+i, rent, full, actual, fee, owner});
  }
  // サブリース: 借上率別の残存年数累計(オーナー送金=満室×借上率固定、IREライフ=実稼働回収−送金)
  const sl={};
  [85,88,90].forEach(r=>{
    let cumOwner=0,cumIre=0;
    years.forEach(y=>{ const pay=y.full*r/100; cumOwner+=pay; cumIre+=(y.actual-pay); });
    sl[r]={owner:Math.round(cumOwner),ire:Math.round(cumIre),vsOwner:Math.round(cumOwner-cumOwnerMgmt)};
  });
  // 実績で両者黒字となる上限借上率を探す(IREライフ>=0 かつ owner>=管理受託)
  let coexist=null;
  for(let r=95;r>=80;r--){
    let cumOwner=0,cumIre=0;
    years.forEach(y=>{cumOwner+=y.full*r/100;cumIre+=(y.actual-y.full*r/100);});
    if(cumIre>=0 && cumOwner>=cumOwnerMgmt){coexist=r;break;}
  }
  // 5年/10年の「両者が損をしない借上料率」帯を0.1%刻みで算出
  function band(nYears){
    const ys=years.slice(0,nYears); // 最初のnYears年
    let cumOwnerMgmtN=0; ys.forEach(y=>cumOwnerMgmtN+=y.owner);
    let ceil=null,floor=null;
    for(let r=1000;r>=700;r--){ // r=率×10 (70.0%〜100.0%)
      const rate=r/10;
      let cumOwner=0,cumIre=0;
      ys.forEach(y=>{const pay=y.full*rate/100;cumOwner+=pay;cumIre+=(y.actual-pay);});
      const ireOK=cumIre>=0;             // IREライフが損をしない
      const ownerOK=cumOwner>=cumOwnerMgmtN; // オーナーが管理受託より損をしない
      if(ireOK && ownerOK){ if(ceil===null)ceil=rate; floor=rate; }
    }
    return {ceil,floor,cumOwnerMgmt:Math.round(cumOwnerMgmtN)};
  }
  const band5=band(5), band10=band(10);
  // 空室戸数耐性ベースの推奨借上料率:
  // X部屋空室でもIREライフ黒字 ⇔ (units-X)*base*12 >= full_year*率  ⇔ 率 <= (units-X)/units*100
  // (full_year = base*units*12 なので base は相殺され、率上限は戸数比だけで決まる)
  const fullYr1=base*units*12;
  function rateForVacancy(x){ return +((units-x)/units*100).toFixed(1); }
  const vacResist={
    1:rateForVacancy(1), 2:rateForVacancy(2), 3:rateForVacancy(3)
  };
  // 管理受託でオーナーが満室家賃に対して受け取る割合(実額の経費率を反映)
  let ownerTakeVsFull=null;
  if(p.history&&p.history.actuals){
    const fy=p.history.actuals.fy.find(f=>f.name==="FY2025")||p.history.actuals.fy[0];
    const exp=fy.ritsu+fy.genjo+fy.ad+fy.facil;
    const expRate=exp/fy.rentTotal;
    ownerTakeVsFull=+((occ*(1-expRate))*100).toFixed(1);
  }
  const recRate=vacResist[2]; // 推奨=2部屋空室耐性の上限
  // ── 築4→10年(7年)の両者手残り比較。実費(修繕・原状回復・AD等)はどちらの契約でもオーナー負担。サブリースは賃料のみ借上 ──
  function winwin(occImproved){
    const yN=7, expRate=0.096, mg=(p.mgmtRate||3)/100; // 実費率(定率除く,家賃対比,FY2025実額)
    let cumOwnerM=0,cumIreM=0;
    for(let i=0;i<yN;i++){const rent=base*Math.pow(0.99,i);const full=rent*units*12;const actual=full*occImproved;
      cumOwnerM+=actual-actual*mg-actual*expRate; cumIreM+=actual*mg;}
    const rows=[];let winLo=null,winHi=null;
    for(let r=83;r<=93;r++){
      let co=0,ci=0;
      for(let i=0;i<yN;i++){const rent=base*Math.pow(0.99,i);const full=rent*units*12;const actual=full*occImproved;
        const pay=full*r/100;
        co+=pay - actual*expRate;  // オーナー: 送金受取だが実費は自己負担(サブリースも同じ)
        ci+=actual - pay;}         // ライフ: 家賃回収 - 送金(実費負担なし)
      const dOwner=co-cumOwnerM, dIre=ci-cumIreM, both=dOwner>=0&&dIre>=0;
      if(both){if(winLo===null)winLo=r;winHi=r;}
      rows.push({r,co:Math.round(co),ci:Math.round(ci),dOwner:Math.round(dOwner),dIre:Math.round(dIre),both,
        verdict: both?'両者得':(dOwner<0?'オーナー損':'ライフ損')});
    }
    // 分岐点(オーナー損→ライフ損に切り替わる借上率)
    let flip=null;
    for(let i=1;i<rows.length;i++){ if(rows[i-1].dOwner<0 && rows[i].dOwner>=0){flip=rows[i].r;break;} }
    // 稼働率の中身(通年平均空室室数・年間空室室日)
    const avgVacRooms=+(units*(1-occImproved)).toFixed(2);
    const vacRoomDays=Math.round(units*365*(1-occImproved));
    const perRoomDays4=Math.round(vacRoomDays/4); // 年4室退去なら1室あたり空室日数
    // 2部屋空室が通年続いてもライフ黒字を保てる借上率上限 = (units-2)/units
    // この上限はライフの粗利(管理料相当)を自然に確保する。戸数が少ないほど1室の重みが増し上限は下がる。
    const ireSafeExact=(units-2)/units; // 正確値(例:13/15=0.8667)
    const ireSafe2=+(ireSafeExact*100).toFixed(1); // 表示用(86.7)
    // その料率(正確値)での平常時とworst時のライフ年粗利、7年累計
    const full1=base*units*12;
    const ireNormalYr=Math.round(full1*occImproved - full1*ireSafeExact);
    const ireWorstYr=Math.round(full1*((units-2)/units) - full1*ireSafeExact); // worst=2室空=ちょうど±0
    let coSafe=0,ciSafe=0;
    for(let i=0;i<yN;i++){const rent=base*Math.pow(0.99,i);const full=rent*units*12;const actual=full*occImproved;
      const pay=full*ireSafeExact; coSafe+=pay-actual*expRate; ciSafe+=actual-pay;}
    const safe={rate:ireSafe2,ireNormalYr,ireWorstYr,cumOwner:Math.round(coSafe),cumIre:Math.round(ciSafe),
      dOwner:Math.round(coSafe-cumOwnerM),dIre:Math.round(ciSafe-cumIreM),
      monthRemit:Math.round(base*units*ireSafeExact)};
    return {cumOwnerM:Math.round(cumOwnerM),cumIreM:Math.round(cumIreM),rows,winLo,winHi,flip,occImproved:occImproved*100,years:yN,
      avgVacRooms,vacRoomDays,perRoomDays4,safe};
  }
  // 予測の巡航稼働率＝pp.projCruise優先、無ければ実績安定稼働率を0.5pt割引
  const pp=p.pp||{};
  const projCruise=+(Math.max(80, Math.min(99, pp.projCruise!=null?pp.projCruise:((p.occStable||occ*100) - 0.5)))).toFixed(1);
  const ww=winwin(projCruise/100);
  // ── 最適賃料で運用した場合の築4→10年の稼働率推移（実績巡航が7年狙えるか） ──
  const occProj=[];
  const projBase=projCruise;
  for(let i=0;i<7;i++){
    const decay=projBase - i*0.3;             // 築年劣化(的確家賃なので緩やか)
    const cycle=(i%2===1)?-1.0:0;             // 2年周期の退去の谷(的確家賃で浅い)
    const o=+(Math.min(100,decay+cycle)).toFixed(1);
    occProj.push({age:(p.built?NOW-p.built:4)+i, year:NOW+i, occ:o, vac:+(units*(1-o/100)).toFixed(2)});
  }
  const occProjAvg=+(occProj.reduce((s,x)=>s+x.occ,0)/occProj.length).toFixed(1);
  const occProjMin=Math.min(...occProj.map(x=>x.occ));
  const occProjMax=Math.max(...occProj.map(x=>x.occ));
  // ── ⑥ 管理受託 vs サブリース(借上86.7%) 手残り・リスク比較(7年,稼働はoccProj平均) ──
  const cmpOcc=occProjAvg/100, cmpYr=7, cmpExp=0.096, cmpMg=(p.mgmtRate||3)/100;
  let mOwner=0,mIre=0,sOwner=0,sIre=0;
  for(let i=0;i<cmpYr;i++){const rent=base*Math.pow(0.99,i);const full=rent*units*12;const actual=full*cmpOcc;
    mOwner+=actual-actual*cmpMg-actual*cmpExp; mIre+=actual*cmpMg;
    const pay=full*ww.safe.rate/100; sOwner+=pay-actual*cmpExp; sIre+=actual-pay;}
  const compare={
    occ:occProjAvg,
    mgmtOwner:Math.round(mOwner), mgmtIre:Math.round(mIre),
    subOwner:Math.round(sOwner), subIre:Math.round(sIre),
    ownerDiff:Math.round(sOwner-mOwner), ireDiff:Math.round(sIre-mIre)
  };
  // ── リスクシミュレーション: 管理受託を選んで7年、サブリース固定を上回る損失(保証代金超)が出る確率 ──
  // 稼働率は実績3期(86.3/94.6/85.4)の標準偏差で毎年ばらつくと仮定、モンテカルロ
  // オーナーにとってサブリース=管理受託になる分岐稼働率 = 借上率/(1-管理料)
  const ownerBreakevenOcc=+((ww.safe.rate/100)/(1-cmpMg)*100).toFixed(1);
  // ── 分岐点稼働率の達成難易度（実績ベース） ──
  // ── 最適賃料の加重平均＆送金差額試算（満室想定・賃料のみ） ──
  const rentAnalysis=(function(){
    if(!(p.history&&p.roomRents)) return null;
    // 現在の満室送金(号室別現行賃料の合計)
    const curFull=p.roomRents.reduce((s,r)=>s+r[1],0);
    // 成約実績の繁忙/閑散構成（成約月1-3月=繁忙）
    const gaps=p.history.gapsFull||[];
    const busyN=gaps.filter(g=>g[7]).length, lowN=gaps.filter(g=>!g[7]).length, totN=busyN+lowN||1;
    const busyShare=busyN/totN, lowShare=lowN/totN;
    const isUpTrend=(p.pp&&p.pp.trend==="up");
    let optFull, optPerRoom, byType=null;
    if(p.rentPlan && p.roomTypes){
      // ── 間取り別に最適賃料を割り当てて合計（1K/1SK/1LDK/1SLDK混在に対応） ──
      // 増額基調の物件は繁忙賃料(上振れ余地)を基準、そうでなければ繁忙/閑散の実績構成で加重
      byType={};
      optFull=0;
      p.roomRents.forEach(([rm,cur])=>{
        const t=p.roomTypes[rm];
        const plan=p.rentPlan[t]||{busy:cur,low:cur};
        const opt = isUpTrend ? plan.busy : Math.round(plan.busy*busyShare + plan.low*lowShare);
        optFull+=opt;
        if(!byType[t]) byType[t]={type:t,count:0,optRent:opt,optLow:plan.low,optBusy:plan.busy,curSum:0};
        byType[t].count++; byType[t].curSum+=cur;
      });
      optPerRoom=Math.round(optFull/p.units);
      byType=Object.values(byType).map(x=>({...x,curAvg:Math.round(x.curSum/x.count)}));
    } else {
      // 従来: 全室一律の最適賃料
      optPerRoom=Math.round(p.quickFillBusy*busyShare + p.quickFillLow*lowShare);
      optFull=optPerRoom*p.units;
    }
    const diff=curFull-optFull;
    // 実効比較: 高値維持(後追い値下げ時の低稼働) vs 最適賃料(実績安定稼働)の年間送金(賃料のみ)
    const occOptV=Math.min(0.99,(p.occStable||occ*100)/100);
    const occHigh=+Math.max(0.80, occOptV-0.08).toFixed(3), occOpt=+occOptV.toFixed(3);
    const annualHigh=Math.round(curFull*occHigh*12);
    const annualOpt=Math.round(optFull*occOpt*12);
    const annualGain=annualOpt-annualHigh;
    return {curFull,optPerRoom,optFull,diff,diffYear:diff*12,busyN,lowN,busyShare:Math.round(busyShare*100),lowShare:Math.round(lowShare*100),
      occHigh,occOpt,annualHigh,annualOpt,annualGain,monthHigh:Math.round(annualHigh/12),monthOpt:Math.round(annualOpt/12),byType,isUpTrend,
      flatLow:(p.quickFillLow||null),flatBusy:(p.quickFillBusy||null)};
  })();
  const feasib=(function(){
    const allowedVac=units*365*(1-ownerBreakevenOcc/100); // 許容する年間空室(室日)
    const alwaysEmpty=+(units*(1-ownerBreakevenOcc/100)).toFixed(2); // 常時空室数
    // 退去ペース別に必要な1室あたり客付け日数
    const byTurnover=[4,5,6].map(t=>({turnover:t, days:Math.round(allowedVac/t), months:+(allowedVac/t/30.4).toFixed(1)}));
    const need5=Math.round(allowedVac/5); // 年5室退去時の必要日数(代表値)
    // 実績空室日数: pp優先。無ければgapsFullから算出。
    const gf=(p.history&&p.history.gapsFull)||[];
    const gapDays=gf.map(g=>g[3]).filter(d=>Number.isFinite(d));
    const avgGapDays=gapDays.length?Math.round(gapDays.reduce((a,b)=>a+b,0)/gapDays.length):120;
    const fy2025Days=(pp.optDays!=null)?pp.optDays:avgGapDays;   // 最適賃料運用時の実績平均空室日数
    const currentDays=(pp.slowDays!=null)?pp.slowDays:Math.max(120,Math.round(avgGapDays*1.5));
    const marginVsFy=need5-fy2025Days; // 実績比の余裕日数
    // 難易度判定
    let level, levelPct;
    if(need5>=fy2025Days+30){ level='容易'; levelPct=80; }
    else if(need5>=fy2025Days){ level='やや容易'; levelPct=65; }
    else if(need5>=fy2025Days-20){ level='普通'; levelPct=50; }
    else { level='やや難しい'; levelPct=35; }
    return {allowedVac:Math.round(allowedVac),alwaysEmpty,byTurnover,need5,fy2025Days,currentDays,marginVsFy,level,levelPct};
  })();
  const riskSim=(function(){
    // 物件の実績各期稼働率を使用（なければ安定稼働率の単一値）
    const fyArr=(p.history&&p.history.actuals&&p.history.actuals.fy)||[];
    let hist=fyArr.map(f=>f.occ).filter(o=>Number.isFinite(o));
    if(hist.length<2) hist=[(p.occStable||occ*100)];
    const m=hist.reduce((a,b)=>a+b,0)/hist.length;
    const sd=Math.sqrt(hist.reduce((a,b)=>a+(b-m)*(b-m),0)/hist.length);
    let seed=12345; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
    const gauss=(mu,s)=>{let u=0,v=0;while(u===0)u=rnd();while(v===0)v=rnd();return mu+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
    const N=5000; let subWin=0,mgmtWin=0,neutral=0;
    for(let k=0;k<N;k++){
      let diff7=0;
      for(let yr=0;yr<7;yr++){
        let o=gauss(occProjAvg,sd)/100; o=Math.max(0.70,Math.min(0.98,o));
        const rent=base*Math.pow(0.99,yr), full=rent*units;
        const mgmtOwn=full*o - full*o*cmpMg - full*o*cmpExp;
        const subOwn=full*ww.safe.rate/100 - full*o*cmpExp;
        diff7+=(subOwn-mgmtOwn)*12;
      }
      if(diff7>300000) subWin++;          // サブリースが明確に得(オーナー手取り+30万超)
      else if(diff7<-300000) mgmtWin++;   // 管理受託が明確に得
      else neutral++;
    }
    return {premium:Math.abs(compare.ownerDiff),
      subWinPct:Math.round(subWin/N*100),
      mgmtWinPct:Math.round(mgmtWin/N*100),
      neutralPct:Math.round(neutral/N*100)};
  })();
  // ── 改善シナリオ: 的確な家賃設定で空室日数を短縮した場合 ──
  const annualMoveouts=Math.max(2,Math.round(units/3)); // 2年周期で約1/3が退去
  const curVacDays=feasib.currentDays, newVacDays=feasib.fy2025Days;
  const curLoss=annualMoveouts*curVacDays/(units*365);
  const newLoss=annualMoveouts*newVacDays/(units*365);
  const improvedOcc=+(Math.min(99,(p.occStable||89.3))).toFixed(1); // 的確家賃徹底時の想定稼働率(実績安定稼働)
  const improve={
    busyRent:(p.quickFillBusy||50000), lowRent:(p.quickFillLow||47000),
    curVacDays, newVacDays, curOcc:+((1-curLoss)*100).toFixed(1), calcOcc:+((1-newLoss)*100).toFixed(1),
    improvedOcc,
    breakevenAtImproved:+(improvedOcc*(1-(p.mgmtRate||3)/100)).toFixed(1), // 改善稼働でサブリース>管理受託の分岐借上率
    safeRate: 88  // 稼働安定なら実務上安全に受けられる借上率
  };
  // ── 素のまま(無対策)の稼働率10年推移 ──
  const occTrend=[];
  const baseOcc=(p.occStable||89.3);
  for(let i=0;i<=10;i++){
    const decay=baseOcc - i*0.6;
    const cycle=(i%2===1)?-1.5:0;
    occTrend.push({age:(p.built?NOW-p.built:0)+i, year:NOW+i, occ:+(Math.min(100,decay+cycle)).toFixed(1)});
  }
  const occTrendAvg=+(occTrend.reduce((s,x)=>s+x.occ,0)/occTrend.length).toFixed(1);
  const occTrendEnd=occTrend[occTrend.length-1].occ;
  // サブリースが管理受託を上回る損益分岐稼働率: 借上率 < 稼働率×(1−管理料) ⇔ 稼働率 > 借上率/(1−管理料)
  const mgmtR=(p.mgmtRate||3)/100;
  const breakevenOcc = +(recRate/(1-mgmtR)).toFixed(1); // 推奨借上率で分岐する稼働率
  const breakevenByRate={};[85,recRate,88,90].forEach(r=>{breakevenByRate[r]=+(r/(1-mgmtR)).toFixed(1);});
  return {years,horizonY,age0,endAge:END_AGE,cumOwnerMgmt:Math.round(cumOwnerMgmt),cumIreMgmt:Math.round(cumIreMgmt),sl,occ:occ*100,base,coexist,band5,band10,
    vacResist,recRate,ownerTakeVsFull,units,fullYr1,breakevenOcc,breakevenByRate,occTrend,occTrendAvg,occTrendEnd,improve,ww,
    occProj,occProjAvg,occProjMin,occProjMax,compare,riskSim,ownerBreakevenOcc,feasib,rentAnalysis};
}

/* ── 提案書 作成可否チェック ── */
function proposalReadiness(p){
  // ── 対象外物件の判定（事業用・分譲1室は取り込まない） ──
  const t=((p.type||"")+" "+(p.struct||"")+" "+(p.usage||"")+" "+(p.name||"")).toLowerCase();
  const bizWords=["事務所","事務","ジムショ","倉庫","ソウコ","店舗","テンポ","テナント","オフィス","事業用","工場","コウジョウ","作業所","貸事務所","貸店舗","居抜","駐車","パーキング","看板","office","warehouse","shop"];
  const isBiz = bizWords.some(w=>t.includes(w.toLowerCase())) || p.usage==="事業用";
  const isCondoUnit = (p.usage==="分譲" || p.usage==="区分") || (/分譲|区分所有/.test(t)) || (p.ownership==="区分");
  const tooFewUnits = (p.units!=null && p.units<2); // 1棟でなく1室のみ＝対象外
  if(isBiz || isCondoUnit || tooFewUnits){
    let reason = isBiz ? "事業用物件（貸事務所・倉庫・店舗など）"
      : isCondoUnit ? "分譲マンションの区分所有（1室）"
      : "戸数が1室（1棟の賃貸物件ではない）";
    return {ready:false, ineligible:true, reason, checks:[], missing:[], fyCount:0};
  }
  const checks=[
    {key:"基本情報", ok:!!(p.name&&p.addr&&p.units&&p.built&&p.mgmtRate!=null),
      need:"建物台帳", detail:"物件名・住所・戸数・築年・管理料率"},
    {key:"号室別の現行賃料", ok:!!(p.roomRents&&p.roomRents.length>=p.units),
      need:"建物台帳（賃料明細）", detail:"全"+(p.units||"?")+"室の現行賃料（満室送金額の算定に必要）"},
    {key:"空室→成約の記録", ok:!!(p.history&&p.history.gapsFull&&p.history.gapsFull.length>0),
      need:"取引成立台帳", detail:"退去日・成約日・成約賃料（最適賃料と分岐点達成の根拠）"},
    {key:"入居期間の実績", ok:!!(p.history&&p.history.tenancy&&p.history.tenancy.avgMonths),
      need:"取引成立台帳", detail:"平均入居期間・退去件数（回転の速さ＝2部屋空室リスクの根拠）"},
    {key:"年度別の稼働・家賃実績", ok:!!(p.history&&p.history.actuals&&p.history.actuals.fy&&p.history.actuals.fy.length>=1),
      need:"年間収支報告書", detail:"月別の家賃入金（稼働率と実効賃料の算定）※最低1年、できれば3年分"},
  ];
  const missing=checks.filter(c=>!c.ok);
  const ready=missing.length===0;
  const fyCount=(p.history&&p.history.actuals&&p.history.actuals.fy)?p.history.actuals.fy.length:0;
  return {ready, ineligible:false, checks, missing, fyCount};
}

let mapMode=false; // マップ査定ビュー表示中か
// 初期プリセット：曙町共同住宅（福山市曙町五丁目288-3・新築）。ボタンを押すだけで査定が出る。

function load(){
  let saved=null;
  try{saved=JSON.parse(localStorage.getItem(KEY))}catch(e){}
  saved = Array.isArray(saved) ? saved : [];
  // コード内SEEDに昇格した物件は、旧・建物一覧由来の軽量版（b_00XX / 名前一致の資料不足版）を
  // localStorageから除外する。SEED昇格済みの建物一覧id・名前はSEEDS/SEED_NAME_PREFIXESから導出。
  const SEED_LEGACY_IDS=new Set(["b_0019","b_0041","b_0042","b_0015","b_0026","b_0027","b_0028","b_0029","b_0037","b_0038","b_0117","b_0116","b_0043","b_0044","b_0045","b_0017","b_0018","b_0039","b_0040","b_0055","b_0056","b_0016","b_0001","b_0008","b_0066","b_0046","b_0093","b_0094","b_0078","b_0120","b_0021","b_0129","b_0130","b_0022","b_0023","b_0090","b_0091","b_0020","b_0110","b_0002"]);
  const isSeedLegacyLite=p=>{
    if(SEED_LEGACY_IDS.has(p.id)) return true;                     // 建物一覧由来の軽量id
    const nm=p.name||"";
    const lite=!(p.history&&p.history.actuals);                    // 実額データを持たない＝軽量版
    return lite && SEED_NAME_PREFIXES.some(pre=>nm.indexOf(pre)===0);
  };
  saved = saved.filter(p=>!isSeedLegacyLite(p));
  // 建物一覧の版管理：この版がまだ適用されていなければ、未登録の物件を追加し、既存物件に県情報を補完する
  const SEED_VER="buildings_v62";
  const SEED_REMOVED_IDS=new Set(["b_0047","b_0048","b_0052","b_0053","b_0054","b_0050","b_0051","b_0222"]);
  const SEED_REMOVED_NAME_PREFIXES=["ラナンキュラス","ルミナス","ドルセットセブン","松永町AP"];
  const appliedVer=localStorage.getItem(KEY+"_seedver");
  if(appliedVer!==SEED_VER){
    saved=saved.filter(p=>{
      if(SEED_REMOVED_IDS.has(p.id)) return false;
      if(SEED_REMOVED_NAME_PREFIXES.some(pre=>(p.name||"").startsWith(pre))) return false;
      return true;
    });
    const byId=new Map(SEED_BUILDINGS.map(b=>[b.id,b]));
    const have=new Set(saved.map(p=>p.id));
    const haveNames=new Set(saved.map(p=>(p.name||"")+"|"+(p.units!=null?p.units:"")));
    // 既存物件に県情報を補完（v1で入った物件はprefが無い）
    saved.forEach(p=>{
      if(!p.pref && byId.has(p.id)) p.pref=byId.get(p.id).pref;
    });
    // 未登録の物件を追加（コード内SEEDに昇格済みの建物一覧idは除外）
    SEED_BUILDINGS.forEach(b=>{
      if(b.id==="apricity"||SEED_LEGACY_IDS.has(b.id)) return;
      if(have.has(b.id)) return;
      if(haveNames.has((b.name||"")+"|"+(b.units!=null?b.units:""))) return;
      saved.push(b);
    });
    try{
      localStorage.setItem(KEY,JSON.stringify(saved));
      localStorage.setItem(KEY+"_seedver",SEED_VER);
    }catch(e){}
  }
  props=[...SEEDS,...saved];
  applyGeoOverrides();
  activeId=props[0].id;
  mapMode=true; // 既定はマップ＋ドロップボックス。個別物件はモーダルで開く
}
/* 座標オーバーライド：SEED物件はコード定数で永続化されないため、
   座標だけは KEY+"_geo" に id→{lat,lng} で別途保存し、起動時にpropsへ上書きする。
   これで二重登録を起こさずSEED物件の座標を正確な実測値に更新・保持できる。 */
function loadGeoOverrides(){
  try{ return JSON.parse(localStorage.getItem(KEY+"_geo")||"{}"); }catch(e){ return {}; }
}
function applyGeoOverrides(){
  const ov=loadGeoOverrides();
  props.forEach(p=>{
    if(ov[p.id] && Number.isFinite(ov[p.id].lat) && Number.isFinite(ov[p.id].lng)){
      p.geo={lat:ov[p.id].lat, lng:ov[p.id].lng, approx:!!ov[p.id].approx};
    }
  });
}
function saveGeoOverride(id,lat,lng,approx){
  const ov=loadGeoOverrides();
  ov[id]={lat:lat,lng:lng,approx:!!approx};
  try{ localStorage.setItem(KEY+"_geo",JSON.stringify(ov)); }catch(e){}
  const p=props.find(x=>x.id===id);
  if(p) p.geo={lat:lat,lng:lng,approx:!!approx};
}
function clearGeoOverride(id){
  const ov=loadGeoOverrides();
  delete ov[id];
  try{ localStorage.setItem(KEY+"_geo",JSON.stringify(ov)); }catch(e){}
}
function persist(){
  // SEED物件はコード内定数なのでlocalStorageに保存しない（二重登録防止）
  const custom=props.filter(p=>!isSeedId(p.id));
  try{localStorage.setItem(KEY,JSON.stringify(custom))}catch(e){}
}

let listPref="all", listQuery="", listOpen=false;
// アプリシティの県（表示・フィルタ用）
function prefOf(p){
  // 県名だけに正規化（"広島県福山市"→"広島県" などの表記ゆれを吸収）
  const norm=v=>{ if(!v) return ""; const m=String(v).match(/(広島県|岡山県)/); return m?m[1]:v; };
  if(p.pref) return norm(p.pref);
  if(p.id==="apricity") return "広島県"; // アプリシティは福山＝広島
  if(p.id==="ideal") return "広島県"; // アイディールは福山＝広島
  if(p.id==="asym") return "広島県"; // アシンプトートは福山＝広島
  if(p.id==="amelia") return "広島県"; // アメリアは福山＝広島
  if(p.addr){ const m=p.addr.match(/(広島県|岡山県)/); if(m) return m[1]; }
  return "";
}
function renderList(){
  const el=document.getElementById("plist");el.innerHTML="";
  // 一覧の開閉：検索フォーカス中 or 検索文字あり のときだけ表示
  const shown = (listOpen || (listQuery&&listQuery.trim()));
  if(el){ el.style.display = shown ? "" : "none"; }
  // 展開時は先頭に「閉じる」ボタン
  if(shown){
    const cb=document.createElement("button");
    cb.className="listclose";
    cb.textContent="✕ 閉じる";
    cb.onmousedown=e=>e.preventDefault(); // 検索blurより先に発火させない
    cb.onclick=()=>{ listOpen=false; listQuery=""; const s=document.getElementById("psearch"); if(s){s.value="";s.blur();} renderList(); };
    el.appendChild(cb);
  }
  // フィルタ適用（アプリシティは常に先頭で表示）
  const q=listQuery.trim().toLowerCase();
  const list=props.filter(p=>{
    if(listPref!=="all" && prefOf(p)!==listPref) return false;
    if(q && !(p.name||"").toLowerCase().includes(q)) return false;
    return true;
  });
  // 件数表示
  const cnt=document.getElementById("pcount");
  if(cnt){
    const total=props.length;
    cnt.textContent = (listPref==="all"&&!q) ? `(${total})` : `(${list.length} / ${total})`;
  }
  if(list.length===0){
    const e=document.createElement("div");e.className="pempty";e.textContent="該当する物件がありません";
    el.appendChild(e); return;
  }
  list.forEach(p=>{
    const r=proposalReadiness(p);
    let sbadge;
    if(r.ineligible){
      sbadge=`<span class="sbadge na">◇ 対象外</span>`;
    }else if(r.ready){
      sbadge=`<span class="sbadge ok">✓ 作成可</span>`;
    }else{
      sbadge=`<span class="sbadge warn">⚠ あと${r.missing.length}項目</span>`;
    }
    // 推奨料率バッジは分析可能な物件（履歴あり）のみ
    let recoBadge="";
    if(p.history){
      const rec=forecast10(p).recRate;
      if(Number.isFinite(rec)) recoBadge=`<span class="pbadge">推奨 ${rec}%</span>`;
    }
    const isSeed = isSeedId(p.id);
    const b=document.createElement("div");
    b.className="pcard"+(p.id===activeId?" on":"");
    const built = p.built ? `${p.built}年築` : "築年未登録";
    const units = (p.units!=null) ? `${p.units}戸` : "戸数未登録";
    b.innerHTML=`${isSeed?"":`<button class="pdel" title="この物件を削除">✕</button>`}
      <div class="phit">
        <div class="pn">${p.name}</div>
        <div class="pm">${units} ・ ${p.type||"—"} ・ ${built}</div>
        <div class="prow">${sbadge}${recoBadge}</div>
      </div>`;
    b.querySelector(".phit").onclick=()=>{ openPropModal(p.id); };
    if(!isSeed){
      b.querySelector(".pdel").onclick=(e)=>{
        e.stopPropagation();
        if(confirm(`「${p.name}」を削除しますか？\nこの物件の登録データを消去します（アップした台帳の再登録は不要です）。`)){
          deleteProp(p.id);
        }
      };
    }
    el.appendChild(b);
  });
  // ── リセットボタン（SEED以外に登録がある時だけ、かつ全件表示時のみ） ──
  if(listPref==="all" && !q && props.some(p=>!isSeedId(p.id))){
    const rb=document.createElement("button");
    rb.className="listreset";
    rb.textContent="↺ 登録物件をすべてリセット";
    rb.onclick=resetProps;
    el.appendChild(rb);
  }
}
// 県タブ・検索の配線（初回のみ）
function wireListControls(){
  const tabs=document.getElementById("preftabs");
  const search=document.getElementById("psearch");
  if(tabs && !tabs._wired){
    tabs._wired=true;
    tabs.querySelectorAll(".ptab").forEach(t=>{
      t.onclick=()=>{
        listPref=t.dataset.pref;
        tabs.querySelectorAll(".ptab").forEach(x=>x.classList.remove("on"));
        t.classList.add("on");
        renderList();
      };
    });
  }
  if(search && !search._wired){
    search._wired=true;
    search.addEventListener("input",e=>{ listQuery=e.target.value; renderList(); });
    // フォーカスで一覧を展開、外れたら畳む（クリック確定のため少し遅延）
    search.addEventListener("focus",()=>{ listOpen=true; renderList(); });
    search.addEventListener("blur",()=>{ setTimeout(()=>{ listOpen=false; renderList(); },180); });
  }
  // 一覧の開閉を反映
  const plist=document.getElementById("plist");
  if(plist){ plist.style.display = (listOpen || (listQuery&&listQuery.trim())) ? "" : "none"; }
}
// 個別削除
function deleteProp(id){
  if(isSeedId(id)) return; // コード内SEEDは削除不可
  props=props.filter(p=>p.id!==id);
  if(activeId===id) activeId=props[0].id; // 消したのが選択中なら先頭へ
  persist();
  renderAll();
}
// 全リセット（SEEDのみに戻す）
function resetProps(){
  const n=props.filter(p=>!isSeedId(p.id)).length;
  if(n===0) return;
  if(confirm(`登録した${n}件の物件をすべて削除し、初期状態（コード内登録物件のみ）に戻します。\nよろしいですか？`)){
    props=props.filter(p=>isSeedId(p.id));
    activeId=props[0].id;
    persist();
    try{localStorage.setItem(KEY+"_seedver","buildings_v3");}catch(e){} // 再読込で建物一覧が復活しないよう版を維持
    renderAll();
  }
}

/* ── main render ── */
let activeTab="kaibo"; // default: 病理解剖 first
/* 物件詳細の座標編集行。新築査定の近隣抽出はこの座標が決め手なので、
   Googleマップ等で確認した番地レベルの正確な緯度経度をここで入力・保存できる。
   保存はKEY+"_geo"にオーバーライドされ、SEED物件でもリロード後まで保持される。 */
function geoEditorRow(p){
  const g=p.geo||{};
  const lat=Number.isFinite(g.lat)?g.lat:"";
  const lng=Number.isFinite(g.lng)?g.lng:"";
  const isApprox=g.approx!==false; // approx未定義やtrueは暫定扱い
  const badge=isApprox
    ? `<span style="color:var(--coral);font-weight:600">暫定(町丁目)</span>`
    : `<span style="color:var(--jade);font-weight:600">確定(実測)</span>`;
  return `<div class="geoedit no-print" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;margin:6px 0;padding:6px 10px;background:#f7f5f0;border:1px solid #e6e0d4;border-radius:6px">
    <span style="color:#888">📍 査定用座標</span>
    <label>緯度<input id="geoLat" type="number" step="0.0001" value="${lat}" style="width:104px;margin-left:4px;padding:2px 4px;font-size:12px;border:1px solid #ccc;border-radius:4px"></label>
    <label>経度<input id="geoLng" type="number" step="0.0001" value="${lng}" style="width:104px;margin-left:4px;padding:2px 4px;font-size:12px;border:1px solid #ccc;border-radius:4px"></label>
    <span>精度：${badge}</span>
    <button id="geoSaveExact" class="pdfbtn" style="padding:3px 8px">実測で保存</button>
    <button id="geoSaveApprox" class="pdfbtn" style="padding:3px 8px">暫定で保存</button>
    <button id="geoReset" class="pdfbtn" style="padding:3px 8px;opacity:.7">コード値に戻す</button>
    <span id="geoMsg" style="color:var(--jade)"></span>
  </div>`;
}
function wireGeoEditor(p){
  const latEl=document.getElementById("geoLat");
  const lngEl=document.getElementById("geoLng");
  const msg=document.getElementById("geoMsg");
  if(!latEl||!lngEl) return;
  const read=()=>({lat:parseFloat(latEl.value),lng:parseFloat(lngEl.value)});
  const valid=(v)=>Number.isFinite(v.lat)&&Number.isFinite(v.lng)&&v.lat>=24&&v.lat<=46&&v.lng>=122&&v.lng<=154;
  const doSave=(approx)=>{
    const v=read();
    if(!valid(v)){ if(msg){msg.style.color="var(--coral)";msg.textContent="緯度経度が不正です（日本国内の範囲で入力）";} return; }
    saveGeoOverride(p.id,v.lat,v.lng,approx);
    if(msg){msg.style.color="var(--jade)";msg.textContent=(approx?"暫定":"実測")+"で保存しました";}
    renderMain();
  };
  const se=document.getElementById("geoSaveExact"); if(se) se.onclick=()=>doSave(false);
  const sa=document.getElementById("geoSaveApprox"); if(sa) sa.onclick=()=>doSave(true);
  const rs=document.getElementById("geoReset");
  if(rs) rs.onclick=()=>{ clearGeoOverride(p.id); if(msg){msg.style.color="#888";msg.textContent="コード定義の座標に戻しました（リロードで反映）";} };
}

function renderMain(){
  // 既定はマップ＋ドロップボックス。個別物件はモーダルで別表示する。
  if(mapMode){ killCharts(); renderMapView(); return; }
  // （後方互換）mapMode=false かつ activeId 指定時は従来どおりメインに詳細を描く
  const m=document.getElementById("main");
  const p=props.find(x=>x.id===activeId);
  if(!p){ mapMode=true; killCharts(); renderMapView(); return; }

}

      ${tabsAvail.map(t=>`<button class="tab ${activeTab===t?'on':''}" data-tab="${t}">${tabLabel[t]}</button>`).join("")}
    </div>`:``}`;

  let bodyHtml;

    else if(activeTab==="yosoku") bodyHtml=yosokuView(p);
    else bodyHtml=hikakuView(p,c);
  }catch(err){
    bodyHtml=`<div class="card" style="border:2px solid var(--coral)">
      <h4 style="color:var(--coral)">この物件の分析表示でエラーが発生しました</h4>
      <p class="desc">${p.name} のデータ表示中に問題が起きました。データの一部に想定外の値がある可能性があります。<br><span style="color:#888;font-size:12px">${(err&&err.message)?err.message:err}</span></p>
    </div>`;
  }
  m.innerHTML = header + readinessBanner(p) + bodyHtml;

  m.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{activeTab=t.dataset.tab;
    // モーダル内ならモーダルを再描画、メインならメインを再描画
    if(m.id==="pdetail-body"){ renderPropertyDetailInto(m,p); } else { renderMain(); }
  });
  wireGeoEditor(p);

  killCharts();
  try{
    if(activeTab==="yosoku") drawYosoku(p);
    else { drawOwner(c,ownerMgmtPct); drawIre(c); drawBreak(c); drawFuture(c,p); }
  }catch(err){/* チャート描画失敗は本文表示を妨げない */}
}
// 物件詳細をモーダルで開く
function openPropModal(id){
  activeId=id;
  const p=props.find(x=>x.id===id);
  if(!p) return;
  const ov=document.getElementById("pdetail-modal");
  const body=document.getElementById("pdetail-body");
  if(!ov||!body) return;
  ov.style.display="flex";
  document.body.style.overflow="hidden";
  renderPropertyDetailInto(body, p);
}
function closePropModal(){
  const ov=document.getElementById("pdetail-modal");
  if(ov) ov.style.display="none";
  document.body.style.overflow="";
  killCharts();
}

          const cur=r[1];

function drawYosoku(p){
  const f=forecast10(p);
  // 稼働率10年推移(素のまま)
  const ot=f.occTrend;
  charts.push(new Chart(document.getElementById("y_occ"),{
    data:{labels:ot.map(x=>"築"+x.age+"\n"+x.year),datasets:[
      {type:"line",label:"稼働率(無対策予測)",data:ot.map(x=>x.occ),borderColor:"#111",backgroundColor:"rgba(0,0,0,.06)",fill:true,tension:.25,pointRadius:4,pointBackgroundColor:"#111",borderWidth:2},
      {type:"line",label:"サブリース損益分岐 "+f.breakevenOcc+"%",data:ot.map(()=>f.breakevenOcc),borderColor:"#c0392b",borderDash:[6,4],pointRadius:0,borderWidth:1.5}
    ]},
    options:baseOpts({plugins:{legend:{display:true,labels:{color:tick,font:{size:11},boxWidth:12}},
      tooltip:{callbacks:{label:x=>x.dataset.label+": "+x.parsed.y+"%"}}},
      scales:{x:{grid:{color:gridClr},ticks:{color:tick,font:{size:10}}},
        y:{min:80,max:96,grid:{color:gridClr},ticks:{color:tick,callback:v=>v+"%"}}}})
  }));
  const rates=[85,88,90];
  const ownerData=rates.map(r=>f.sl[r].owner/10000);
  const ireData=rates.map(r=>f.sl[r].ire/10000);
  charts.push(new Chart(document.getElementById("y_battle"),{
    data:{labels:rates.map(r=>"借上"+r+"%"),datasets:[
      {type:"bar",label:"オーナー送金("+f.horizonY+"年累計)",data:ownerData,backgroundColor:"rgba(0,0,0,.28)",borderRadius:5,yAxisID:"y"},
      {type:"line",label:"IREライフ粗利("+f.horizonY+"年累計)",data:ireData,borderColor:"#111",backgroundColor:"#111",pointRadius:6,pointHoverRadius:8,tension:.2,yAxisID:"y1"}
    ]},
    options:baseOpts({plugins:{legend:{display:true,labels:{color:tick,font:{size:11},boxWidth:12}},
      tooltip:{callbacks:{label:x=>x.dataset.label+": "+x.parsed.y.toFixed(0)+"万円"}}},
      scales:{x:{grid:{color:gridClr},ticks:{color:tick}},
        y:{position:"left",grid:{color:gridClr},ticks:{color:"#666",callback:v=>v+"万"},title:{display:true,text:"オーナー送金",color:"#666",font:{size:10}}},
        y1:{position:"right",grid:{drawOnChartArea:false},ticks:{color:"#111",callback:v=>v+"万"},title:{display:true,text:"IREライフ粗利",color:"#111",font:{size:10}}}}})
  }));
}

}

function ireTable(c){
  const rates=Object.keys(c.ireGross);
  let h='<table><thead><tr><th>借上料率</th><th>空0戸</th><th>空1戸</th><th>空2戸</th><th>空3戸</th><th>空4戸</th><th>損益分岐</th></tr></thead><tbody>';
  rates.forEach(r=>{
    h+=`<tr><td>${r}%</td>`;
    c.ireGross[r].forEach(v=>{h+=`<td class="${v>=0?'pos':'neg'}">${v>=0?'+':''}${v}</td>`});
    h+=`<td style="color:var(--brass)">${c.slBreakeven[r]}戸</td></tr>`;
  });
  return h+'</tbody></table>';
}
